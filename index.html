function v7RealNamePoolForTeam(teamId) {

// Infers a plausible age for hand-written real-roster players who don't have

// ============================================================
// TACTICAL FAMILIARITY (per-formation, per-team)
// ============================================================
// Real research (current 2026 national-team setups) backs most of the natural
// formations already on each roster: England/Germany/Belgium/Austria/Turkey
// favour 4-2-3-1, Spain/France/Portugal/Netherlands/Croatia/Norway/Denmark lean
// 4-3-3, Italy plays a back-three 3-5-2. Where a nation doesn't have a real
// roster yet, the same idea is auto-applied from the formation already
// assigned to them at roster-build time (a sensible heuristic default).
//
// Each formation is tagged with a "family" — shapes that share defensive
// structure and spacing. Drilling one formation gives a partial familiarity
// boost to related shapes in the same family (e.g. a back-four pressing team
// comfortable in 4-3-3 picks up 4-2-3-1 faster than it picks up 5-4-1).
const FORMATION_FAMILY = {
  "4-4-2": "BACK4_DIRECT", "4-4-1-1": "BACK4_DIRECT",
  "4-3-3": "BACK4_ATTACK", "4-1-4-1": "BACK4_ATTACK",
  "4-2-3-1": "BACK4_CREATIVE", "4-3-1-2": "BACK4_CREATIVE", "4-3-2-1": "BACK4_CREATIVE", "4-5-1": "BACK4_CREATIVE",
  "3-5-2": "BACK3", "3-4-3": "BACK3", "3-4-2-1": "BACK3",
  "5-3-2": "BACK5", "5-4-1": "BACK5", "5-2-3": "BACK5",
};
function formationsShareFamily(a, b) { return a === b ? "same" : (FORMATION_FAMILY[a] === FORMATION_FAMILY[b] ? "family" : "none"); }
// Seeds a team's familiarity across all 14 formations from their single natural
// one: very high in their own shape, a solid carry-over to the same family
// (e.g. a back-four creative team isn't lost in another back-four shape), and
// noticeably lower in an unfamiliar structure (back four vs back three is the
// biggest jump to relearn).
function buildInitialFamiliarity(naturalFormation) {
  const map = {};
  Object.keys(FORMATIONS).forEach(key => {
    const rel = formationsShareFamily(naturalFormation, key);
    map[key] = rel === "same" ? 82 : rel === "family" ? 58 : 34;
  });

}

  const roster = ROSTERS[team.id];

  if (!roster.tacticalFamiliarity) roster.tacticalFamiliarity = buildInitialFamiliarity(roster.formation);

}
// Training a formation raises familiarity with it directly, and gives a

// ones, so genuinely switching structure (back four <-> back three) still
// takes real, dedicated reps to master.
function trainFormationFamiliarity(team, formationKey, amount = 4) {
  const roster = ROSTERS[team.id];
  if (!roster) return;
  if (!roster.tacticalFamiliarity) roster.tacticalFamiliarity = buildInitialFamiliarity(roster.formation);
  const fam = roster.tacticalFamiliarity;
  fam[formationKey] = clamp((fam[formationKey] ?? 34) + amount, 0, 99);
  Object.keys(FORMATIONS).forEach(key => {
    if (key === formationKey) return;
    if (formationsShareFamily(formationKey, key) === "family") {
      fam[key] = clamp((fam[key] ?? 34) + amount * 0.35, 0, 99);
    }
  });
}

function initQualifyingCampaign(playerTeamId){

  const base = { stage:"ROUND3", confed, calendar:initTrainingCalendar(), playerTeamId, qualifiedDirect:[], round3Groups:null, round4:null, round5:null, interConfed:null, uefaPlayoffs:null, eliminatedAt:null, log:[] };

// After all 12 UEFA groups finish: if the player won their group, qualify immediately.

// cut as a runner-up/NL pick), mark eliminated. If the player is a runner-up or one of
// the 4 Nations League picks, move to the playoff bracket.

  const myGroup = campaign.round3Groups.find(g => g.teams.some(t => t.id === campaign.playerTeamId));
  const ranked = sortStandings(Object.values(myGroup.standings));
  const myRank = ranked.findIndex(s => s.team.id === campaign.playerTeamId);
  if (myRank === 0) {
    campaign.qualifiedDirect.push(findTeam(campaign.playerTeamId));
    campaign.stage = "QUALIFIED";
    resetSquadFitness(campaign.playerTeamId);
    return;
  }
  const isRunnerUp = myRank === 1;
  const isNlPick = UEFA_NATIONS_LEAGUE_PICKS.includes(campaign.playerTeamId) && myRank !== 0;
  if (isRunnerUp || isNlPick) {

    campaign.stage = "UEFA_PLAYOFFS";

// Resolve the player's UEFA playoff path once their semi (and, if applicable, final) is played.
function resolveUefaPlayoffPath(campaign, path) {
  const semi1Done = !!path.semi1.result, semi2Done = !!path.semi2.result;
  if (semi1Done && semi2Done && !path.final) {
    const w1 = path.semi1.result.winner, w2 = path.semi2.result.winner;
    // Host of the final is drawn randomly between the two semi-final winners (matches real format)
    const w1Home = Math.random() < 0.5;
    path.final = { home: w1Home ? w1 : w2, away: w1Home ? w2 : w1, result: null };
    resetSquadFitness(campaign.playerTeamId); // gap between semi and final
  }
  if (path.final && path.final.result) {
    const winner = path.final.result.winner;
    if (winner.id === campaign.playerTeamId) {
      campaign.qualifiedDirect.push(winner);
      campaign.stage = "QUALIFIED";
      resetSquadFitness(campaign.playerTeamId);
    } else {
      campaign.eliminatedAt = `UEFA Play-off Path ${path.letter} Final`;
      campaign.stage = "ELIMINATED";
    }
  }

// FM-STYLE TRAINING CALENDAR
// ============================================================
// Named session types, each with its own effect profile. "Tactical" sessions

// restores fitness/fatigue fastest; "Match Practice" sharpens form a little

// fitness ceiling but cost more fatigue up front.
const SESSION_TYPES = {

  ENDURANCE:    { label: "Endurance",       unit: "Physical",  fitnessDelta: 4,  fatigueDelta: 10, familiarityDelta: 0, moraleDelta: 0 },
  TACTICAL:     { label: "Tactical",        unit: "Tactical",  fitnessDelta: -2, fatigueDelta: 6,  familiarityDelta: 5, moraleDelta: 0 },
  ATTACKING:    { label: "Attacking",       unit: "Tactical",  fitnessDelta: -1, fatigueDelta: 6,  familiarityDelta: 3, moraleDelta: 0 },
  DEFENDING:    { label: "Defending",       unit: "Tactical",  fitnessDelta: -1, fatigueDelta: 6,  familiarityDelta: 3, moraleDelta: 0 },
  BALL_DISTRIBUTION: { label: "Ball Distribution", unit: "Units", fitnessDelta: -1, fatigueDelta: 5, familiarityDelta: 2, moraleDelta: 0 },
  TRANSITION:   { label: "Transition - Press", unit: "Units",  fitnessDelta: -1, fatigueDelta: 7,  familiarityDelta: 2, moraleDelta: 0 },

  POSSESSION:   { label: "Possession",      unit: "Team",      fitnessDelta: -1, fatigueDelta: 5,  familiarityDelta: 2, moraleDelta: 0 },

  RECOVERY:     { label: "Recovery",        unit: "Recovery",  fitnessDelta: 9,  fatigueDelta: -13, familiarityDelta: 0, moraleDelta: 1 },

// Three weekly "squad units" shown as rows, matching real FM-style schedules:

const SQUAD_UNIT_ROWS = ["S1", "S2", "ES"];
// A library of realistic week templates (7 days x 3 unit rows). The middle

// which formation to drill there feeds tacticalFamiliarity for that shape.
function buildTrainingWeek(weekIndex, hasMidweekMatch, hasMatchThisWeek = true) {
  // Per game rules: match day appears after every 2 training days.
  // Layout: Day1=Train, Day2=Train, Day3=MATCH, Day4=Train, Day5=Train, Day6=MATCH, Day7=Rest
  const base = [
    ["RESISTANCE", "RECOVERY", "POSSESSION"],
    ["TACTICAL", "DEFENDING", "GROUND_DEFENCE"],
    ["MATCH", "MATCH", "MATCH"],
    ["BALL_DISTRIBUTION", "MATCH_PRACTICE", "RECOVERY"],
    ["ATTACKING", "TRANSITION", "CHANCE_CREATION"],
    ["MATCH", "MATCH", "MATCH"],
    ["REST", "REST", "REST"],
  ];
  const days = ["MON","TUE","WED","THU","FRI","SAT","SUN"];

  const matchDays = !hasMatchThisWeek ? [] : (hasMidweekMatch ? [2, 5] : [5]);

// ============================================================
// REAL UEFA 2026 QUALIFYING STRUCTURE
// 12 groups (A-F: 4 teams: G-L: 5 teams). Group winners qualify directly.
// Runners-up + 4 designated "Nations League" picks -> 16-team playoff,
// split into 4 paths of 4 teams each (2 single-leg semis + 1 single-leg final).
// Note: Group I includes Israel as the 5th team, matching the real draw.
// ============================================================
const UEFA_GROUPS_REAL = {
  A: ["GER", "LUX", "NIR", "SVK"],
  B: ["SUI", "KOS", "SVN", "SWE"],
  C: ["BLR", "DEN", "GRE", "SCO"],
  D: ["AZE", "FRA", "ISL", "UKR"],
  E: ["BUL", "GEO", "ESP", "TUR"],
  F: ["ARM", "HUN", "POR", "IRL"],
  G: ["FIN", "LTU", "MLT", "NED", "POL"],
  H: ["AUT", "BIH", "CYP", "ROU", "SMR"],
  I: ["EST", "ISR", "ITA", "MDA", "NOR"],
  J: ["BEL", "KAZ", "LIE", "MKD", "WAL"],
  K: ["ALB", "AND", "ENG", "LVA", "SRB"],
  L: ["CRO", "CZE", "FRO", "GIB", "MNE"],
};
// The 4 "best Nations League group winners" who join the 12 runners-up in the
// playoff bracket — picked from teams that didn't win or finish 2nd in their group.
const UEFA_NATIONS_LEAGUE_PICKS = ["NIR", "MKD", "ROU", "SVK"];

// Builds the 12 real UEFA groups (fixed real-world membership, not random seeding).
function buildUefaRealGroups() {
  return Object.entries(UEFA_GROUPS_REAL).map(([letter, ids]) => {
    const groupTeams = ids.map(findTeam).filter(Boolean);
    const standings = {};
    groupTeams.forEach(t => standings[t.id] = emptyStanding(t));
    return {
      name: `Group ${letter}`,
      teams: groupTeams,
      standings,
      schedule: generateDoubleRoundRobin(groupTeams),
      matchdayIndex: 0,
      results: [],
    };
  });
}

// Once all 12 UEFA groups are complete, build the 16-team playoff: 12 runners-up
// + 4 Nations League picks, split into 4 paths of 4 (seeded: Pot1 hosts Pot4, Pot2 hosts Pot3).
function buildUefaPlayoffs(groups) {
  const runnersUp = groups.map(g => {
    const ranked = sortStandings(Object.values(g.standings));
    return ranked[1].team; // 2nd place
  });
  const nlPicks = UEFA_NATIONS_LEAGUE_PICKS.map(findTeam).filter(Boolean);
  const allSixteen = [...runnersUp, ...nlPicks];
  // Sort by rating as a stand-in for FIFA ranking/seeding, split into 4 pots of 4
  const sorted = [...allSixteen].sort((a, b) => b.rating - a.rating);
  const pots = [[], [], [], []];
  sorted.forEach((t, i) => pots[Math.floor(i / 4)].push(t));
  // 4 paths: Pot1 hosts Pot4 in semi 1, Pot2 hosts Pot3 in semi 2, winners meet in the final
  const paths = ["A", "B", "C", "D"].map((letter, i) => ({
    letter,
    semi1: { home: pots[0][i], away: pots[3][i], result: null },
    semi2: { home: pots[1][i], away: pots[2][i], result: null },
    final: null, // { home, away, result } - filled once both semis are done
  }));
  return { paths, stage: "SEMIS" };
}

// Advances one calendar day, applying whatever session(s) that day's weekly
// schedule has scheduled across the S1/S2/ES rows. The Tactical session (when
// present) trains the player's currently-selected formation; everything else
// applies its fitness/fatigue/familiarity/morale deltas directly. Match days
// in the schedule are skipped here entirely — actually playing the fixture is
// what advances those, not this function.
function applyTrainingDay(campaign, focus=null){
  if (!campaign.calendar) campaign.calendar = initTrainingCalendar();
  const cal = campaign.calendar;
  if ((cal.trainingUsedThisWindow ?? 0) >= (cal.trainingLimitPerWindow ?? 2)) {
    return false; // budget exhausted for this fixture window — caller should not call this again until reset
  }
  const team = findTeam(campaign.playerTeamId); const roster = ROSTERS[team.id];
  const players = [...(roster.startingXI||[]), ...(roster.bench||[])];
  const todaysSessions = cal.week[cal.weekDayIndex % 7]?.sessions || ["RECOVERY", "RECOVERY", "RECOVERY"];
  const isRestDay = todaysSessions.every(s => s === "REST");
  // Backward-compatible legacy focus param (old simple buttons) maps onto a
  // single session type, used if the caller still passes one explicitly.
  const legacyMap = { rest:"REST", balanced:"MATCH_PRACTICE", shooting:"ATTACKING", passing:"BALL_DISTRIBUTION", shape:"TACTICAL" };
  const sessionsToApply = focus && legacyMap[focus] ? [legacyMap[focus]] : todaysSessions;
  const tacticalFormation = cal.selectedTacticalFormation || roster.formation;
  sessionsToApply.forEach(key => {
    const session = SESSION_TYPES[key];
    if (!session) return;
    players.forEach(p=>{
      p.fitness = clamp((p.fitness ?? 100) + session.fitnessDelta, 35, 100);
      p.fatigue = clamp((p.fatigue ?? 0) + session.fatigueDelta, 0, 100);
      p.familiarity = clamp((p.familiarity ?? 55) + session.familiarityDelta * 0.6, 0, 100);
      if (key === "ATTACKING" && ["ST","LW","RW","CAM"].includes(p.pos)) p.shot = clamp((p.shot||p.rating)+0.6,1,99);
      if (key === "BALL_DISTRIBUTION" && ["CM","CDM","CAM","RB","LB"].includes(p.pos)) p.pass = clamp((p.pass||p.rating)+0.6,1,99);
      if (Math.random()<0.012 && key !== "REST" && key !== "RECOVERY") p.fitness = clamp(p.fitness-18, 20, 100);
    });
    if (key === "TACTICAL") trainFormationFamiliarity(team, tacticalFormation, 4);
    if (roster.morale != null) roster.morale = clamp(roster.morale + session.moraleDelta, 5, 99);
  });
  driftMoraleTowardNeutral(team, 0.6);
  cal.day++;
  cal.weekDayIndex = (cal.weekDayIndex + 1) % 7;
  if (cal.weekDayIndex === 0) { cal.weekIndex = (cal.weekIndex||0) + 1; cal.week = buildTrainingWeek(cal.weekIndex, false); }
  cal.trainingUsedThisWindow = (cal.trainingUsedThisWindow ?? 0) + 1;
  const remaining = cal.trainingLimitPerWindow - cal.trainingUsedThisWindow;
  const sessionLabel = sessionsToApply.map(k=>SESSION_TYPES[k]?.label || k).join(' / ');
  cal.log.unshift(`${sessionLabel} complete · squad fitness/fatigue/familiarity updated · ${remaining} training action${remaining===1?'':'s'} left before next fixture`);
  return true;
}
// Lets the player pick which formation the week's Tactical session focuses
// on — this is what actually drives the tacticalFamiliarity system, distinct
// from just playing matches in a shape (which gives a smaller passive bump).
function setTrainingFormationFocus(campaign, formationKey) {
  if (!campaign.calendar) campaign.calendar = initTrainingCalendar();
  campaign.calendar.selectedTacticalFormation = formationKey;
}
// Lets the player rearrange the weekly schedule themselves — swap which
// session type runs on a given day/unit-row cell. Match days are fixed (you
// can't train instead of playing the actual fixture) so this only ever
// touches non-match cells.
function setTrainingSession(campaign, dayIndex, unitRowIdx, sessionKey) {
  if (!campaign.calendar) campaign.calendar = initTrainingCalendar();
  const day = campaign.calendar.week[dayIndex];
  if (!day || day.isMatchDay) return false;
  if (!SESSION_TYPES[sessionKey]) return false;
  day.sessions[unitRowIdx] = sessionKey;
  return true;
}
// One-click week presets for players who don't want to manually edit every cell.
// They never overwrite match-day cells; those remain fixed fixture blocks.
const TRAINING_PRESETS = {
  BALANCED: [
    ["RESISTANCE","RECOVERY","POSSESSION"],["TACTICAL","DEFENDING","GROUND_DEFENCE"],["BALL_DISTRIBUTION","MATCH_PRACTICE","RECOVERY"],
    ["ATTACKING","TRANSITION","DEFENDING"],["MATCH_FOCUS","CHANCE_CREATION","MATCH_PRACTICE"],["REST","REST","REST"],["RECOVERY","ENDURANCE","RECOVERY"]
  ],
  TACTICAL_CAMP: [
    ["TACTICAL","POSSESSION","RECOVERY"],["TACTICAL","DEFENDING","GROUND_DEFENCE"],["BALL_DISTRIBUTION","TACTICAL","RECOVERY"],
    ["ATTACKING","TRANSITION","TACTICAL"],["MATCH_FOCUS","CHANCE_CREATION","MATCH_PRACTICE"],["REST","REST","REST"],["RECOVERY","TACTICAL","RECOVERY"]
  ],
  RECOVERY: [
    ["RECOVERY","REST","POSSESSION"],["RECOVERY","TACTICAL","REST"],["MATCH_PRACTICE","RECOVERY","REST"],
    ["RECOVERY","DEFENDING","REST"],["MATCH_FOCUS","RECOVERY","REST"],["REST","REST","REST"],["RECOVERY","RECOVERY","REST"]
  ],
  HIGH_INTENSITY: [
    ["RESISTANCE","ENDURANCE","POSSESSION"],["TACTICAL","TRANSITION","DEFENDING"],["BALL_DISTRIBUTION","MATCH_PRACTICE","CHANCE_CREATION"],
    ["ATTACKING","TRANSITION","DEFENDING"],["MATCH_FOCUS","CHANCE_CREATION","MATCH_PRACTICE"],["REST","REST","REST"],["RECOVERY","ENDURANCE","RECOVERY"]
  ],
};
function applyTrainingPreset(campaign, presetKey) {
  if (!campaign.calendar) campaign.calendar = initTrainingCalendar();
  const preset = TRAINING_PRESETS[presetKey];
  if (!preset) return false;
  campaign.calendar.week = campaign.calendar.week.map((day, idx) => day.isMatchDay ? day : ({ ...day, sessions: [...preset[idx % 7]] }));
  campaign.calendar.log.unshift(`${presetKey.replace('_',' ')} week loaded — match days stayed locked.`);
  return true;
}

// Called once a matchday has actually been played, to open up a fresh training window for the next fixture.
// Also advances the calendar so the day counter progresses with each match played.
function resetTrainingWindow(campaign){
  if (!campaign.calendar) return;
  const cal = campaign.calendar;
  cal.trainingUsedThisWindow = 0;
  // Advance the calendar: skip forward past any remaining days in current week to next
  // match block. Per game rules: 2 training days → match → 2 training days → match.
  // Each call represents one match played, so we advance 3 days (2 train + match).
  const DAYS_PER_MATCH_CYCLE = 3; // 2 training + 1 match day
  for (let i = 0; i < DAYS_PER_MATCH_CYCLE; i++) {
    cal.day++;
    cal.weekDayIndex = (cal.weekDayIndex + 1) % 7;
    if (cal.weekDayIndex === 0) {
      cal.weekIndex = (cal.weekIndex || 0) + 1;
      cal.week = buildTrainingWeek(cal.weekIndex, false);
    }
  }
  cal.log.unshift(`Matchday played — Day ${cal.day} · Training window reset (${cal.trainingLimitPerWindow} sessions available before next match).`);
}

// How much a counter relationship swings xG (applied on top of base modifiers)
const COUNTER_BONUS = 0.12;

function tacticCounterModifier(myTacticKey, oppTacticKey) {
  const mine = TACTICS[myTacticKey];
  if (!mine) return 0;
  if (mine.beats.includes(oppTacticKey)) return COUNTER_BONUS;
  if (mine.beatenBy.includes(oppTacticKey)) return -COUNTER_BONUS;
  return 0;
}

// Pick a plausible tactic for an AI-controlled team, loosely tied to its rating
// profile so stronger teams lean possession/press, weaker teams lean defensive,
// with randomness so it's not deterministic.
function pickAiTactic(team) {
  const r = team.rating;
  let pool;
  if (r >= 72) pool = ["TIKI_TAKA", "GEGENPRESS", "WING_PLAY", "FLUID_COUNTER"];
  else if (r >= 62) pool = ["WING_PLAY", "FLUID_COUNTER", "COUNTER_ATTACK", "DIRECT", "GEGENPRESS"];
  else if (r >= 52) pool = ["COUNTER_ATTACK", "DIRECT", "CATENACCIO", "FLUID_COUNTER"];
  else pool = ["PARK_THE_BUS", "CATENACCIO", "COUNTER_ATTACK"];
  return pool[Math.floor(Math.random() * pool.length)];
}

function pickAiFormation(team) {
  const keys = Object.keys(FORMATIONS);
  return keys[Math.floor(Math.random() * keys.length)];
}

  cornerAim: [['NEAR_POST','Near Post'],['FAR_POST','Far Post'],['CENTRE','Centre'],['EDGE','Edge of Area']],
  freeKickStyle: [['SHOT','Shoot Direct'],['CROSS','Cross'],['MIXED','Mixed']],
  throwInStyle: [['SAFE','Safe'],['QUICK','Quick'],['LONG','Long Throw']],
};
function defaultSetPieceTactics(){ return { ...SET_PIECE_ROUTINE_PRESETS.BALANCED }; }
function setPieceXgModifier(sp = {}) {
  let mod = 0;
  if ((sp.cornerFrequency||2) >= 3) mod += 0.05;
  if ((sp.cornerFrequency||2) <= 1) mod -= 0.03;
  if ((sp.aerialThreats||4) >= 5) mod += 0.04;
  if ((sp.recoveryDefenders||3) <= 2) mod += 0.03;
  if ((sp.recoveryDefenders||3) >= 5) mod -= 0.03;
  if (sp.cornerDelivery === 'SHORT' && sp.cornerAim === 'EDGE') mod += 0.02;
  if (sp.freeKickStyle === 'SHOT') mod += 0.02;
  return clamp(mod, -0.08, 0.16);
}
function setPieceCornerEventMultiplier(sp = {}) {
  return clamp(0.75 + (sp.cornerFrequency||2)*0.22 + ((sp.aerialThreats||4)-4)*0.08, 0.7, 1.55);
}
function describeSetPieceRoutine(sp = {}) {
  const label = Object.values(SET_PIECE_ROUTINE_PRESETS).find(p =>
    p.cornerDelivery===sp.cornerDelivery && p.cornerAim===sp.cornerAim && p.cornerFrequency===sp.cornerFrequency
  )?.label || 'Custom routine';
  return `${label} · ${sp.cornerDelivery||'MIXED'} to ${sp.cornerAim||'CENTRE'} · threat ${sp.aerialThreats||4}, cover ${sp.recoveryDefenders||3}`;
}


// Extra fatigue burn from active team instructions (stacks multiplicatively, mild).
function teamInstructionFatigueMultiplier(activeKeys = []) {
  return (activeKeys || []).reduce((mult, key) => {
    const instr = TEAM_INSTRUCTIONS[key];
    return instr ? mult * instr.fatigueMod : mult;
  }, 1.0);
}
// Small xG nudge from active team instructions — these are tactical flavour,
// not the main driver of the scoreline (the base tactic + ratings still are).
function teamInstructionXgModifier(activeKeys = []) {
  return (activeKeys || []).reduce((sum, key) => sum + (TEAM_INSTRUCTIONS[key]?.xgMod || 0), 0);
}
function teamInstructionCardMultiplier(activeKeys = []) {
  return (activeKeys || []).reduce((mult, key) => {
    const instr = TEAM_INSTRUCTIONS[key];
    return instr && instr.cardMod ? mult * instr.cardMod : mult;
  }, 1.0);
}

// Fouls committed AGAINST a team scale up with how physically aggressive
// their own set-piece routine is (more aerial threats sent forward = more
// bodies competing in the box = more whistles), and with "Dive In More"
// raising contact across the whole match, not just at set pieces.
// This is the team's OWN instructions feeding into fouls THEY commit —
// i.e. the more aggressive you set your own team up, the more free kicks
// you concede, mirroring how committing to physical set-piece play and
// hard tackling draws more whistles against you in real football.
function foulMultiplierFromSetup(activeInstrKeys = [], setPieces = {}) {
  let mult = teamInstructionCardMultiplier(activeInstrKeys);
  const aerial = setPieces.aerialThreats ?? 4;
  const recovery = setPieces.recoveryDefenders ?? 3;
  // Sending extra bodies forward for corners/free kicks means more shirt-pulling,
  // blocking runs, and box-crashing contact — a real source of fouls conceded.
  if (aerial >= 5) mult *= 1.10;
  if (aerial <= 3) mult *= 0.95;
  // Fewer recovery defenders means scrambling, mistimed challenges on the
  // counter when a set piece breaks down — another small foul bump.
  if (recovery <= 2) mult *= 1.06;
  if ((setPieces.cornerFrequency ?? 2) >= 3) mult *= 1.05;
  return clamp(mult, 0.6, 2.2);
}

// LINE HEIGHT (depth, 0=very deep low block, 100=very high press line) and
// WIDTH (0=narrow/compact, 100=very wide/stretched) are simple 0-100 sliders.
// Depth drives the offside trap: a high line wins more offsides but is more
// exposed to balls played in behind. Width drives crossing/wing-play goal
// supply: wide shapes generate more crosses and headers; narrow shapes funnel
// play through the middle (more cutbacks, more "worked into the box" goals).
function offsideTrapChance(depth) {
  // High line (depth toward 100) snags more attackers offside; deep lines almost never do.
  return clamp(0.02 + (depth / 100) * 0.16, 0.01, 0.20);
}
function depthVulnerabilityModifier(myDepth, oppPace) {
  // Playing a high line against a quick attacking line is a double-edged sword:
  // more offside traps sprung, but more balls played in behind that punish a high back four.
  const highLineRisk = clamp((myDepth - 50) / 50, -1, 1) * 0.05;
  return highLineRisk;
}
function widthGoalTypeWeights(width) {
  // Returns extra weighting toward wide/crossing goals (high width) vs central/
  // cutback goals (low width), to be blended into the goal-type generator.
  const wideBias = clamp((width - 50) / 50, -1, 1);
  return {
    HEADER: 1 + Math.max(0, wideBias) * 1.4,
    TAP_IN: 1 + Math.max(0, -wideBias) * 0.8,
    COOL_FINISH: 1 + Math.max(0, -wideBias) * 0.5,
  };
}

// PLAYER / LINEUP HELPERS

const PLAYER_INSTRUCTIONS = ["Balanced", "Stay Back", "Get Forward", "Cut Inside", "Hold Width", "Press More", "Man Mark", "Free Roam"];
const GK_INSTRUCTIONS = ["Balanced", "Distribute Short", "Distribute Long", "Hold Position", "Sweep", "Command Area"];
const SUB_LIMIT = 5;
const SUB_WINDOW_LIMIT = 3;

// How much extra fatigue a tactic's intensity burns into players over 90 minutes.
// Built from each tactic's tempo (higher tempo = more running) with an extra
// surcharge for genuinely high-press systems (Gegenpress is the most demanding).
function tacticFatigueMultiplier(tacticKey) {
  const t = TACTICS[tacticKey];
  if (!t) return 1.0;
  let mult = 1.0 + clamp(t.tempo, -0.25, 0.30) * 0.9;
  if (tacticKey === "GEGENPRESS") mult += 0.32; // relentless high press, by far the most tiring
  if (tacticKey === "DIRECT") mult += 0.06; // more transitions, more sprinting
  if (tacticKey === "PARK_THE_BUS" || tacticKey === "CATENACCIO") mult -= 0.12; // sit deep, conserve energy
  return clamp(mult, 0.55, 1.7);
}
// Per-player instructions that demand extra running/pressing burn more fatigue individually.
function instructionFatigueMultiplier(instruction) {
  switch (instruction) {
    case "Press More": return 1.35;
    case "Man Mark": return 1.28; // tracking a specific opponent all match is draining
    case "Get Forward": return 1.12;
    case "Free Roam": return 1.08;
    case "Stay Back": return 0.92;
    default: return 1.0;
  }
}

function playerKey(team, player) { return `${team.id}:${player.name}`; }
function availabilityStore() {
  window.__RTC_AVAIL = window.__RTC_AVAIL || { suspensions:{}, injuries:{}, yellows:{} };
  return window.__RTC_AVAIL;
}
function isPlayerUnavailable(team, player) {
  const st = availabilityStore();
  const key = playerKey(team, player);
  if ((st.suspensions[key] || 0) > 0) return { blocked:true, reason:`Suspended ${st.suspensions[key]} match` };
  if ((st.injuries[key] || 0) > 0) return { blocked:true, reason:`Injured ${st.injuries[key]} match` };
  return { blocked:false, reason:"" };
}
function advanceAvailabilityOneMatch(teamIds = null) {
  const st = availabilityStore();
  [st.suspensions, st.injuries].forEach(map => {
    Object.keys(map).forEach(k => {
      if (!teamIds || teamIds.includes(k.split(':')[0])) {
        map[k] -= 1;
        if (map[k] <= 0) delete map[k];
      }
    });
  });
}
function applyPostMatchAvailability(match) {
  const st = availabilityStore();
  (match.events || []).forEach(ev => {
    const team = ev.isHome ? match.homeTeam : match.awayTeam;
    const name = ev.player || ev.scorer || ev.cardPlayer || ev.injuryPlayer;
    if (!name) return;
    const key = `${team.id}:${name}`;
    if (ev.type === 'yellow') { st.yellows[key] = (st.yellows[key] || 0) + 1; if (st.yellows[key] >= 2) { st.suspensions[key] = Math.max(st.suspensions[key] || 0, 2); st.yellows[key] = 0; } }
    if (ev.type === 'red') st.suspensions[key] = Math.max(st.suspensions[key] || 0, 2);
    if (ev.type === 'injury') st.injuries[key] = Math.max(st.injuries[key] || 0, 2 + Math.floor(Math.random()*2));
  });
}

// Works out how many minutes each named player actually spent on the pitch this
// match, using the starting lineup, full-time (or red-card minute, if known) and
// any substitutions logged in match.subLog ({minute, teamId, outName, inName}).
// Players never used at all (an unused bench player) simply don't appear here,
// which is exactly what we want: zero entries -> zero fatigue/fitness change.
function computeMinutesPlayed(match) {
  const fullTime = match.wentToPens ? 120 : 90; // extra-time legs in knockouts run longer
  const minutes = {}; // name -> minutes played
  const offMinute = {}; // name -> minute they left the pitch (red card), if any
  (match.events || []).forEach(ev => {
    if (ev.type === 'red' && ev.player) offMinute[ev.player] = Math.min(offMinute[ev.player] ?? 999, ev.minute);
  });
  function trackStarter(name) {
    if (!name) return;
    const cappedEnd = Math.min(fullTime, offMinute[name] ?? fullTime);
    minutes[name] = (minutes[name] || 0) + Math.max(0, cappedEnd);
  }
  function trackSub(name, onMinute) {
    if (!name) return;
    const cappedEnd = Math.min(fullTime, offMinute[name] ?? fullTime);
    minutes[name] = (minutes[name] || 0) + Math.max(0, cappedEnd - onMinute);
  }
  const homeXI = match.homeLineup || safeDefaultXI(match.homeTeam);
  const awayXI = match.awayLineup || safeDefaultXI(match.awayTeam);
  const subLog = match.subLog || [];
  // Anyone subbed OFF only played up until their sub-off minute, not the full match.
  const subOffMinute = {};
  subLog.forEach(s => { subOffMinute[s.outName] = Math.min(subOffMinute[s.outName] ?? 999, s.minute); });
  homeXI.forEach(p => {
    const subbedOffAt = subOffMinute[p.name];
    const cappedEnd = Math.min(fullTime, offMinute[p.name] ?? fullTime, subbedOffAt ?? fullTime);
    minutes[p.name] = Math.max(0, cappedEnd);
  });
  awayXI.forEach(p => {
    const subbedOffAt = subOffMinute[p.name];
    const cappedEnd = Math.min(fullTime, offMinute[p.name] ?? fullTime, subbedOffAt ?? fullTime);
    minutes[p.name] = Math.max(0, cappedEnd);
  });
  subLog.forEach(s => trackSub(s.inName, s.minute));
  return minutes;
}

// ============================================================
// SQUAD MORALE
// ============================================================
// Morale (0-100, neutral ~60) persists across the whole campaign and compounds
// with results: a heavy loss tanks it, a big win lifts it, and between matches
// it slowly drifts back toward neutral rather than snapping back instantly.
// Per the requested examples: a 4-0 loss should knock morale down by roughly
// 30%, a 3-0 win should lift it by roughly 20% — modelled as a percentage
// swing scaled by goal difference and a smaller bump for a narrow result.
function moraleSwingForResult(goalsFor, goalsAgainst) {
  const gd = goalsFor - goalsAgainst;
  if (gd === 0) return -0.02; // a draw is mildly deflating, not neutral
  // Base swing scales with margin: a 1-goal result is a small nudge, a 3+ goal
  // margin is a big one. Calibrated so -4 maps to about -30% and +3 to about +20%.
  const magnitude = Math.min(Math.abs(gd), 6);
  const pct = gd > 0
    ? clamp(0.06 * magnitude + 0.02, 0.04, 0.32)
    : -clamp(0.07 * magnitude + 0.02, 0.04, 0.36);
  return pct;
}
function applyMoraleFromResult(team, goalsFor, goalsAgainst) {
  const roster = ROSTERS[team.id];
  if (!roster) return;
  if (roster.morale == null) roster.morale = 60;
  const pct = moraleSwingForResult(goalsFor, goalsAgainst);
  // Applied as a percentage swing of the current morale value (so it compounds:
  // back-to-back heavy losses hurt a side that's already low morale even more
  // in absolute terms is avoided by also adding a flat component tied to 60-base).
  const delta = pct * 60;
  roster.morale = clamp(Math.round((roster.morale + delta) * 10) / 10, 5, 99);
  // Player-level morale now moves with the dressing room, with a small role-based
  // swing: attackers get a little extra lift from wins and extra frustration after
  // blunt losses, defenders/GKs feel clean sheets or heavy concessions more sharply.
  const all = [...(roster.startingXI||[]), ...(roster.bench||[])];
  all.forEach(p => {
    if (p.morale == null) p.morale = roster.morale;
    let roleMult = 0.55;
    const pos = (p.pos||'').toUpperCase();
    if (["ST","LW","RW","CAM"].includes(pos)) roleMult += goalsFor > goalsAgainst ? 0.18 : 0.08;
    if (["GK","CB","LB","RB","CDM"].includes(pos)) roleMult += goalsAgainst === 0 ? 0.18 : (goalsAgainst >= 3 ? 0.16 : 0.04);
    p.morale = clamp(Math.round((p.morale + delta * roleMult) * 10) / 10, 5, 99);
  });
}
// Called once per training/rest day (and is safe to call on matchdays without
// a result too) to slowly pull morale back toward a neutral 60, so a single
// bad result doesn't permanently cripple a team — only sustained bad form does.
function driftMoraleTowardNeutral(team, amount = 1.2) {
  const roster = ROSTERS[team.id];
  if (!roster) return;
  if (roster.morale == null) { roster.morale = 60; return; }
  const neutral = 60;
  if (roster.morale > neutral) roster.morale = Math.max(neutral, roster.morale - amount);
  else if (roster.morale < neutral) roster.morale = Math.min(neutral, roster.morale + amount);
  [...(roster.startingXI||[]), ...(roster.bench||[])].forEach(p => {
    if (p.morale == null) p.morale = roster.morale;
    const target = roster.morale;
    if (p.morale > target) p.morale = Math.max(target, p.morale - amount*0.8);
    else if (p.morale < target) p.morale = Math.min(target, p.morale + amount*0.8);
  });
}
// Morale's effect on performance: above-neutral morale gives a small rating
// boost (confidence, sharper decision-making), well below neutral saps it —
// a shattered dressing room plays worse independent of fitness or tactics.
function moralePerformanceModifier(team) {
  const roster = ROSTERS[team.id];
  const squad = roster ? [...(roster.startingXI||[]), ...(roster.bench||[])] : [];
  const playerAvg = squad.length ? squad.reduce((a,p)=>a+(p.morale ?? roster.morale ?? 60),0)/squad.length : (roster?.morale ?? 60);
  const morale = ((roster?.morale ?? 60) * 0.65) + (playerAvg * 0.35);
  return clamp((morale - 60) / 9, -4.5, 3.5); // roughly -4.5..+3.5 rating points
}

// Applies fitness/fatigue changes from a played match. Crucially:
//  - Only players who actually stepped onto the pitch are touched at all.
//  - An unused substitute (never subbed on) gets NO change whatsoever.
//  - Minutes played scale the effect (a 10-minute cameo barely tires anyone;
//    a full 90 with a high-press instruction set is brutal).
//  - Tactic intensity (Gegenpress/Press More/Man Mark/etc.) multiplies the drain.
function applyMatchFatigue(match) {
  if (match._fatigueApplied) return;
  match._fatigueApplied = true;
  const minutesMap = computeMinutesPlayed(match);
  const pairs = [
    [match.homeTeam, match.tacticHome, match.instructionsHome || {}, match.teamInstructionsHome || []],
    [match.awayTeam, match.tacticAway, match.instructionsAway || {}, match.teamInstructionsAway || []],
  ];
  const tacticMult = {
    [match.homeTeam.id]: tacticFatigueMultiplier(match.tacticHome) * teamInstructionFatigueMultiplier(match.teamInstructionsHome || []),
    [match.awayTeam.id]: tacticFatigueMultiplier(match.tacticAway) * teamInstructionFatigueMultiplier(match.teamInstructionsAway || []),
  };
  pairs.forEach(([team, tacticKey, instructions]) => {
    const roster = ROSTERS[team.id];
    if (!roster) return;
    const allPlayers = [...(roster.startingXI||[]), ...(roster.bench||[])];
    allPlayers.forEach(p => {
      const mins = minutesMap[p.name] || 0;
      if (mins <= 0) return; // unused sub or didn't feature — leave fitness/fatigue untouched entirely
      const minuteFrac = mins / 90; // 1.0 for a full 90, ~0.11 for a 10-minute cameo, etc.
      const instructionMult = instructionFatigueMultiplier(instructions[p.name] || "Balanced");
      const totalMult = (tacticMult[team.id] || 1.0) * instructionMult;
      // A full, average-intensity 90 minutes costs roughly 22 fitness and adds ~30 fatigue;
      // high-press/heavy-instruction matches push noticeably harder than a conservative game.
      const fitnessDrop = 22 * minuteFrac * totalMult;
      const fatigueGain = 30 * minuteFrac * totalMult;
      p.fitness = clamp((p.fitness ?? 100) - fitnessDrop, 15, 100);
      p.fatigue = clamp((p.fatigue ?? 0) + fatigueGain, 0, 100);
    });
  });
}
// Between qualifying rounds there's a real off-camp gap (months, in reality) —
// so every time the player advances from one qualifying round to the next,
// the whole player squad's fitness/fatigue fully resets to fresh. This does
// NOT get called during the World Cup itself, where fixtures are only days
// apart and squads are expected to genuinely tire across the tournament.
function resetSquadFitness(teamId) {
  const roster = ROSTERS[teamId];
  if (!roster) return;
  [...(roster.startingXI||[]), ...(roster.bench||[])].forEach(p => {
    p.fitness = 100;
    p.fatigue = 0;
  });
}
// World Cup congestion: unlike qualifying, group-stage and knockout fixtures
// are only a handful of days apart, so fitness is only partially topped up
// between matches rather than fully reset — fatigue genuinely compounds the
// deeper a team goes, exactly as requested. Call this once per WC matchday
// transition (after a match, before the next one) instead of a full reset.
function applyWorldCupRecoveryGap(teamId, daysBetweenMatches = 4) {
  const roster = ROSTERS[teamId];
  if (!roster) return;
  // More days between matches = more recovery, but never a full reset — the
  // tournament's tight scheduling means squads arrive at the final stretch
  // carrying real accumulated fatigue if they've gone deep.
  const recoveryFactor = clamp(daysBetweenMatches / 10, 0.18, 0.55);
  [...(roster.startingXI||[]), ...(roster.bench||[])].forEach(p => {
    const fitnessGap = 100 - (p.fitness ?? 100);
    p.fitness = clamp((p.fitness ?? 100) + fitnessGap * recoveryFactor, 15, 100);
    p.fatigue = clamp((p.fatigue ?? 0) * (1 - recoveryFactor), 0, 100);
  });
}
function availableSquadFor(team) {
  return squadFor(team).map(p => ({...p, _availability:isPlayerUnavailable(team,p)}));
}

// ============================================================
// PLAYER AGING, DECLINE, RETIREMENT & REGENERATION
// ============================================================
// Called once per completed cycle (a full qualifying+World Cup run, win or
// lose) for every nation's roster. Models a simple but real career arc:
//  - Under 24: still developing, small chance of a genuine breakout improvement.
//  - 24-29 (prime): mostly stable, tiny natural variance.
//  - 30+: progressively larger decline, accelerating with age — exactly the
//    "as they get older some decline" behaviour requested.
//  - Past a threshold (scaled by position — keepers and CBs last longer than
//    pacey wide players), there's a real, rising chance of retirement each
//    cycle, and it's forced past 38 regardless of position.
// A cycle here is assumed to span ~3-4 real years (one World Cup cycle), so
// each call bumps age by that span — small enough not to need a per-day
// simulation, big enough to make veterans visibly age out over a few cycles.
const CYCLE_YEARS = 4;
// Hard retirement age: any outfield player reaching 35+ must retire this
// cycle regardless of position. Keepers get slightly longer (38+). This
// stops the situation where you get 10+ retirements per cycle since the
// probability curve was previously triggering on too many players.
function mustRetire(age, pos) {
  if (pos === 'GK') return age >= 38;
  return age >= 35;
}
// Optional early retirement: only players 34+ may retire early (never below 34).
// Probability scales up from 34 onward — capped so only 1-3 players leave per team.
function mayRetireEarly(age, pos) {
  if (age < 34) return 0;          // HARD RULE: no early retirement under 34
  if (age >= 36) return 0.18;
  if (age >= 35) return 0.10;
  return 0.05;                      // age 34: small chance only
}

// Rating delta per cycle now accounts for form: a player who performed well
// in the tournament (form > 2) can see their rating go up even in their
// early 30s, reflecting earned tournament experience rather than pure
// biological decline. Only players in sharp decline (age 35+) always drop.
function ageRatingDelta(age, form) {
  const formBonus = clamp((form ?? 0) * 0.4, -1, 2.5); // good tournament = up to +2.5 extra
  if (age <= 20) {
    const base = Math.random() < 0.35 ? (2 + Math.floor(Math.random()*4)) : Math.round(Math.random()*2);
    return base + formBonus;
  }
  if (age <= 23) {
    const base = Math.random() < 0.2 ? (1 + Math.floor(Math.random()*3)) : (Math.round(Math.random()*2)-1);
    return base + formBonus;
  }
  if (age <= 27) return Math.round(Math.random()*3) - 1 + formBonus; // prime — flat to slightly up
  if (age <= 30) return Math.round(Math.random()*2) - 1 + formBonus * 0.7; // slight taper
  if (age <= 33) return (-(Math.floor(Math.random()*2))) + formBonus * 0.5; // 0 to -1, form can offset
  if (age <= 35) return -(1 + Math.floor(Math.random()*2)); // definite decline, form less relevant
  return -(3 + Math.floor(Math.random()*3)); // 35+: sharp drop regardless
}

function v7GenerateReplacementPlayer(team, pos, squadAvgRating) {
  const region = v7RegionForTeam(team.id);
  const realPick = v7RandomRealNamePair(team.id);
  const first = realPick ? realPick.first : v7RandomFirstName(region);
  const last = realPick ? realPick.last : v7RandomSurname(team.id, region);
  const age = 18 + Math.floor(Math.random()*3); // 18-20 realistic academy age
  const ratingGap = Math.random() < 0.1 ? (1 + Math.random()*4) : -(3 + Math.random()*9);
  const rating = clamp(Math.round(squadAvgRating + ratingGap), 50, 86);
  const att = v7AttributesFromRating(rating, pos);
  return { name: `${first} ${last}`, pos, rating, age, fitness: 100, fatigue: 0, form: 0, familiarity: 55, morale: 60, ...att, _generated: true };
}

// Runs one full cycle of aging across a single roster. Key constraints:
//  • Any player aged 35+ is forced to retire (GK 38+)
//  • Early optional retirements capped so max 1-4 players leave per team
//  • Form carried into rating delta — strong tournament performers can improve
function ageRosterOneCycle(team) {
  const roster = ROSTERS[team.id];
  if (!roster) return null;
  const report = { retired: [], aged: [], generated: [] };
  const allPlayers = [...(roster.startingXI||[]), ...(roster.bench||[])];
  const squadAvg = allPlayers.reduce((a,p)=>a+(+p.rating||60),0) / Math.max(1, allPlayers.length);

  // Count forced retirees first, then allow a small number of optional early retirements
  const maxOptionalRetirements = Math.floor(1 + Math.random()*3); // 1-3 optional on top of forced
  let optionalRetired = 0;

  function processPlayer(p) {
    const newAge = (p.age ?? 26) + CYCLE_YEARS;
    const form = p.form ?? 0;
    const forced = mustRetire(newAge, p.pos);
    const optional = !forced && optionalRetired < maxOptionalRetirements && Math.random() < mayRetireEarly(newAge, p.pos);
    if (forced || optional) {
      if (optional) optionalRetired++;
      report.retired.push({ name: p.name, age: newAge, pos: p.pos, rating: p.rating, forced });
      const replacement = v7GenerateReplacementPlayer(team, p.pos, squadAvg);
      report.generated.push(replacement);
      return replacement;
    }
    const delta = Math.round(ageRatingDelta(newAge, form));
    const newRating = clamp((+p.rating || 60) + delta, 40, 96);
    report.aged.push({ name: p.name, oldAge: p.age ?? 26, newAge, oldRating: p.rating, newRating, delta });
    const updated = { ...p, age: newAge, rating: newRating, form: 0 }; // reset form for new cycle
    if (delta !== 0) {
      ["pace","shot","pass","drib","def","phys","div","ref","han","spe","kic","gkpos"].forEach(attr => {
        if (updated[attr] != null) updated[attr] = clamp(updated[attr] + Math.round(delta * 0.65), 18, 96);
      });
    }
    return updated;
  }

  roster.startingXI = (roster.startingXI || []).map(processPlayer);
  roster.bench = (roster.bench || []).map(processPlayer);
  return report;
}

function ageAllRostersOneCycle() {
  const reports = {};
  v7AllTeams().forEach(team => {
    v7EnsureRoster(team);
    reports[team.id] = ageRosterOneCycle(team);
  });
  return reports;
}

function fifaFallbackPointsForRank(rank) {

function initRankingsIfNeeded() {

    cs.teamRankPts = {};

  FIFA_RANKING_ORDER.forEach((id, idx) => orderRank[id] = idx + 1);
  teams.forEach(t => {

      const r = orderRank[t.id];
      cs.teamRankPts[t.id] = FIFA_REAL_RANKING_PTS[t.id] != null
        ? FIFA_REAL_RANKING_PTS[t.id]

// Fitness/fatigue penalty applied on top of base rating + form. A player at full

// builds, the penalty grows — tired legs make worse decisions and lose duels.
function fitnessRatingPenalty(player) {
  const fitness = player.fitness ?? 100;

  return Math.round((fitnessLoss * 9 + fatigueLoss * 6) * 10) / 10;

// POSITIONAL FAMILIARITY SYSTEM
// Each position has a compatibility map showing how well a player performs
// when played out of position. 100 = natural, lower = penalty applies.
// altPos array on a player lists additional positions they can play.
// ============================================================
const POSITIONAL_FAMILIARITY = {
  GK:  { GK:100, CB:20, LB:10, RB:10 },
  CB:  { CB:100, LB:75, RB:75, CDM:60, GK:15 },
  LB:  { LB:100, CB:72, RB:65, LM:60, LW:55, CDM:50, RB:60 },
  RB:  { RB:100, CB:72, LB:65, RM:60, RW:55, CDM:50, LB:60 },
  CDM: { CDM:100, CM:80, CB:65, LB:55, RB:55, CAM:45 },
  CM:  { CM:100, CDM:80, CAM:80, LM:65, RM:65, LB:45, RB:45 },
  CAM: { CAM:100, CM:80, SS:80, LW:65, RW:65, ST:55, CDM:40 },
  LM:  { LM:100, LW:90, CM:70, LB:60, CAM:60 },
  RM:  { RM:100, RW:90, CM:70, RB:60, CAM:60 },
  LW:  { LW:100, LM:90, CAM:70, ST:65, RW:55, LB:50 },
  RW:  { RW:100, RM:90, CAM:70, ST:65, LW:55, RB:50 },
  SS:  { SS:100, CAM:85, ST:80, LW:65, RW:65 },
  ST:  { ST:100, LW:65, RW:65, CAM:60, SS:80 },
};

// Returns 0-100 familiarity % for a player playing a given position.
// Uses player's primary pos and altPos list.
function getPositionalFamiliarity(player, playingPos) {
  const primaryPos = (player.pos || 'CM').toUpperCase();
  const pos = (playingPos || primaryPos).toUpperCase();
  if (primaryPos === pos) return 100;
  // Check altPos list first — if in altPos, treat as near-natural (90%)
  const altPos = (player.altPos || []).map(p => p.toUpperCase());
  if (altPos.includes(pos)) return 90;
  // Fall back to compatibility table
  const compat = POSITIONAL_FAMILIARITY[primaryPos];
  if (compat && compat[pos] != null) return compat[pos];
  // Default cross-position penalty
  return 35;
}

// Returns a rating penalty (-0 to -8) for playing out of position.
function positionalFamiliarityPenalty(player, playingPos) {
  const fam = getPositionalFamiliarity(player, playingPos);
  if (fam >= 100) return 0;
  if (fam >= 90) return -0.5;
  if (fam >= 75) return -1.5;
  if (fam >= 60) return -3;
  if (fam >= 45) return -5;
  return -8;
}

function positionalAttributeFit(player) {
  const pos = (player.pos || '').toUpperCase();
  const g = (k) => player[k] ?? 60;
  let relevant;
  if (pos === 'GK') relevant = [g('gk')];
  else if (pos === 'CB') relevant = [g('def'), g('phys')];
  else if (pos === 'LB' || pos === 'RB') relevant = [g('def'), g('pace')];
  else if (pos === 'CDM') relevant = [g('def'), g('pass')];
  else if (pos === 'CM') relevant = [g('pass'), g('drib')];
  else if (pos === 'CAM') relevant = [g('pass'), g('drib'), g('shot')];
  else if (pos === 'LW' || pos === 'RW') relevant = [g('pace'), g('drib')];
  else if (pos === 'ST') relevant = [g('shot'), g('pace')];
  else return 0;
  const avg = relevant.reduce((a,b)=>a+b,0) / relevant.length;
  return clamp((avg - 60) / 12, -3, 3.5);
}
function effectivePlayerRating(team, player, playingPos=null) {
  const posPenalty = positionalFamiliarityPenalty(player, playingPos || player.pos);
  const base = (+player.rating || team.rating || 60) + playerForm(team, player) + positionalAttributeFit(player) + posPenalty;
  const playerMorale = player.morale ?? ROSTERS[team.id]?.morale ?? 60;
  const moraleBoost = clamp((playerMorale - 60) / 18, -2.8, 2.2);
  return clamp(Math.round(base + moraleBoost - fitnessRatingPenalty(player)), 35, 99);
}
function updatePlayerFormFromMatch(match) {
  const cs = careerStore();
  [[match.homeTeam, match.playerStatsHome||{}], [match.awayTeam, match.playerStatsAway||{}]].forEach(([team, stats]) => {
    Object.values(stats).forEach(st => {
      const key = playerKey(team, st.player);
      const rating = +st.rating || 6.5;
      let delta = 0;
      if (rating >= 8.5) delta = 2;
      else if (rating >= 7.4) delta = 1;
      else if (rating <= 5.7) delta = -2;
      else if (rating <= 6.2) delta = -1;
      if ((st.goals||0) + (st.assists||0) >= 2) delta += 1;
      if ((st.red||0) > 0 || (st.injuries||0) > 0) delta -= 1;
      cs.playerForm[key] = clamp((cs.playerForm[key] || 0) * 0.72 + delta, -8, 8);
    });
  });

// Real FIFA Men's World Ranking algorithm (the "SUM" method FIFA adopted in
// August 2018, developed with mathematicians from the Royal Statistical
// Society — the actual formula behind the official rankings, not just an
// approximation). Points = Pbefore + I × (W − We):
//   I  = match importance (FIFA's own fixed values per competition tier)
//   W  = actual result (1 win, 0.5 draw, 0 loss) — extra-time/penalty
//        shootout wins in a knockout count as a draw (0.5) for THIS step,
//        matching FIFA's actual rule that shootouts don't grant a full win
//        bonus on the ranking calculation itself
//   We = expected result, from the FIFA-defined logistic curve on the
//        points difference (dr), capped at the same ±2000 FIFA uses
function fifaExpectedResult(dr) {
  // FIFA's published curve: We = 1 / (10^(-dr/600) + 1)
  const d = clamp(dr, -2000, 2000);
  return 1 / (Math.pow(10, -d / 600) + 1);
}
// FIFA's official importance (I) values by match type.
const FIFA_MATCH_IMPORTANCE = {
  FRIENDLY: 5,
  NATIONS_LEAGUE: 15,
  QUALIFIER: 25,        // World Cup / continental championship qualifiers
  CONTINENTAL_FINALS: 35, // AFCON/Euro/Copa America/Gold Cup/Asian Cup finals
  WC_PLAYOFF: 35,
  WC_FINALS: 50,         // World Cup finals tournament matches
};
function updateWorldRankingsFromMatch(match) {
  const pts = initRankingsIfNeeded();
  const h = match.homeTeam, a = match.awayTeam;
  const hp = pts[h.id] != null ? pts[h.id] : 1000;
  const ap = pts[a.id] != null ? pts[a.id] : 1000;
  const dr = hp - ap; // points difference, home perspective
  const We = fifaExpectedResult(dr);
  // Actual result. A shootout win in a knockout is recorded as a draw (0.5)
  // for the ranking step itself, per FIFA's real rule — the trophy/progress
  // still goes to the shootout winner, but the ranking treats 90+30 minutes
  // level as a drawn result mathematically.
  let W;
  if (match.wentToPens) W = 0.5;
  else if (match.goalsHome > match.goalsAway) W = 1;
  else if (match.goalsHome < match.goalsAway) W = 0;
  else W = 0.5;
  const I = FIFA_MATCH_IMPORTANCE[match.fifaImportance] ?? (match.isWorldCupFinals ? FIFA_MATCH_IMPORTANCE.WC_FINALS : match.noDraw ? FIFA_MATCH_IMPORTANCE.WC_PLAYOFF : FIFA_MATCH_IMPORTANCE.QUALIFIER);
  const change = I * (W - We);
  pts[h.id] = +(hp + change).toFixed(1);
  pts[a.id] = +(ap - change).toFixed(1);
}
function chemistryFor(team, lineup, formationKey='4-2-3-1') {
  const xi = lineup && lineup.length ? lineup : safeDefaultXI(team);
  let score = 78;
  const hasGK = xi.some(p => (p.pos||'').includes('GK'));
  if (hasGK) score += 3; else score -= 12;
  const defenders = xi.filter(p => /CB|LB|RB/.test(p.pos||'')).length;
  const mids = xi.filter(p => /CM|CDM|CAM|LM|RM/.test(p.pos||'')).length;
  const fwds = xi.filter(p => /ST|LW|RW/.test(p.pos||'')).length;
  if (defenders >= 4) score += 4; else score -= 5;
  if (mids >= 3) score += 3; else score -= 4;
  if (fwds >= 1) score += 2; else score -= 5;
  const avgForm = xi.reduce((a,p)=>a+playerForm(team,p),0)/Math.max(1,xi.length);
  score += avgForm * 1.2;
  const unavailable = xi.filter(p => isPlayerUnavailable(team,p).blocked).length;
  score -= unavailable * 12;
  // Explicit man-down penalty: a red card costs far more than a like-for-like
  // swap — each missing outfield player below 11 is a real tactical disaster,
  // not just a minor chemistry dip, so scale the penalty up sharply per man short.
  const menShort = Math.max(0, 11 - xi.length);
  if (menShort > 0) score -= menShort * 18;
  return clamp(Math.round(score), 25, 99);
}
function predictionFor(homeTeam, awayTeam, homeLineup=null, awayLineup=null) {
  const hR = effectiveTeamRating(homeTeam, homeLineup || safeDefaultXI(homeTeam)) + (chemistryFor(homeTeam, homeLineup || safeDefaultXI(homeTeam))-78)/6 + 2.5;
  const aR = effectiveTeamRating(awayTeam, awayLineup || safeDefaultXI(awayTeam)) + (chemistryFor(awayTeam, awayLineup || safeDefaultXI(awayTeam))-78)/6;
  const diff = hR - aR;
  let home = clamp(0.36 + diff/55, 0.05, 0.82);
  let draw = clamp(0.28 - Math.abs(diff)/170, 0.08, 0.31);
  let away = 1 - home - draw;
  if (away < 0.04) { away = 0.04; home = 1 - draw - away; }
  const total = home + draw + away;
  home/=total; draw/=total; away/=total;
  function decimal(p){ return (1 / Math.max(0.01,p)).toFixed(2); }
  const scorelines = [
    ['1-1', draw*0.26], ['1-0', home*0.22], ['2-1', home*0.20], ['2-0', home*0.16], ['0-1', away*0.22], ['1-2', away*0.20], ['0-0', draw*0.18], ['3-1', home*0.09], ['1-3', away*0.09]
  ].sort((a,b)=>b[1]-a[1]).slice(0,3).map(x=>x[0]);
  return { home, draw, away, oddsHome:decimal(home), oddsDraw:decimal(draw), oddsAway:decimal(away), scorelines, upset: diff };
}

function unavailableList(team=null) {

  const teams = allKnownTeams();
  const byId = Object.fromEntries(teams.map(t=>[t.id,t]));
  const rows = [];
  ['suspensions','injuries'].forEach(type => {
    Object.entries(st[type]||{}).forEach(([k,v]) => {
      if (v <= 0) return;
      const [tid, ...rest] = k.split(':');
      if (team && tid !== team.id) return;
      rows.push({ team: byId[tid] || {id:tid,name:tid,flag:''}, player: rest.join(':'), type: type==='injuries'?'Injury':'Suspension', matches:v });

// Captures EVERYTHING that can change during a campaign: the screen-level
// state (appState: playerTeam/campaign/wc/champion), match/availability/
// career stats, AND crucially the full ROSTERS object — every nation's squad
// with their current fitness, fatigue, form, familiarity, morale, age and
// rating. ROSTERS was previously left out of saves entirely, which meant
// loading a save silently reset every player back to default values — the
// save "worked" mechanically but lost almost everything that actually
// matters about a campaign in progress. Fixed here.
function saveGameSnapshot(slot, appState) {
  ensureStatsRoot();
  const payload = {
    savedAt: new Date().toISOString(),
    appState,
    stats: window.__RTC_STATS || null,
    avail: window.__RTC_AVAIL || null,
    career: window.__RTC_CAREER || null,
    rosters: ROSTERS || null,
  };
  let json;
  try {
    json = JSON.stringify(payload);
  } catch (e) {
    console.error('Save failed — payload could not be serialized:', e);
    return false;
  }
  try {
    localStorage.setItem(`RTC_SAVE_${slot}`, json);
    return true;
  } catch (e) {
    // Quota exceeded or storage unavailable (e.g. private browsing) — surface
    // this clearly rather than pretending the save succeeded.
    console.error('Save failed — could not write to local storage:', e);
    return false;
  }
}
function loadGameSnapshot(slot) {
  let raw;
  try {
    raw = localStorage.getItem(`RTC_SAVE_${slot}`);
  } catch (e) {
    console.error('Load failed — could not read local storage:', e);
    return null;
  }
  if (!raw) return null;
  let payload;
  try {
    payload = JSON.parse(raw);
  } catch (e) {
    console.error('Load failed — save data was corrupted:', e);
    return null;
  }
  window.__RTC_STATS = payload.stats || null;
  ensureStatsRoot();
  window.__RTC_AVAIL = payload.avail || {suspensions:{},injuries:{},yellows:{}};
  window.__RTC_CAREER = payload.career || {playerForm:{},teamRankPts:{},history:[],year:2026};
  // Restore every nation's roster exactly as it was when saved (fitness,
  // morale, familiarity, ages, ratings, generated replacement players, etc.)
  // rather than leaving the freshly-initialized defaults in place.
  if (payload.rosters) {
    Object.keys(ROSTERS).forEach(key => { delete ROSTERS[key]; });
    Object.entries(payload.rosters).forEach(([key, val]) => { ROSTERS[key] = val; });
  }
  return payload.appState;
}
