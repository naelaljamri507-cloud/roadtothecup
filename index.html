  if (goalTypeKey === "LONG_SHOT") label = `Long shot, ${longShotDistance()}m`;
  const lines = gt.texts(scorerName, assistName, teamName);
  return { label, text: lines[Math.floor(Math.random()*lines.length)] };
}
// Minor flavour-only events for corners, free kicks won, and throw-ins, used to
// thicken the live commentary feed without affecting the scoreline directly
// (the goals they sometimes lead to are already baked into the goal count).
function setPieceFlavorText(type, team) {
  if (type === 'corner') return `${team} win a corner.`;
  if (type === 'freekick') return `Free kick awarded to ${team} in a promising position.`;
  if (type === 'throwin') return `Throw-in for ${team} down the line.`;
  return `${team} keep possession.`;
}

// ============================================================
// MATCH ENGINE
// ============================================================
// expected goals = base rate adjusted by rating gap, home advantage, form, randomness
// goals generated via poisson-like sampling

function poissonSample(lambda) {
  // Knuth's algorithm
  const L = Math.exp(-lambda);
  let k = 0, p = 1;
  do {
    k++;
    p *= Math.random();
  } while (p > L);
  return k - 1;
}

function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

// form: array of recent results, +1 win, 0 draw, -1 loss -> small modifier
function formModifier(formArr) {
  if (!formArr || formArr.length === 0) return 0;
  const sum = formArr.reduce((a, b) => a + b, 0);
  return clamp(sum * 0.04, -0.4, 0.4);
}

function expectedGoals(teamA, teamB, isHomeA, formA, formB, tacticA, tacticB, teamInstrA = [], teamInstrB = [], depthA = 50, depthB = 50) {
  const ratingDiff = teamA.rating - teamB.rating;
  const base = 1.35; // baseline goals
  const diffFactor = ratingDiff / 18; // every ~18 rating points ~ +1 goal swing
  const homeAdv = isHomeA ? 0.28 : -0.12;
  const formAdv = formModifier(formA) - formModifier(formB) * 0.3;

  // Tactical layer: my attack boosts my xG, opponent's defense suppresses it.
  // Tempo raises variance for both sides (applied as a flat xG nudge here, with
  // the variance side handled by the poisson sampling itself staying intact).
  const myTactic = TACTICS[tacticA] || TACTICS.FLUID_COUNTER;
  const oppTactic = TACTICS[tacticB] || TACTICS.FLUID_COUNTER;
  const tacticAttack = myTactic.attack;
  const tacticDefenseAgainstMe = oppTactic.defense;
  const tempoSwing = (myTactic.tempo - oppTactic.tempo) * 0.15;
  const counterSwing = tacticCounterModifier(tacticA, tacticB);

  // Team instructions add a small direct xG nudge (Work Ball Into Box raises it
  // via better chance quality, Shoot on Sight slightly lowers it via worse shots).
  const instructionSwing = teamInstructionXgModifier(teamInstrA);
  // A high defensive line (depth toward 100) trades offside-trap value for being
  // more exposed to balls played in behind a fast attack — modelled as a small
  // extra xG swing in MY favour if the opponent is playing a risky high line.
  const oppHighLineExposure = depthVulnerabilityModifier(depthB, teamB.rating) * -1; // opponent's high line helps me a bit
  const myHighLineRisk = depthVulnerabilityModifier(depthA, teamB.rating); // my own high line hurts me a bit if opponent is dangerous

  let xg = base + diffFactor / 2 + homeAdv + formAdv
    + tacticAttack - tacticDefenseAgainstMe * 0.6
    + tempoSwing + counterSwing + instructionSwing
    + oppHighLineExposure * 0.4 - myHighLineRisk * 0.15;
  return clamp(xg, 0.2, 4.6);
}

// A team's goalkeeper quality (DIV/REF/HAN/POS averaged) suppresses the
// OPPONENT's xG — a genuinely strong keeper means fewer goals against,
// more saves, and a real shot at clean sheets, not just a cosmetic stat.
// A weak/backup keeper does the reverse: more goals leak through.
function goalkeeperQualityModifier(lineup) {
  const gk = (lineup || []).find(p => (p.pos||'').toUpperCase() === 'GK');
  if (!gk) return 0;
  const div = gk.div ?? gk.rating ?? 65;
  const ref = gk.ref ?? gk.rating ?? 65;
  const han = gk.han ?? gk.rating ?? 65;
  const gkpos = gk.gkpos ?? gk.rating ?? 65;
  const avg = (div + ref + han + gkpos) / 4;
  // 65 is treated as a roughly neutral/league-average keeper. Every point
  // above/below that nudges the opponent's xG down/up — capped so even a
  // world-class keeper can't single-handedly erase a huge quality gap.
  return clamp((avg - 65) * -0.0065, -0.22, 0.22);
}

function simulateMatch(homeTeam, awayTeam, formHome, formAway, opts = {}) {
  const tacticHome = (opts.tacticHome) || (homeTeam.tactic) || pickAiTactic(homeTeam);
  const tacticAway = (opts.tacticAway) || (awayTeam.tactic) || pickAiTactic(awayTeam);
  const homeLineup = opts.homeLineup || safeDefaultXI(homeTeam);
  const awayLineup = opts.awayLineup || safeDefaultXI(awayTeam);
  const homeEffRating = opts.homeRating || effectiveTeamRating(homeTeam, homeLineup, opts.formationHome);
  const awayEffRating = opts.awayRating || effectiveTeamRating(awayTeam, awayLineup, opts.formationAway);
  const effHomeTeam = { ...homeTeam, rating: homeEffRating };
  const effAwayTeam = { ...awayTeam, rating: awayEffRating };
  // The away GK's quality suppresses/inflates the home side's xG, and vice
  // versa — this is what actually drives clean sheets and extra saves.
  const homeGkMod = goalkeeperQualityModifier(awayLineup); // applied to xgHome (away keeper defends against it)
  const awayGkMod = goalkeeperQualityModifier(homeLineup); // applied to xgAway (home keeper defends against it)
  const xgHome = Math.max(0.12, expectedGoals(effHomeTeam, effAwayTeam, true, formHome, formAway, tacticHome, tacticAway, opts.teamInstructionsHome, opts.teamInstructionsAway, opts.depthHome ?? 50, opts.depthAway ?? 50) + setPieceXgModifier(opts.setPiecesHome || {}) + homeGkMod);
  const xgAway = Math.max(0.12, expectedGoals(effAwayTeam, effHomeTeam, false, formAway, formHome, tacticAway, tacticHome, opts.teamInstructionsAway, opts.teamInstructionsHome, opts.depthAway ?? 50, opts.depthHome ?? 50) + setPieceXgModifier(opts.setPiecesAway || {}) + awayGkMod);
  let goalsHome = poissonSample(xgHome);
  let goalsAway = poissonSample(xgAway);

  // Knockout: no draws allowed, resolve via ET/penalties if level
  let wentToPens = false;
  let penScore = null;
  if (opts.noDraw && goalsHome === goalsAway) {
    wentToPens = true;
    // weight penalty win chance slightly by rating
    const ratingDiff = homeTeam.rating - awayTeam.rating;
    const homeWinProb = clamp(0.5 + ratingDiff / 200, 0.32, 0.68);
    const homeWinsPens = Math.random() < homeWinProb;
    const loserPens = 3 + Math.floor(Math.random() * 3);
    const winnerPens = loserPens + 1 + Math.floor(Math.random() * 2);
    penScore = homeWinsPens ? [winnerPens, loserPens] : [loserPens, winnerPens];
  }

  return {
    homeTeam, awayTeam,
    tacticHome, tacticAway,
    homeLineup, awayLineup,
    // Per-player instructions (e.g. "Press More", "Man Mark") and man-marking
    // assignments, keyed by player name — used for fatigue load and goal-type
    // weighting. Defaults to empty so AI-only matches (no player setup) are safe.
    instructionsHome: opts.instructionsHome || {},
    instructionsAway: opts.instructionsAway || {},
    marksHome: opts.marksHome || {},
    marksAway: opts.marksAway || {},
    // Team-level tactical instructions (Shoot on Sight, Press Keeper, etc.) —
    // arrays of TEAM_INSTRUCTIONS keys, used for goal-type weighting, card risk
    // and fatigue load.
    teamInstructionsHome: opts.teamInstructionsHome || [],
    teamInstructionsAway: opts.teamInstructionsAway || [],
    setPiecesHome: opts.setPiecesHome || defaultSetPieceTactics(),
    setPiecesAway: opts.setPiecesAway || defaultSetPieceTactics(),
    // Team-level tactical shape sliders (0-100): depth (line height) and width.
    depthHome: opts.depthHome ?? 50, widthHome: opts.widthHome ?? 50,
    depthAway: opts.depthAway ?? 50, widthAway: opts.widthAway ?? 50,
    // Formation actually played by each side this match — used for tactical
    // familiarity rating and for reinforcing familiarity after the fact.
    formationHome: opts.formationHome || ROSTERS[homeTeam.id]?.formation,
    formationAway: opts.formationAway || ROSTERS[awayTeam.id]?.formation,
    _homeEffRating: homeEffRating, _awayEffRating: awayEffRating,
    goalsHome, goalsAway,
    wentToPens,
    penScore,
    winner: wentToPens
      ? (penScore[0] > penScore[1] ? homeTeam : awayTeam)
      : (goalsHome === goalsAway ? null : (goalsHome > goalsAway ? homeTeam : awayTeam)),
    xgHome, xgAway,
    subLog: [],
    isWorldCupFinals: !!opts.isWorldCupFinals,
  };
}

// Generate simple minute-based "events" for play-by-play viewing mode.
// Distributes the final goal tally across 90 minutes with flavor text.
function generateMatchEvents(matchResult, opts = {}) {
  const { homeTeam, awayTeam, goalsHome, goalsAway, wentToPens, penScore } = matchResult;
  const events = [];
  const homeXI = matchResult.homeLineup || safeDefaultXI(homeTeam);
  const awayXI = matchResult.awayLineup || safeDefaultXI(awayTeam);
  const homeStats = initPlayerStats(homeXI);
  const awayStats = initPlayerStats(awayXI);
  const facts = buildMatchFacts(matchResult);
  const minuteSet = new Set();
  function randMinute() { let m; do { m = 1 + Math.floor(Math.random()*90); } while (minuteSet.has(m)); minuteSet.add(m); return m; }
  const homeInstr = Object.values(matchResult.instructionsHome || {});
  const awayInstr = Object.values(matchResult.instructionsAway || {});
  const homeTeamInstrKeys = matchResult.teamInstructionsHome || [];
  const awayTeamInstrKeys = matchResult.teamInstructionsAway || [];
  const homeWidth = matchResult.widthHome ?? 50;
  const awayWidth = matchResult.widthAway ?? 50;
  const homeSetPieces = matchResult.setPiecesHome || defaultSetPieceTactics();
  const awaySetPieces = matchResult.setPiecesAway || defaultSetPieceTactics();
  function addGoal(isHome) {
    const team = isHome ? homeTeam : awayTeam;
    const oppTeam = isHome ? awayTeam : homeTeam;
    const xi = isHome ? homeXI : awayXI;
    const oppXi = isHome ? awayXI : homeXI;
    const stats = isHome ? homeStats : awayStats;
    const oppStats = isHome ? awayStats : homeStats;
    const teamInstrKeys = isHome ? homeTeamInstrKeys : awayTeamInstrKeys;
    const width = isHome ? homeWidth : awayWidth;
    const setPieces = isHome ? homeSetPieces : awaySetPieces;
    // Own goals: a small real-football chance (~3%) that this goal actually
    // comes off a defender on the OPPOSING side under pressure from a corner/
    // cross, rather than a clean finish by the attacking team. Counted as a
    // real goal for the scoring team on the scoreboard, but credited as an
    // own goal against the player who put it in their own net — no assist,
    // no shot/goal stat for the "scoring" side's player pool.
    if (Math.random() < 0.03) {
      const defenders = oppXi.filter(p => /CB|LB|RB/.test((p.pos||'').toUpperCase()));
      const ownGoalPlayer = (defenders.length ? defenders : oppXi)[Math.floor(Math.random() * (defenders.length ? defenders.length : oppXi.length))];
      if (oppStats[ownGoalPlayer.name]) { oppStats[ownGoalPlayer.name].ownGoals++; oppStats[ownGoalPlayer.name].rating -= 0.6; }
      events.push({ minute: randMinute(), type:'goal', isHome, scorer: ownGoalPlayer.name, player: ownGoalPlayer.name, isOwnGoal: true, assist: null, goalType: "Own goal", text: `Own goal! ${ownGoalPlayer.name} turns it into his own net under pressure — ${team.name} benefit.` });
      return;
    }
    const scorer = weightedPick(xi, 'goal', null, oppXi);
    const goalTypeKey = pickGoalType(scorer, teamInstrKeys, width, setPieces);
    // Penalties and free kicks don't really have a same-possession "assister".
    const noAssistTypes = ["PENALTY", "FREE_KICK", "LONG_SHOT"];
    const assister = (!noAssistTypes.includes(goalTypeKey) && Math.random() < 0.74) ? weightedPick(xi, 'assist', scorer.name, oppXi) : null;
    if (stats[scorer.name]) { stats[scorer.name].goals++; stats[scorer.name].shots++; if (goalTypeKey === 'HEADER') stats[scorer.name].headers++; stats[scorer.name].rating += 0.9; }
    if (assister && stats[assister.name]) { stats[assister.name].assists++; stats[assister.name].rating += 0.45; }
    const described = describeGoal(goalTypeKey, scorer.name, assister && assister.name, team.name);
    let label = described.label, text = described.text;
    if (goalTypeKey === 'HEADER' && assister) {
      const del = (setPieces.cornerDelivery || '').toUpperCase();
      if (del === 'INSWINGER') label = 'Inswinger corner assist';
      else if (del === 'OUTSWINGER') label = 'Outswinger corner assist';
      else label = 'Corner assist';
    }
    if (goalTypeKey === 'FREE_KICK') label = 'Free kick goal';
    events.push({ minute: randMinute(), type:'goal', isHome, scorer:scorer.name, player:scorer.name, assist: assister && assister.name, goalType: label, text });
  }
  for (let i=0;i<goalsHome;i++) addGoal(true);
  for (let i=0;i<goalsAway;i++) addGoal(false);
  // distribute non-goal shots, with a chance of a dramatic FM-style near-miss line
  const NEAR_MISS_TEMPLATES = [
    { outcome:'wide',  fn:(s,team) => `${s} is through on goal... but he drags it wide! ${team} will rue that one.` },
    { outcome:'over',  fn:(s,team) => `${s} curls one just over the bar for ${team} — so close!` },
    { outcome:'saved', fn:(s,team) => `Great save! The keeper denies ${s} with a flying stop.` },
    { outcome:'saved', fn:(s,team) => `${s} heads it straight at the keeper from a great position.` },
    { outcome:'wide',  fn:(s,team) => `${s} cuts inside but blazes the shot high and wide for ${team}.` },
    { outcome:'post',  fn:(s,team) => `Off the post! ${s} will be furious with himself there.` },
  ];
  function addShots(stats, xi, count, team, oppGk, oppStats, sotRemaining, oppXi=[]) {
    // Saves = shots on target that didn't result in a goal — the standard
    // real-football definition. sotRemaining is shots-on-target for this team
    // still needing an outcome (goals already consumed some of the SOT total).
    // Every one of those forces an actual save from the opposing keeper;
    // shots NOT on target (the rest of `count`) just go wide/over/post.
    let savesToAssign = Math.max(0, Math.min(count, sotRemaining));
    for (let i=0;i<count;i++) {
      const p=weightedPick(xi,'goal', null, oppXi);
      if (stats[p.name]) { stats[p.name].shots++; stats[p.name].rating += 0.03; }
      const isOnTarget = savesToAssign > 0;
      if (isOnTarget) {
        savesToAssign--;
        // A genuine save by the opposing keeper — credit them directly.
        if (oppGk && oppStats[oppGk.name]) {
          oppStats[oppGk.name].saves++;
          // Reflects real shot-stopping: better DIV/REF means the save
          // itself was a better piece of goalkeeping, nudging rating up
          // slightly more per save for a sharper keeper.
          const gkSkill = ((oppGk.div ?? oppGk.rating ?? 65) + (oppGk.ref ?? oppGk.rating ?? 65)) / 2;
          oppStats[oppGk.name].rating += 0.05 + clamp((gkSkill - 65) / 400, -0.02, 0.05);
        }
        events.push({ minute: randMinute(), type:'chance', isHome: team===homeTeam, player:p.name, shotOutcome:'saved', text: oppGk ? `${oppGk.name} produces a fine save to deny ${p.name}!` : `Great save from the keeper denies ${p.name}.` });
      } else if (Math.random() < 0.22) {
        const tmpl = NEAR_MISS_TEMPLATES[Math.floor(Math.random()*NEAR_MISS_TEMPLATES.length)];
        events.push({ minute: randMinute(), type:'chance', isHome: team===homeTeam, player:p.name, shotOutcome: tmpl.outcome, text: tmpl.fn(p.name, team.name) });
      }
    }
  }
  const homeGkPlayer = homeXI.find(p => (p.pos||'').toUpperCase() === 'GK');
  const awayGkPlayer = awayXI.find(p => (p.pos||'').toUpperCase() === 'GK');
  addShots(homeStats, homeXI, Math.max(0, facts.shotsHome-goalsHome), homeTeam, awayGkPlayer, awayStats, Math.max(0, facts.sotHome-goalsHome), awayXI);
  addShots(awayStats, awayXI, Math.max(0, facts.shotsAway-goalsAway), awayTeam, homeGkPlayer, homeStats, Math.max(0, facts.sotAway-goalsAway), homeXI);

  function distributePasses(stats, xi, total) {
    for (let i=0;i<Math.max(0,total);i++) {
      const p = weightedPick(xi, 'pass');
      if (stats[p.name]) { stats[p.name].passesCompleted++; stats[p.name].rating += 0.002; }
    }
  }
  distributePasses(homeStats, homeXI, Math.round((facts.passesCompletedHome || 0) / 6));
  distributePasses(awayStats, awayXI, Math.round((facts.passesCompletedAway || 0) / 6));
  function addDefensiveActions(stats, xi, opponentPoss, opponentShots) {
    const tackleCount = Math.max(4, Math.round(7 + opponentPoss/7 + opponentShots*0.35 + Math.random()*5));
    const interceptCount = Math.max(3, Math.round(5 + opponentPoss/9 + Math.random()*5));
    for (let i=0;i<tackleCount;i++) { const p = weightedPick(xi,'tackle'); if (stats[p.name]) { stats[p.name].tackles++; stats[p.name].rating += 0.025; } }
    for (let i=0;i<interceptCount;i++) { const p = weightedPick(xi,'intercept'); if (stats[p.name]) { stats[p.name].interceptions++; stats[p.name].rating += 0.022; } }
    return {tackleCount, interceptCount};
  }
  const hDef = addDefensiveActions(homeStats, homeXI, facts.possessionAway, facts.shotsAway);
  const aDef = addDefensiveActions(awayStats, awayXI, facts.possessionHome, facts.shotsHome);
  facts.tacklesHome = hDef.tackleCount; facts.tacklesAway = aDef.tackleCount; facts.interceptionsHome = hDef.interceptCount; facts.interceptionsAway = aDef.interceptCount;
  function addHeaderAttempts(stats, xi, cornerCount, setPieces) {
    const attempts = Math.max(0, Math.round(cornerCount * 0.45 + ((setPieces.aerialThreats || 4)-3)*0.55 + Math.random()*2));
    for (let i=0;i<attempts;i++) { const p = weightedPick(xi,'header'); if (stats[p.name]) { stats[p.name].headers++; stats[p.name].rating += 0.01; } }
    return attempts;
  }
  facts.headersHome = addHeaderAttempts(homeStats, homeXI, facts.cornersHome, homeSetPieces);
  facts.headersAway = addHeaderAttempts(awayStats, awayXI, facts.cornersAway, awaySetPieces);

  // set pieces: corners and throw-ins as pure commentary flavour, free kicks
  // also flagged so the feed reads like a real match rather than just goals/cards
  function addSetPieces(team, isHome, cornerCount) {
    const sp = isHome ? homeSetPieces : awaySetPieces;
    const adjustedCorners = Math.max(0, Math.round(cornerCount * setPieceCornerEventMultiplier(sp)));
    const cornerLabel = sp.cornerDelivery === 'INSWINGER' ? 'Inswinger corner' : sp.cornerDelivery === 'OUTSWINGER' ? 'Outswinger corner' : 'Corner';
    for (let i=0;i<adjustedCorners;i++) {
      if (Math.random() < 0.55) events.push({ minute: randMinute(), type:'corner', isHome, text: `${cornerLabel} for ${team.name}.` });
    }
    if (Math.random() < 0.6) events.push({ minute: randMinute(), type:'throwin', isHome, text: `${team.name} take a throw-in.` });
    if (Math.random() < 0.5) events.push({ minute: randMinute(), type:'freekick', isHome, text: `Free kick for ${team.name}.` });
  }
  addSetPieces(homeTeam, true, facts.cornersHome);
  addSetPieces(awayTeam, false, facts.cornersAway);
  // cards, fouls, injuries — Dive In More raises card risk, Conservative Tackling lowers it
  const homeCardMult = teamInstructionCardMultiplier(homeTeamInstrKeys);
  const awayCardMult = teamInstructionCardMultiplier(awayTeamInstrKeys);
  function addDiscipline(isHome, yellowN, redN, foulN) {
    const team = isHome ? homeTeam : awayTeam, xi = isHome ? homeXI : awayXI, stats = isHome ? homeStats : awayStats;
    for (let i=0;i<foulN;i++) { const p=weightedPick(xi,'card'); if (stats[p.name]) { stats[p.name].fouls++; stats[p.name].rating -= 0.03; } }
    for (let i=0;i<yellowN;i++) { const p=weightedPick(xi,'card'); if (stats[p.name]) { stats[p.name].yellow++; stats[p.name].rating -= 0.25; } events.push({ minute:randMinute(), type:'yellow', isHome, player:p.name, cardPlayer:p.name, text:`Yellow card: ${p.name} (${team.name}).` }); }
    for (let i=0;i<redN;i++) { const p=weightedPick(xi,'card'); if (stats[p.name]) { stats[p.name].red++; stats[p.name].rating -= 1.0; } events.push({ minute:randMinute(), type:'red', isHome, player:p.name, cardPlayer:p.name, text:`RED CARD! ${p.name} is sent off for ${team.name}.` }); }
    if (Math.random()<0.09) { const p=xi[Math.floor(Math.random()*xi.length)]; if (stats[p.name]) { stats[p.name].injuries++; stats[p.name].rating -= 0.4; } events.push({ minute:randMinute(), type:'injury', isHome, player:p.name, injuryPlayer:p.name, text:`Injury worry: ${p.name} is struggling for ${team.name}.` }); }
  }
  addDiscipline(true, Math.random()<clamp(0.75*homeCardMult,0.1,0.97)?1:0, Math.random()<clamp(0.06*homeCardMult,0.01,0.4)?1:0, facts.foulsHome);
  addDiscipline(false, Math.random()<clamp(0.75*awayCardMult,0.1,0.97)?1:0, Math.random()<clamp(0.06*awayCardMult,0.01,0.4)?1:0, facts.foulsAway);
  events.push({ minute: 45, type: "half", text: "Half-time. You can make changes now.", _sortKey: 45.1 });
  events.push({ minute: 90, type: "full", text: wentToPens ? `Full time. Level at ${goalsHome}-${goalsAway}. Straight to penalties.` : "Full time whistle blows.", _sortKey: 90.5 });
  if (wentToPens) events.push({ minute: 90, type: "pens", text: `Penalties: ${homeTeam.name} ${penScore[0]} - ${penScore[1]} ${awayTeam.name}`, _sortKey: 91 });
  // finish ratings and MOTM
  // A keeper who makes 10+ saves had a genuinely outstanding game by any
  // measure — guarantee their final rating reflects that (8.0+) regardless
  // of the small incremental bumps already accumulated per save, since a
  // shot-stopping masterclass deserves to show up clearly on the scoreboard.
  function applySaveRatingFloor(stats) {
    Object.values(stats).forEach(s => {
      if ((s.player?.pos||'').toUpperCase() === 'GK' && s.saves >= 10) {
        s.rating = Math.max(s.rating, 8.0 + Math.min(1.5, (s.saves - 10) * 0.08));
      }
    });
  }
  applySaveRatingFloor(homeStats);
  applySaveRatingFloor(awayStats);
  Object.values(homeStats).forEach(s => s.rating = clamp(+s.rating.toFixed(1), 4.8, 9.8));
  Object.values(awayStats).forEach(s => s.rating = clamp(+s.rating.toFixed(1), 4.8, 9.8));
  const allStats = [...Object.values(homeStats).map(s=>({...s, team:homeTeam})), ...Object.values(awayStats).map(s=>({...s, team:awayTeam}))];
  const motmRec = allStats.sort((a,b)=>b.rating-a.rating || b.goals-a.goals || b.assists-a.assists)[0];
  matchResult.facts = facts;
  matchResult.playerStatsHome = homeStats;
  matchResult.playerStatsAway = awayStats;
  matchResult.motm = motmRec && motmRec.player;
  matchResult.motmTeam = motmRec && motmRec.team;
  events.sort((a,b)=>(a._sortKey||a.minute)-(b._sortKey||b.minute));
  applyPostMatchAvailability(matchResult);
  if (!opts.deferFatigue) applyMatchFatigue(matchResult);
  // Morale always updates immediately on the result — it doesn't depend on
  // live substitutions the way fatigue minutes do, so there's no need to defer it.
  if (!matchResult._moraleApplied) {
    matchResult._moraleApplied = true;
    applyMoraleFromResult(homeTeam, goalsHome, goalsAway);
    applyMoraleFromResult(awayTeam, goalsAway, goalsHome);
  }
  // Actually playing a match in a given formation also reinforces familiarity
  // with it a little, on top of any dedicated training.
  if (matchResult.formationHome) trainFormationFamiliarity(homeTeam, matchResult.formationHome, 0.6);
  if (matchResult.formationAway) trainFormationFamiliarity(awayTeam, matchResult.formationAway, 0.6);
  registerSeasonStats(matchResult);
  return events;
}

// ============================================================
// TOURNAMENT LOGIC
// ============================================================

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// Round-robin double (home & away) schedule generator using circle method.
function generateDoubleRoundRobin(teams) {
  const n = teams.length;
  const isOdd = n % 2 !== 0;
  const list = isOdd ? [...teams, null] : [...teams];
  const numRounds = list.length - 1;
  const half = list.length / 2;
  let rounds = [];
  let arr = [...list];
  for (let r = 0; r < numRounds; r++) {
    const roundMatches = [];
    for (let i = 0; i < half; i++) {
      const a = arr[i], b = arr[arr.length - 1 - i];
      if (a && b) {
        // alternate home/away based on round parity for fairness
        if (r % 2 === 0) roundMatches.push([a, b]);
        else roundMatches.push([b, a]);
      }
    }
    rounds.push(roundMatches);
    // rotate (keep first fixed)
    const fixed = arr[0];
    const rest = arr.slice(1);
    rest.unshift(rest.pop());
    arr = [fixed, ...rest];
  }
  // second leg: reverse home/away
  const secondLeg = rounds.map(round => round.map(([h, a]) => [a, h]));
  return [...rounds, ...secondLeg];
}

function emptyStanding(team) {
  return { team, played: 0, won: 0, drawn: 0, lost: 0, gf: 0, ga: 0, gd: 0, pts: 0, form: [] };
}

function applyResultToStandings(standings, homeId, awayId, gh, ga) {
  const h = standings[homeId], a = standings[awayId];
  h.played++; a.played++;
  h.gf += gh; h.ga += ga;
  a.gf += ga; a.ga += gh;
  h.gd = h.gf - h.ga; a.gd = a.gf - a.ga;
  if (gh > ga) {
    h.won++; h.pts += 3; a.lost++; h.form.push(1); a.form.push(-1);
  } else if (gh < ga) {
    a.won++; a.pts += 3; h.lost++; a.form.push(1); h.form.push(-1);
  } else {
    h.drawn++; a.drawn++; h.pts += 1; a.pts += 1; h.form.push(0); a.form.push(0);
  }
  h.form = h.form.slice(-5);
  a.form = a.form.slice(-5);
}

function sortStandings(standingsArr) {
  return [...standingsArr].sort((x, y) => {
    if (y.pts !== x.pts) return y.pts - x.pts;
    if (y.gd !== x.gd) return y.gd - x.gd;
    if (y.gf !== x.gf) return y.gf - x.gf;
    return y.team.rating - x.team.rating; // final tiebreak: just for determinism
  });
}

// Build a fresh group-stage state: groups of teams + schedule + standings
// numGroups: explicit group count (preferred). If omitted, derived from groupSize.
function buildGroupStage(teams, groupSize, opts = {}) {
  const numGroups = opts.numGroups || Math.ceil(teams.length / groupSize);
  const shuffled = opts.seeded ? seedIntoGroups(teams, numGroups) : null;
  let groups;
  if (shuffled) {
    groups = shuffled;
  } else {
    const pool = shuffle(teams);
    groups = [];
    for (let g = 0; g < numGroups; g++) groups.push([]);
    pool.forEach((t, i) => groups[i % numGroups].push(t));
  }
  return groups.map((groupTeams, idx) => {
    const standings = {};
    groupTeams.forEach(t => standings[t.id] = emptyStanding(t));
    const schedule = opts.doubleRound
      ? generateDoubleRoundRobin(groupTeams)
      : generateSingleRoundRobin(groupTeams);
    return {
      name: `Group ${String.fromCharCode(65 + idx)}`,
      teams: groupTeams,
      standings,
      schedule, // array of matchdays, each an array of [home, away]
      matchdayIndex: 0,
      results: [], // flat list of played matches
    };
  });
}

function generateSingleRoundRobin(teams) {
  const n = teams.length;
  const isOdd = n % 2 !== 0;
  const list = isOdd ? [...teams, null] : [...teams];
  const numRounds = list.length - 1;
  const half = list.length / 2;
  let rounds = [];
  let arr = [...list];
  for (let r = 0; r < numRounds; r++) {
    const roundMatches = [];
    for (let i = 0; i < half; i++) {
      const a = arr[i], b = arr[arr.length - 1 - i];
      if (a && b) {
        if (r % 2 === 0) roundMatches.push([a, b]);
        else roundMatches.push([b, a]);
      }
    }
    rounds.push(roundMatches);
    const fixed = arr[0];
    const rest = arr.slice(1);
    rest.unshift(rest.pop());
    arr = [fixed, ...rest];
  }
  return rounds;
}

// simple seeding: sort by rating desc, snake-draft into groups so each group has balanced strength
function seedIntoGroups(teams, numGroups) {
  const sorted = [...teams].sort((a, b) => b.rating - a.rating);
  const groups = Array.from({ length: numGroups }, () => []);
  let dir = 1, g = 0;
  for (const t of sorted) {
    groups[g].push(t);
    g += dir;
    if (g === numGroups) { g = numGroups - 1; dir = -1; }
    else if (g < 0) { g = 0; dir = 1; }
  }
  return groups;
}

// Play every match in the next matchday of a group, return play-by-play data too
function playNextMatchday(group, isWorldCup=false) {
  if (group.matchdayIndex >= group.schedule.length) return null;
  const matches = group.schedule[group.matchdayIndex];
  const played = matches.map(([home, away]) => {
    const formHome = group.standings[home.id].form;
    const formAway = group.standings[away.id].form;
    const result = simulateMatch(home, away, formHome, formAway, isWorldCup ? { isWorldCupFinals: true } : {});
    applyResultToStandings(group.standings, home.id, away.id, result.goalsHome, result.goalsAway);
    const rich = { matchday: group.matchdayIndex + 1, ...result };
    rich.events = generateMatchEvents(rich);
    group.results.push(rich);
    return rich;
  });
  group.matchdayIndex++;
  return played;
}

function isGroupComplete(group) {
  return group.matchdayIndex >= group.schedule.length;
}

// ---- Single-leg / two-leg knockout helpers ----
function playSingleKnockout(teamA, teamB, formA = [], formB = [], opts = {}) {
  const tacticA = opts.tacticA || teamA.tactic;
  const tacticB = opts.tacticB || teamB.tactic;
  const result = simulateMatch(teamA, teamB, formA, formB, {
    noDraw: true, tacticHome: tacticA, tacticAway: tacticB,
    isWorldCupFinals: opts.isWorldCupFinals,
    homeLineup: opts.lineupA, awayLineup: opts.lineupB,
    homeRating: opts.ratingA, awayRating: opts.ratingB,
    instructionsHome: opts.instructionsA, instructionsAway: opts.instructionsB,
    marksHome: opts.marksA, marksAway: opts.marksB,
    depthHome: opts.depthA, widthHome: opts.widthA,
    depthAway: opts.depthB, widthAway: opts.widthB,
    teamInstructionsHome: opts.teamInstructionsA, teamInstructionsAway: opts.teamInstructionsB,
    setPiecesHome: opts.setPiecesA, setPiecesAway: opts.setPiecesB,
    formationHome: opts.formationA, formationAway: opts.formationB,
  });
  return { ...result, formationHome: opts.formationA, formationAway: opts.formationB, events: generateMatchEvents(result, { deferFatigue: true }) };
}

function playTwoLegTie(teamA, teamB, formA = [], formB = [], opts = {}) {
  // leg 1: A home, leg 2: B home, aggregate; if level, away goals not used (modern rule), go to pens
  const tacticA = opts.tacticA || teamA.tactic;
  const tacticB = opts.tacticB || teamB.tactic;
  const formationA = opts.formationA;
  const formationB = opts.formationB;
  const leg1 = simulateMatch(teamA, teamB, formA, formB, {
    tacticHome: tacticA, tacticAway: tacticB, homeLineup: opts.lineupA, awayLineup: opts.lineupB, homeRating: opts.ratingA, awayRating: opts.ratingB,
    instructionsHome: opts.instructionsA, instructionsAway: opts.instructionsB, marksHome: opts.marksA, marksAway: opts.marksB,
    depthHome: opts.depthA, widthHome: opts.widthA, depthAway: opts.depthB, widthAway: opts.widthB,
    teamInstructionsHome: opts.teamInstructionsA, teamInstructionsAway: opts.teamInstructionsB,
    setPiecesHome: opts.setPiecesA, setPiecesAway: opts.setPiecesB,
    formationHome: formationA, formationAway: formationB,
  });
  const leg2 = simulateMatch(teamB, teamA, formB, formA, {
    tacticHome: tacticB, tacticAway: tacticA, homeLineup: opts.lineupB, awayLineup: opts.lineupA, homeRating: opts.ratingB, awayRating: opts.ratingA,
    instructionsHome: opts.instructionsB, instructionsAway: opts.instructionsA, marksHome: opts.marksB, marksAway: opts.marksA,
    depthHome: opts.depthB, widthHome: opts.widthB, depthAway: opts.depthA, widthAway: opts.widthA,
    teamInstructionsHome: opts.teamInstructionsB, teamInstructionsAway: opts.teamInstructionsA,
    setPiecesHome: opts.setPiecesB, setPiecesAway: opts.setPiecesA,
    formationHome: formationB, formationAway: formationA,
  });
  const aggA = leg1.goalsHome + leg2.goalsAway;
  const aggB = leg1.goalsAway + leg2.goalsHome;
  let winner, wentToPens = false, penScore = null;
  if (aggA === aggB) {
    wentToPens = true;
    const ratingDiff = teamA.rating - teamB.rating;
    const aWinProb = clamp(0.5 + ratingDiff / 200, 0.32, 0.68);
    const aWins = Math.random() < aWinProb;
    const loserPens = 3 + Math.floor(Math.random() * 3);
    const winnerPens = loserPens + 1 + Math.floor(Math.random() * 2);
    penScore = aWins ? [winnerPens, loserPens] : [loserPens, winnerPens];
    winner = aWins ? teamA : teamB;
  } else {
    winner = aggA > aggB ? teamA : teamB;
  }
  return {
    teamA, teamB, leg1, leg2, aggA, aggB, winner, wentToPens, penScore,
    formationA, formationB,
    leg1Events: generateMatchEvents(leg1, { deferFatigue: true }),
    leg2Events: generateMatchEvents(leg2, { deferFatigue: true }),
  };
}

// ============================================================
// WORLD CUP STRUCTURE (48-team format: 12 groups of 4 -> top two + 8 best third-placed teams -> RO32)
// ============================================================

function buildWorldCupGroups(qualifiedTeams) {
  // 2026 format: 48 teams, 12 groups of 4.
  const numGroups = 12;
  const groups = seedIntoGroups(qualifiedTeams, numGroups);
  return groups.map((groupTeams, idx) => {
    const standings = {};
    groupTeams.forEach(t => standings[t.id] = emptyStanding(t));
    return {
      name: `Group ${String.fromCharCode(65 + idx)}`,
      teams: groupTeams,
      standings,
      schedule: generateSingleRoundRobin(groupTeams),
      matchdayIndex: 0,
      results: [],
    };
  });
}

function rankedWorldCupQualifiers(groups) {
  const auto = [];
  const thirds = [];
  groups.forEach(g => {
    const r = sortStandings(Object.values(g.standings));
    auto.push(r[0].team, r[1].team);
    thirds.push(r[2]);
  });
  const bestThirds = thirds.sort((a,b)=>b.pts-a.pts || b.gd-a.gd || b.gf-a.gf).slice(0,8).map(s=>s.team);
  return { qualified: [...auto, ...bestThirds], bestThirds };
}

function buildRoundOf32(groups) {
  const { qualified } = rankedWorldCupQualifiers(groups);
  // Simplified seeded RO32: stronger group-stage records avoid each other early.
  const seeded = qualified.map(t => {
    const g = groups.find(gr => gr.teams.some(x=>x.id===t.id));
    const st = g.standings[t.id];
    return { team:t, pts:st.pts, gd:st.gd, gf:st.gf };
  }).sort((a,b)=>b.pts-a.pts || b.gd-a.gd || b.gf-a.gf).map(x=>x.team);
  const pairs=[];
  for (let i=0;i<16;i++) pairs.push([seeded[i], seeded[31-i]]);
  return pairs;
}

function nextRoundPairs(winners) {
  const pairs = [];
  for (let i = 0; i < winners.length; i += 2) pairs.push([winners[i], winners[i + 1]]);
  return pairs;
}

// ============================================================
// AFC QUALIFYING CAMPAIGN (the player's home confederation path)
// Real 2026 AFC structure, fully implemented:
// Round 1: 20 teams (10 two-legged ties) -> 10 winners advance to Round 2
//   (only entered if player's team is one of the 20 lowest-ranked nations)
// Round 2: 36 teams (26 byes + 10 R1 winners), 9 groups of 4, double round robin
//   -> top 2 per group (18 teams) advance to Round 3
// Round 3: 18 teams, 3 groups of 6, double round robin
//   -> top 2 per group: DIRECT qualification (6 teams)
//   -> 3rd/4th per group: advance to Round 4 (6 teams)
//   -> 5th/6th: ELIMINATED
// Round 4: 6 teams -> 2 groups of 3, single round robin
//   -> group winners: DIRECT qualification (2 teams)
//   -> group runners-up: Round 5 playoff (2 teams, two-legged)
// Round 5: winner -> inter-confederation playoff (1 single match vs another confed's hopeful)
//   -> winner: FINAL qualification spot
// ============================================================

function findTeam(id) {
  for (const c of Object.values(CONFEDERATIONS)) {
    const found = (c.teams || []).find(t => t.id === id);
    if (found) return found;
  }
  return null;
}

function initAfcCampaign(playerTeamId) {
  const isRound1Team = AFC_ROUND1_PAIRS.some(pair => pair.includes(playerTeamId));
  const base = {
    stage: null,
    round1: null,
    round2: null,
    round3Groups: null,
    round4: null,
    round5: null,
    interConfed: null,
    playerTeamId,
    calendar: initTrainingCalendar(),
    qualifiedDirect: [],
    asianCupQualifiers: [],
    eliminatedAt: null,
    log: [],
  };

  if (isRound1Team) {
    // Build the 10 two-legged Round 1 ties
    const ties = AFC_ROUND1_PAIRS.map(([aId, bId]) => ({
      teamA: findTeam(aId),
      teamB: findTeam(bId),
      tie: null,
    }));
    base.round1 = { ties };
    base.stage = "ROUND1";
  } else {
    // Team has a bye straight to Round 2 — but Round 2 needs the 10 Round 1
    // winners filled in too, so simulate Round 1 in the background right away.
    const bgWinners = AFC_ROUND1_PAIRS.map(([aId, bId]) => {
      const tie = playTwoLegTie(findTeam(aId), findTeam(bId));
      applyMatchFatigue(tie.leg1); applyMatchFatigue(tie.leg2);
      return tie.winner;
    });
    base.stage = "ROUND2";
    base.round2 = buildAfcRound2(AFC_ROUND2_BYES.map(findTeam), bgWinners);
  }
  return base;
}

// Build Round 2: 36 teams (26 byes + 10 Round 1 winners) into the real 9-group draw.
// byeTeams: array of the 26 bye team objects.
// r1WinnerTeams: array of 10 winner team objects, ordered to match AFC_ROUND1_PAIRS indices.
function buildAfcRound2(byeTeams, r1WinnerTeams) {
  const byId = {};
  byeTeams.forEach(t => byId[t.id] = t);

  // Group draw codes are written using the "named" R1 team from the real-world result,
  // but the slot is really "winner of pair N" — substitute the actual simulated winner.
  const groupsTeams = AFC_ROUND2_GROUPS_REAL.map(codes => codes.map(code => {
    if (AFC_R1_SLOT_TO_PAIR_INDEX.hasOwnProperty(code) && r1WinnerTeams) {
      return r1WinnerTeams[AFC_R1_SLOT_TO_PAIR_INDEX[code]];
    }
    return byId[code];
  }).filter(Boolean));

  const standings = groupsTeams.map(teams => {
    const s = {};
    teams.forEach(t => s[t.id] = emptyStanding(t));
    return s;
  });
  const groups = groupsTeams.map((teams, idx) => ({
    name: `Group ${idx + 1}`,
    teams,
    standings: standings[idx],
    schedule: generateDoubleRoundRobin(teams),
    matchdayIndex: 0,
    results: [],
  }));
  return { groups };
}

function getPlayerRound1Tie(campaign) {
  return campaign.round1.ties.find(t => t.teamA.id === campaign.playerTeamId || t.teamB.id === campaign.playerTeamId);
}

function getPlayerGroup(campaign) {
  if (campaign.stage === "ROUND2") {
    return campaign.round2.groups.find(g => g.teams.some(t => t.id === campaign.playerTeamId));
  }
  return campaign.round3Groups.find(g => g.teams.some(t => t.id === campaign.playerTeamId));
}

function isPlayerEliminated(campaign) {
  return !!campaign.eliminatedAt;
}

function isPlayerQualified(campaign) {
  return campaign.qualifiedDirect.some(t => t.id === campaign.playerTeamId);
}

// Resolve all 10 Round 1 ties (called once every tie has a result), advance to Round 2
function resolveRound1(campaign) {
  const winners = campaign.round1.ties.map(t => t.tie.winner);
  const playerWon = winners.some(t => t.id === campaign.playerTeamId);
  if (!playerWon) {
    campaign.eliminatedAt = "Round 1 (Qualifying Play-off)";
    campaign.stage = "ELIMINATED";
    return;
  }
  resetSquadFitness(campaign.playerTeamId);
  campaign.round2 = buildAfcRound2(AFC_ROUND2_BYES.map(findTeam), winners);
  campaign.stage = "ROUND2";
}

// Resolve Round 2: top 2 of each of the 9 groups advance to Round 3 (18 teams),
// and also qualify for the Asian Cup. 3rd/4th are eliminated from World Cup contention.
function resolveRound2(campaign) {
  const round3Teams = [];
  const asianCupQualifiers = [];
  campaign.round2.groups.forEach(g => {
    const ranked = sortStandings(Object.values(g.standings));
    round3Teams.push(ranked[0].team, ranked[1].team);
    asianCupQualifiers.push(ranked[0].team, ranked[1].team);
  });
  campaign.asianCupQualifiers = asianCupQualifiers;
  if (!round3Teams.some(t => t.id === campaign.playerTeamId)) {
    campaign.eliminatedAt = "Round 2 (Group Stage)";
    campaign.stage = "ELIMINATED";
    return;
  }
  const groups = buildGroupStage(round3Teams, 6, { doubleRound: true, seeded: true, numGroups: 3 });
  campaign.round3Groups = groups;
  campaign.stage = "ROUND3";
  resetSquadFitness(campaign.playerTeamId);
}

// Resolve round 3 completion: figure out who's direct-qualified, who's eliminated, who's in round 4
function resolveRound3(campaign) {
  if (campaign.confed && campaign.confed !== 'AFC') return resolveGenericRound3(campaign);
  const directQualifiers = [];
  const round4Teams = [];
  campaign.round3Groups.forEach(g => {
    const ranked = sortStandings(Object.values(g.standings));
    directQualifiers.push(ranked[0].team, ranked[1].team);
    round4Teams.push(ranked[2].team, ranked[3].team);
    // ranked[4], ranked[5] eliminated
  });
  campaign.qualifiedDirect.push(...directQualifiers);
  if (round4Teams.some(t => t.id === campaign.playerTeamId)) {
    // advance
    const r4groups = buildGroupStage(round4Teams, 3, { doubleRound: false, seeded: true, numGroups: 2 });
    campaign.round4 = { groups: r4groups, playoffSeeds: [] };
    campaign.stage = "ROUND4";
    resetSquadFitness(campaign.playerTeamId);
  } else if (directQualifiers.some(t => t.id === campaign.playerTeamId)) {
    campaign.stage = "QUALIFIED";
    resetSquadFitness(campaign.playerTeamId);
  } else {
    campaign.eliminatedAt = "Round 3 (Group Stage)";
    campaign.stage = "ELIMINATED";
  }
}


function resolveGenericRound3(campaign) {
  const confed = campaign.confed;
  const playerId = campaign.playerTeamId;
  if (confed === "CONMEBOL") {
    const ranked = sortStandings(Object.values(campaign.round3Groups[0].standings));
    campaign.qualifiedDirect.push(...ranked.slice(0,6).map(s=>s.team));
    if (ranked.slice(0,6).some(s=>s.team.id===playerId)) { campaign.stage = "QUALIFIED"; resetSquadFitness(playerId); }
    else if (ranked[6] && ranked[6].team.id === playerId) {
      campaign.stage = "INTERCONFED";
      campaign.interConfed = makeInterConfedPath(playerId);
      resetSquadFitness(playerId);
    } else { campaign.eliminatedAt = "CONMEBOL League Phase"; campaign.stage = "ELIMINATED"; }
    return;
  }
  if (confed === "CONCACAF") {
    const winners=[], runners=[];
    campaign.round3Groups.forEach(g => { const r=sortStandings(Object.values(g.standings)); winners.push(r[0].team); runners.push(r[1]); });
    campaign.qualifiedDirect.push(...winners);
    const bestRunners = runners.sort((a,b)=>b.pts-a.pts || b.gd-a.gd || b.gf-a.gf).slice(0,2).map(s=>s.team);
    if (winners.some(t=>t.id===playerId)) { campaign.stage="QUALIFIED"; resetSquadFitness(playerId); }
    else if (bestRunners.some(t=>t.id===playerId)) { campaign.stage="INTERCONFED"; campaign.interConfed=makeInterConfedPath(playerId); resetSquadFitness(playerId); }
    else { campaign.eliminatedAt="CONCACAF Final Round"; campaign.stage="ELIMINATED"; }
    return;
  }
  if (confed === "CAF") {
    const winners=[], runners=[];
    campaign.round3Groups.forEach(g => { const r=sortStandings(Object.values(g.standings)); winners.push(r[0].team); runners.push(r[1]); });
    campaign.qualifiedDirect.push(...winners);
    const bestRunners = runners.sort((a,b)=>b.pts-a.pts || b.gd-a.gd || b.gf-a.gf).slice(0,4).map(s=>s.team);
    if (winners.some(t=>t.id===playerId)) { campaign.stage="QUALIFIED"; resetSquadFitness(playerId); }
    else if (bestRunners.some(t=>t.id===playerId)) {
      const others = bestRunners.filter(t=>t.id!==playerId);
      const rival = shuffle(others)[0] || bestRunners.find(t=>t.id!==playerId);
      campaign.round5 = { teamA: findTeam(playerId), teamB: rival, tie: null, cafPlayoff: true };
      campaign.stage="ROUND5"; resetSquadFitness(playerId);
    }
    else { campaign.eliminatedAt="CAF Group Stage"; campaign.stage="ELIMINATED"; }
    return;
  }
  if (confed === "OFC") {
    const winners=[], runners=[];
    campaign.round3Groups.forEach(g => { const r=sortStandings(Object.values(g.standings)); winners.push(r[0].team); runners.push(r[1]); });
    const final = simulateMatch(winners[0], winners[1], 0, 0, { noDraw:true, neutral:true });
    const champ = final.winner;
    const runner = champ.id === winners[0].id ? winners[1] : winners[0];
    campaign.qualifiedDirect.push(champ);
    campaign.log = campaign.log || []; campaign.log.push(`OFC Final: ${winners[0].name} ${final.goalsHome}-${final.goalsAway} ${winners[1].name}. ${champ.name} qualify.`);
    if (champ.id===playerId) { campaign.stage="QUALIFIED"; resetSquadFitness(playerId); }
    else if (runner.id===playerId || runners.some(t=>t.id===playerId)) { campaign.stage="INTERCONFED"; campaign.interConfed=makeInterConfedPath(playerId); resetSquadFitness(playerId); }
    else { campaign.eliminatedAt="OFC Qualification"; campaign.stage="ELIMINATED"; }
    return;
  }
  if (confed === "UEFA") {
    resolveUefaGroups(campaign);
    return;
  }
}
function pickInterConfedOpponent(playerId){
  const pool = v7AllTeams().filter(t => t.id !== playerId && t.rating >= 65 && t.rating <= 79);
  return shuffle(pool)[0] || shuffle(OTHER_QUALIFIED_POOL.filter(t => t.id !== playerId))[0];
}

// 2026 inter-confederation play-off tournament:
// 6 teams total: AFC, CAF, CONMEBOL, OFC + two CONCACAF sides.
// The top two by ranking/rating are seeded straight into the finals; the
// other four play single-leg semi-finals. Each bracket winner qualifies.
function buildInterConfedEntrants(playerId) {
  const player = findTeam(playerId);
  const confed = v7GetConfedForTeam(playerId);
  const picksByConfed = {
    AFC: ['IRQ','QAT','UAE','OMA','JOR','BHR','UZB'],
    CAF: ['COD','CMR','GHA','NGA','RSA','CPV','GAB'],
    CONMEBOL: ['PER','CHI','VEN','PAR','BOL'],
    OFC: ['NCL','SOL','FIJ','TAH'],
    CONCACAF: ['PAN','CRC','JAM','HON','GUA','CUW','HAI','SUR'],
  };
  const entrants = [];
  if (player) entrants.push(player);
  function add(id) {
    const t = findTeam(id);
    if (t && !entrants.some(x => x.id === t.id)) entrants.push(t);
  }
  // Add exactly the remaining confederation representatives, with CONCACAF getting two slots.
  Object.entries(picksByConfed).forEach(([c, ids]) => {
    const targetSlots = c === 'CONCACAF' ? 2 : 1;
    if (c === confed) return; // player's nation already occupies their confed's slot
    for (const id of ids) {
      if (entrants.filter(t => v7GetConfedForTeam(t.id) === c).length >= targetSlots) break;
      add(id);
    }
  });
  // If the player is CONCACAF, they occupy one of the two CONCACAF spots, so add one more CONCACAF team.
  if (confed === 'CONCACAF') {
    for (const id of picksByConfed.CONCACAF) {
      if (entrants.filter(t => v7GetConfedForTeam(t.id) === 'CONCACAF').length >= 2) break;
      add(id);
    }
  }
  // Defensive fill in case a future data edit removes one of the named teams.
  const fallback = shuffle(v7AllTeams().filter(t => t.id !== playerId && !entrants.some(e => e.id === t.id))); 
  while (entrants.length < 6 && fallback.length) entrants.push(fallback.shift());
  return entrants.slice(0,6);
}

function makeInterConfedPath(playerId) {
  const entrants = buildInterConfedEntrants(playerId);
  const ranked = [...entrants].sort((a,b) => (b.rating || 0) - (a.rating || 0));
  const seeded = ranked.slice(0,2);
  const unseeded = shuffle(ranked.slice(2));
  const player = findTeam(playerId);
  const playerSeedIndex = seeded.findIndex(t => t.id === playerId);

  if (playerSeedIndex !== -1) {
    // Player is one of the top two ranked entrants: skip the semi and play one final.
    const semiPair = playerSeedIndex === 0 ? [unseeded[0], unseeded[1]] : [unseeded[2], unseeded[3]];
    const aiSemi = playSingleKnockout(semiPair[0], semiPair[1], [], [], { neutral:true });
    return {
      round: 'FINAL', seeded: true, opponent: aiSemi.winner, aiSemiResult: aiSemi,
      entrants, seededTeams: seeded, semiResult: null, finalResult: null, result: null,
      note: 'Seeded by ranking: one play-off final to qualify.'
    };
  }

  // Player is unseeded: win a semi-final, then beat one of the two seeded teams in the final.
  const playerUnseededIndex = unseeded.findIndex(t => t.id === playerId);
  const seedIndex = playerUnseededIndex <= 1 ? 0 : 1;
  const bracketUnseeded = seedIndex === 0 ? unseeded.slice(0,2) : unseeded.slice(2,4);
  const semiOpponent = bracketUnseeded.find(t => t.id !== playerId) || pickInterConfedOpponent(playerId);
  return {
    round: 'SEMI', seeded: false, opponent: semiOpponent, finalOpponent: seeded[seedIndex] || pickInterConfedOpponent(playerId),
    entrants, seededTeams: seeded, semiResult: null, finalResult: null, result: null,
    note: 'Unseeded by ranking: semi-final first, then a seeded play-off final.'
  };
}

function resolveRound4(campaign) {
  const winners = [];
  const runnersUp = [];
  campaign.round4.groups.forEach(g => {
    const ranked = sortStandings(Object.values(g.standings));
    winners.push(ranked[0].team);
    runnersUp.push(ranked[1].team);
  });
  campaign.qualifiedDirect.push(...winners);
  if (winners.some(t => t.id === campaign.playerTeamId)) {
    campaign.stage = "QUALIFIED";
    resetSquadFitness(campaign.playerTeamId);
  } else if (runnersUp.some(t => t.id === campaign.playerTeamId)) {
    campaign.round5 = { teamA: runnersUp[0], teamB: runnersUp[1], tie: null };
    campaign.stage = "ROUND5";
    resetSquadFitness(campaign.playerTeamId);
  } else {
    campaign.eliminatedAt = "Round 4 (Group Stage)";
    campaign.stage = "ELIMINATED";
  }
}

function resolveRound5(campaign, tieResult) {
  campaign.round5.tie = tieResult;
  if (tieResult.winner.id === campaign.playerTeamId) {
    if (campaign.confed && campaign.confed !== 'AFC') {
      if (campaign.confed === 'CAF' || campaign.round5?.cafPlayoff) {
        campaign.stage = "INTERCONFED";
        campaign.interConfed = makeInterConfedPath(campaign.playerTeamId);
        resetSquadFitness(campaign.playerTeamId);
        return;
      }
      campaign.qualifiedDirect.push(tieResult.winner); campaign.stage = 'QUALIFIED'; resetSquadFitness(campaign.playerTeamId); return;
    }
    // AFC Round 5 winner goes to inter-confederation playoff, not direct
    campaign.stage = "INTERCONFED";
    const rivalPool = shuffle(OTHER_QUALIFIED_POOL).slice(0, 1);
    campaign.interConfed = makeInterConfedPath(campaign.playerTeamId);
    resetSquadFitness(campaign.playerTeamId);
  } else {
    campaign.eliminatedAt = "Round 5 Playoff";
    campaign.stage = "ELIMINATED";
  }
}

function resolveInterConfed(campaign, matchResult) {
  const path = campaign.interConfed || {};
  // 2026 play-off tournament model: lower seeds play a semi-final, then the winner faces a seeded finalist.
  if (path.round === 'SEMI') {
    path.semiResult = matchResult;
    path.result = matchResult;
    if (matchResult.winner && matchResult.winner.id === campaign.playerTeamId) {
      path.round = 'FINAL';
      path.opponent = path.finalOpponent || pickInterConfedOpponent(campaign.playerTeamId);
      path.result = null;
      resetSquadFitness(campaign.playerTeamId);
    } else {
      campaign.eliminatedAt = "Inter-Confederation Playoff Semi-Final";
      campaign.stage = "ELIMINATED";
    }
    return;
  }
  path.finalResult = matchResult;
  path.result = matchResult;
  if (matchResult.winner && matchResult.winner.id === campaign.playerTeamId) {
    campaign.qualifiedDirect.push(matchResult.winner);
    campaign.stage = "QUALIFIED";
    resetSquadFitness(campaign.playerTeamId);
  } else {
    campaign.eliminatedAt = "Inter-Confederation Playoff Final";
    campaign.stage = "ELIMINATED";
  }
}


function weightedRatedPick(pool, already=new Set(), minUpsetRating=0) {
  const candidates = pool.filter(t => t && !already.has(t.id));
  if (!candidates.length) return null;
  const sorted = [...candidates].sort((a,b)=>(b.rating||0)-(a.rating||0));
  // Small upset chance: most picks are top-rated, but the occasional lower nation can still sneak through.
  const upset = Math.random() < 0.16;
  const sample = upset ? sorted.slice(0, Math.min(sorted.length, 18)) : sorted.slice(0, Math.min(sorted.length, 10));
  const weights = sample.map(t => Math.pow(Math.max(1, (t.rating || 50) - minUpsetRating + 5), upset ? 1.6 : 3.0));
  let r = Math.random() * weights.reduce((a,b)=>a+b,0);
  for (let i=0;i<sample.length;i++) { r -= weights[i]; if (r <= 0) return sample[i]; }
  return sample[0];
}
function pickRealisticQualifiers(confed, count, locked=[], alreadyGlobal=new Set()) {
  const teams = (CONFEDERATIONS[confed]?.teams || []).slice();
  const out = [];
  const already = new Set([...alreadyGlobal]);
  locked.filter(Boolean).forEach(t => { if (!already.has(t.id) && v7GetConfedForTeam(t.id) === confed) { out.push(t); already.add(t.id); } });
  while (out.length < count) {
    const pick = weightedRatedPick(teams, already, 45);
    if (!pick) break;
    out.push(pick); already.add(pick.id);
  }
  return out.slice(0,count);
}
function completeWorldCupField(campaign) {
  const field = [];
  const add = t => { if (t && !field.some(x => x.id === t.id)) field.push(t); };
  (campaign.qualifiedDirect || []).forEach(add);
  const lockedByConfed = {};
  field.forEach(t => { const c=v7GetConfedForTeam(t.id); lockedByConfed[c] = lockedByConfed[c] || []; lockedByConfed[c].push(t); });
  const directTargets = { AFC:8, CAF:9, CONMEBOL:6, CONCACAF:6, OFC:1, UEFA:16 };
  Object.entries(directTargets).forEach(([confed,count]) => {
    pickRealisticQualifiers(confed, count, lockedByConfed[confed] || [], new Set(field.map(t=>t.id))).forEach(add);
  });
  // Inter-confederation play-off: six entrants, two top-ranked/rated skip to finals, two bracket winners qualify.
  // The player's successful inter-confed run is already in qualifiedDirect, so only fill remaining slots if needed.
  const playoffEntrants = ['AFC','CAF','CONMEBOL','OFC','CONCACAF','CONCACAF'].map((confed, idx) => {
    const pool = (CONFEDERATIONS[confed]?.teams || []).filter(t => !field.some(f=>f.id===t.id));
    return weightedRatedPick(pool, new Set(field.map(t=>t.id)), 42);
  }).filter(Boolean);
  const rankedPO = [...playoffEntrants].sort((a,b)=>(b.rating||0)-(a.rating||0));
  const seeded = rankedPO.slice(0,2);
  const unseeded = rankedPO.slice(2);
  const semi1 = unseeded[0] && unseeded[1] ? simulateMatch(unseeded[0], unseeded[1], 0, 0, { noDraw:true, neutral:true }).winner : unseeded[0];
  const semi2 = unseeded[2] && unseeded[3] ? simulateMatch(unseeded[2], unseeded[3], 0, 0, { noDraw:true, neutral:true }).winner : unseeded[2];
  const final1 = seeded[0] && semi1 ? simulateMatch(seeded[0], semi1, 0, 0, { noDraw:true, neutral:true }).winner : seeded[0] || semi1;
  const final2 = seeded[1] && semi2 ? simulateMatch(seeded[1], semi2, 0, 0, { noDraw:true, neutral:true }).winner : seeded[1] || semi2;
  [final1, final2].forEach(add);
  const all = v7AllTeams().filter(t => !field.some(f=>f.id===t.id));
  while (field.length < 48) add(weightedRatedPick(all, new Set(field.map(t=>t.id)), 35));
  return field.slice(0,48);
}

function initWorldCup(campaign) {
  // Build a realistic 48-team field instead of randomly pulling from all 211 nations.
  // Background confederations are rating-weighted simulated qualifiers: stronger teams usually make it,
  // but a few lower-ranked sides can still qualify as proper World Cup stories.
  const fullField = completeWorldCupField(campaign);
  const groups = buildWorldCupGroups(fullField);
  return {
    stage: "GROUPS",
    groups,
    fullField,
    r32: null,
    r16: null,
    qf: null,
    sf: null,
    final: null,
    thirdPlace: null,
    champion: null,
    playerEliminatedAt: null,
  };
}

function getPlayerWCGroup(wc, playerTeamId) {
  return wc.groups.find(g => g.teams.some(t => t.id === playerTeamId));
}

function isPlayerStillInWC(wc, playerTeamId) {
  if (wc.playerEliminatedAt) return false;
  return true;
}

function resolveWCGroups(wc, playerTeamId) {
  const allComplete = wc.groups.every(isGroupComplete);
  if (!allComplete) return;
  const { qualified, bestThirds } = rankedWorldCupQualifiers(wc.groups);
  wc.r32 = { pairs: buildRoundOf32(wc.groups), results: [] };
  wc.stage = "R32";
  if (!qualified.some(t => t.id === playerTeamId)) {
    wc.playerEliminatedAt = "Group Stage";
  } else {
    applyWorldCupRecoveryGap(playerTeamId, 4);
  }
}

function winDrawLossOdds(homeTeam, awayTeam, homeLineup=null, awayLineup=null) {
  const hr = effectiveTeamRating(homeTeam, homeLineup || safeDefaultXI(homeTeam));
  const ar = effectiveTeamRating(awayTeam, awayLineup || safeDefaultXI(awayTeam));
  const diff = hr - ar + 3.5; // home edge
  let home = clamp(0.42 + diff/70, 0.12, 0.78);
  let draw = clamp(0.27 - Math.abs(diff)/180, 0.14, 0.31);
  let away = 1 - home - draw;
  if (away < 0.08) { away = 0.08; draw = Math.max(0.12, 1-home-away); }
  const total = home + draw + away;
  return { home: home/total, draw: draw/total, away: away/total, hr, ar };
}

function ballCoordsForEvent(ev, focusIsHome, isGoalMoment) {
  if (!ev) return { x: 50, y: 50, fromX: 50, fromY: 50 };
  const m = ev.minute || 1;
  const side = focusIsHome ? 1 : -1;
  const wave = Math.sin(m * 0.77);
  const wave2 = Math.cos(m * 0.43);
  const baseX = focusIsHome ? 56 + wave * 22 : 44 - wave * 22;
  const baseY = 50 + wave2 * 28;
  if (isGoalMoment) {
    return focusIsHome
      ? { x: 50 + wave * 8, y: 84, fromX: 48 + wave2 * 10, fromY: 62 }
      : { x: 50 + wave * 8, y: 16, fromX: 52 - wave2 * 10, fromY: 38 };
  }
  if (ev.type === 'yellow' || ev.type === 'red' || ev.type === 'injury') {
    return { x: clamp(baseX, 12, 88), y: clamp(baseY, 14, 86), fromX: clamp(baseX - side*10, 12, 88), fromY: clamp(baseY-6, 14, 86) };
  }
  return { x: clamp(baseX, 10, 90), y: clamp(baseY, 12, 88), fromX: clamp(baseX - side*(14 + (m%8)), 10, 90), fromY: clamp(baseY + wave*8, 12, 88) };
}

// ============================================================
// LIVE PITCH PHYSICS ENGINE
// ============================================================
// A genuine, continuously-stepped physics simulation for the 22 on-pitch dots
// and the ball: each entity has position + velocity, steers toward a "target"
// recomputed every tick from the current phase of play (which team has the
// ball, where the ball is, an upcoming chance/goal, depth/width shape), and
// integrates with simple drag/acceleration rather than being snapped or
// scripted. This runs on every animation frame, independent of the (slower)
// minute-by-minute event reveal — the dots are always moving realistically,
// and react to whatever's currently happening.

// Returns each player's "home" tactical slot, adjusted for depth (how far
// forward/back the whole shape sits) and width (how stretched side-to-side).
function tacticalSlot(basePos, idx, depth, width, isHome) {
  // depth 50 = neutral. Higher depth = deeper defensive line = team sits back.
  // Lower depth = higher line = team presses forward.
  // So increasing depth shifts outfielders TOWARD their own goal, not away.
  const depthShift = idx === 0 ? 0 : (depth - 50) * 0.16;
  const widthScale = 0.7 + (width / 100) * 0.6; // 50 → 1.0, 0 → 0.7, 100 → 1.3
  const xFromCenter = (basePos.x - 50) * widthScale;
  // Higher depth = team drops deeper = y increases for home (toward own goal at y=0)
  const y = isHome ? clamp(basePos.y + depthShift, 4, 92) : clamp(basePos.y - depthShift, 4, 92);
  return { x: clamp(50 + xFromCenter, 4, 96), y };
}

// Initializes a fresh physics state for 11 home + 11 away players and the ball,
// all starting at their tactical slots with zero velocity.
function initPitchPhysics(homePos, awayPos, depthHome, widthHome, depthAway, widthAway) {
  const home = homePos.map((p, i) => { const s = tacticalSlot(p, i, depthHome, widthHome, true); return { x: s.x, y: s.y, vx: 0, vy: 0, baseX: s.x, baseY: s.y }; });
  const away = awayPos.map((p, i) => { const s = tacticalSlot(p, i, depthAway, widthAway, false); return { x: s.x, y: s.y, vx: 0, vy: 0, baseX: s.x, baseY: s.y }; });
  return {
    home, away,
    ball: { x: 50, y: 50, vx: 0, vy: 0 },
    possessorSide: Math.random() < 0.5 ? 'home' : 'away',
    possessorIdx: 5,
    phaseTimer: 0,
  };
}

// Resolves a named player (e.g. event.scorer, event.assist, event.player) to
// their index in the live lineup array, so the physics sim can force that
// specific dot to be the one carrying the ball — this is what keeps "Messi
// cuts inside and shoots" lined up with Messi's actual dot doing exactly that,
// instead of a random teammate being highlighted while the text says Messi.
function resolveLineupIndex(lineup, playerName) {
  if (!playerName || !lineup) return -1;
  return lineup.findIndex(p => p && p.name === playerName);
}

// Picks a new target for the ball: usually a teammate further up the pitch
// (build-up play), occasionally a long ball, biased toward the current event
// phase (a 'goal' or 'chance' event drives a direct surge toward the target
// goal). When the live event names a specific player (scorer/assister), the
// ball is explicitly routed to THAT player's index rather than a generic
// positional pick — so the dot sequence actually matches the commentary.
function resolveShotTarget(outcome, attackingHome) {
  // Net is between posts x=41–59, sitting just beyond the pitch edge (y=-1.5 or y=101.5).
  switch (outcome) {
    case 'goal': return { x: 50+(Math.random()-0.5)*12, y: attackingHome ? 101.2 : -1.2, settle: true };
    case 'post': return { x: Math.random()<0.5?41.5:58.5, y: attackingHome?100:-0.5, settle: true };
    case 'over': return { x: 50+(Math.random()-0.5)*10, y: attackingHome?103.5:-3.5, settle: true };
    case 'wide': return { x: Math.random()<0.5?29+Math.random()*8:63+Math.random()*8, y: attackingHome?100:0, settle: true };
    case 'saved': default: return { x: 50+(Math.random()-0.5)*8, y: attackingHome?96:4, settle: true };
  }
}

function pickBallTarget(state, homeLineup, awayLineup, eventPhase, namedIdx, shotOutcome) {
  const attackingHome = state.possessorSide === 'home';
  const goalY = attackingHome ? 93 : 7;
  const mates = attackingHome ? state.home : state.away;
  if (namedIdx != null && namedIdx >= 0 && namedIdx < mates.length) {
    const m = mates[namedIdx];
    if (eventPhase === 'goal' || eventPhase === 'chance') {
      const closeToGoal = attackingHome ? m.y > 85 : m.y < 15;
      if (closeToGoal && shotOutcome) {
        const dest = resolveShotTarget(shotOutcome, attackingHome);
        return { x: dest.x, y: dest.y, urgent: true, isShot: true, settle: dest.settle };
      }
      return { x: clamp(m.x + (goalY - m.y)*0.55 + (Math.random()-0.5)*6, 4, 96), y: m.y + (goalY - m.y)*0.55, targetIdx: namedIdx, urgent: true };
    }
    return { x: m.x, y: m.y, targetIdx: namedIdx, urgent: false };
  }
  if (eventPhase === 'goal' || eventPhase === 'chance') {
    if (shotOutcome) {
      const dest = resolveShotTarget(shotOutcome, attackingHome);
      return { x: dest.x, y: dest.y, urgent: true, isShot: true, settle: dest.settle };
    }
    return { x: 50+(Math.random()-0.5)*18, y: goalY, urgent: true };
  }
  const forwardBias = attackingHome ? 1 : -1;
  let best = null, bestScore = -Infinity;
  mates.forEach((m, i) => {
    if (i === state.possessorIdx) return;
    const forwardness = (m.y - state.ball.y) * forwardBias;
    const dist = Math.hypot(m.x - state.ball.x, m.y - state.ball.y);
    const score = forwardness * 1.4 - dist * 0.25 + Math.random() * 8;
    if (score > bestScore) { bestScore = score; best = i; }
  });
  return { x: mates[best]?.x ?? 50, y: mates[best]?.y ?? 50, targetIdx: best, urgent: false };
}

// Advances the physics simulation by one tick. See new full version below.
function stepPitchPhysics(state, homeLineup, awayLineup, dt, eventPhase, depthHome, widthHome, depthAway, widthAway, homePos, awayPos, namedIdx, instrHome, instrAway, shotOutcome) {
  const next = {
    home: state.home.map(p => ({...p})),
    away: state.away.map(p => ({...p})),
    ball: {...state.ball},
    possessorSide: state.possessorSide,
    possessorIdx: state.possessorIdx,
    phaseTimer: state.phaseTimer + dt,
    ballTarget: state.ballTarget,
    namedIdx: state.namedIdx,
    shotSettled: state.shotSettled || false,
    settleTimer: state.settleTimer || 0,
    kickoffPhase: state.kickoffPhase || false,  // true while reforming after a goal
    kickoffTimer: state.kickoffTimer || 0,
  };

  const namedChanged = namedIdx !== state.namedIdx;
  if (namedChanged) { next.shotSettled = false; next.settleTimer = 0; next.kickoffPhase = false; next.kickoffTimer = 0; }
  next.namedIdx = namedIdx;

  if (next.shotSettled) {
    next.settleTimer += dt;
    if (next.settleTimer > 0.9) {
      next.shotSettled = false;
      next.settleTimer = 0;
      // If this was a goal (ball in net), start a kickoff phase: drift back to center
      const inNet = next.ball.y > 100 || next.ball.y < 0;
      if (inNet) {
        next.kickoffPhase = true;
        next.kickoffTimer = 0;
        next.ball.x = 50; next.ball.y = 50; next.ball.vx = 0; next.ball.vy = 0;
        // Conceding side gets kickoff possession
        next.possessorSide = next.possessorSide === 'home' ? 'away' : 'home';
        next.possessorIdx = 5;
      }
    }
  } else if (next.kickoffPhase) {
    // Brief kickoff drift: players walk back to their positions, ball at center
    next.kickoffTimer += dt;
    if (next.kickoffTimer > 1.5) {
      next.kickoffPhase = false;
      next.kickoffTimer = 0;
    }
    // Ball stays at center during kickoff, slight drift
    next.ball.x = 50 + (next.ball.x - 50) * 0.88;
    next.ball.y = 50 + (next.ball.y - 50) * 0.88;
    next.ball.vx *= 0.5; next.ball.vy *= 0.5;
  } else {
    const isShotTarget = next.ballTarget && next.ballTarget.isShot && next.ballTarget.settle;
    const arrivalThreshold = isShotTarget ? 0.7 : 3;
    const closeEnough = next.ballTarget && Math.hypot(next.ball.x - next.ballTarget.x, next.ball.y - next.ballTarget.y) < arrivalThreshold;
    const needsNewTarget = !next.ballTarget || namedChanged || next.phaseTimer > (next.ballTarget.urgent ? 1.2 : 1.6) || (closeEnough && !isShotTarget);
    if (needsNewTarget) {
      if (isShotTarget && closeEnough) {
        next.shotSettled = true;
      } else if (!(isShotTarget && !closeEnough)) {
        next.ballTarget = pickBallTarget(next, homeLineup, awayLineup, eventPhase, namedIdx, shotOutcome);
        next.phaseTimer = 0;
        if (next.ballTarget.targetIdx != null) next.possessorIdx = next.ballTarget.targetIdx;
      }
    }
    const bt = next.ballTarget || { x: next.ball.x, y: next.ball.y, urgent: false };
    const ballSpeed = bt.urgent ? 46 : 30;
    const bdx = bt.x - next.ball.x, bdy = bt.y - next.ball.y;
    const bdist = Math.hypot(bdx, bdy) || 1;
    next.ball.vx = next.ball.vx * 0.78 + (bdx / bdist) * ballSpeed * dt;
    next.ball.vy = next.ball.vy * 0.78 + (bdy / bdist) * ballSpeed * dt;
    const isShot = bt && bt.isShot;
    next.ball.x = clamp(next.ball.x + next.ball.vx * dt, 2, 98);
    next.ball.y = clamp(next.ball.y + next.ball.vy * dt, isShot ? -5 : 2, isShot ? 105 : 98);
  }

  // Applies per-player instruction offsets on top of the formation slot so
  // "Cut Inside" actually pulls wingers toward the middle, "Hold Width"
  // pushes them to the touchline, and "Stay Back"/"Get Forward" shifts the
  // player's vertical target. This makes the 8 player instructions visibly
  // change how individual dots move during the live match — not just stats.
  function applyInstructionOffset(slot, player, instr, isHome, inPossession) {
    if (!instr || instr === 'Balanced') return slot;
    const pos = (player?.pos || '').toUpperCase();
    const isWide = ['LW','RW','LM','RM','LB','RB'].includes(pos);
    const isFullback = ['LB','RB'].includes(pos);
    const isLeft = ['LW','LM','LB','LWB'].includes(pos);
    let { x, y } = slot;
    switch (instr) {
      case 'Cut Inside':
        // Wingers and fullbacks tuck inside, away from the touchline
        if (isWide) x = x + (isLeft ? 8 : -8) * (slot.x < 50 ? 1 : -1);
        break;
      case 'Hold Width':
        // Keep wide players on the touchline
        if (isWide) x = isLeft ? clamp(x - 6, 4, 28) : clamp(x + 6, 72, 96);
        break;
      case 'Stay Back':
        // Player stays deeper — shift Y backward (toward own goal) when in possession
        if (isHome) y = clamp(y + (inPossession ? 10 : 5), 4, 88);
        else y = clamp(y - (inPossession ? 10 : 5), 8, 92);
        break;
      case 'Get Forward':
        // Player pushes higher — shift Y forward
        if (isHome) y = clamp(y - (inPossession ? 10 : 5), 10, 90);
        else y = clamp(y + (inPossession ? 10 : 5), 6, 88);
        break;
      case 'Free Roam':
        // Slight random perturbation — player drifts unpredictably
        x = clamp(x + (Math.sin(Date.now()/1400)*8), 8, 92);
        break;
      case 'Press More':
        // Player adopts a higher line regardless of possession — push forward
        if (isHome) y = clamp(y - 6, 10, 80);
        else y = clamp(y + 6, 18, 88);
        break;
      default: break;
    }
    return { x, y };
  }

  function stepTeam(arr, basePosArr, isHome, inPossession, depth, width, lineup, instrMap) {
    return arr.map((p, i) => {
      const slot = tacticalSlot(basePosArr[i], i, depth, width, isHome);
      const player = lineup ? lineup[i] : null;
      const playerName = player?.name;
      const instr = instrMap && playerName ? (instrMap[playerName] || 'Balanced') : 'Balanced';
      const adjustedSlot = applyInstructionOffset(slot, player, instr, isHome, inPossession);
      const isCarrier = inPossession && i === next.possessorIdx;
      const ballPull = isCarrier ? 0.92 : (i === 0 ? 0.05 : 0.30);
      const possessionShift = inPossession ? (isHome ? 3.5 : -3.5) : (isHome ? -2.5 : 2.5);
      const targetX = adjustedSlot.x * (1 - ballPull) + next.ball.x * ballPull;
      const targetY = clamp(adjustedSlot.y * (1 - ballPull) + next.ball.y * ballPull + possessionShift, 4, 92);
      const dx = targetX - p.x, dy = targetY - p.y;
      const dist = Math.hypot(dx, dy) || 1;
      const accel = isCarrier ? 20 : 14;
      const maxSpeed = (isCarrier ? 11 : 9) + Math.random() * 2;
      let vx = p.vx * 0.82 + (dx / dist) * accel * dt;
      let vy = p.vy * 0.82 + (dy / dist) * accel * dt;
      const speed = Math.hypot(vx, vy);
      if (speed > maxSpeed) { vx = (vx / speed) * maxSpeed; vy = (vy / speed) * maxSpeed; }
      return { ...p, x: clamp(p.x + vx * dt, 3, 97), y: clamp(p.y + vy * dt, 3, 97), vx, vy, baseX: adjustedSlot.x, baseY: adjustedSlot.y };
    });
  }
  const homeInPossession = next.possessorSide === 'home';
  next.home = stepTeam(next.home, homePos, true,  homeInPossession,  depthHome, widthHome, homeLineup, instrHome);
  next.away = stepTeam(next.away, awayPos, false, !homeInPossession, depthAway, widthAway, awayLineup, instrAway);

  // Occasional possession turnover during build-up — ~1 per 8-12 seconds of
  // real time — makes the pitch look like actual football where both teams
  // take turns in possession, rather than one side always carrying forward.
  // Never flip during a goal/chance sequence; that's handled by the RAL loop.
  if (eventPhase === 'build' && !next.kickoffPhase && Math.random() < dt * 0.09) {
    next.possessorSide = next.possessorSide === 'home' ? 'away' : 'home';
    next.possessorIdx = 3 + Math.floor(Math.random() * 7); // midfield player gets it
  }

  return next;
}

function roleColor(role) {
  if (role === 'GK') return '#f6b84b';
  if (['CB','LB','RB','LWB','RWB'].includes(role)) return '#58a6ff';
  if (['CDM','CM','LM','RM'].includes(role)) return '#7ee787';
  if (['CAM','SS'].includes(role)) return '#d2a8ff';
  if (['LW','RW','ST'].includes(role)) return '#ff7b72';
  return 'var(--amber)';
}

function DraggableLineupBoard({ team, lineup, setLineup, formation, side='home', title='Lineup', allowSelect=false, selectedIndex=null, onSelectSlot=null, readOnly=false, depth=50, width=50 }) {
  const [dragIndex, setDragIndex] = useState(null);
  const basePos = formationPositions(formation || '4-4-2');
  // Apply depth/width transformations so the board visually matches the
  // slider settings — a high defensive line compresses the team higher on
  // the pitch, wide play stretches the shape to the touchlines.
  const isHome = side !== 'away';
  const pos = basePos.map((p, i) => {
    const slot = tacticalSlot(p, i, depth, width, isHome);
    return isHome ? slot : { x: 100 - slot.x, y: mirrorY(slot.y) };
  });
  function swap(a,b) {
    if (readOnly || a === null || a === undefined || b === null || b === undefined || a === b) return;
    setLineup(prev => { const n=[...prev]; [n[a],n[b]]=[n[b],n[a]]; return n; });
  }
  function onDragStart(e, idx) { if (readOnly) return; setDragIndex(idx); e.dataTransfer.setData('text/plain', String(idx)); }
  function onDropSlot(e, idx) {
    e.preventDefault();
    if (readOnly) return;
    const src = Number(e.dataTransfer.getData('text/plain'));
    swap(Number.isFinite(src) ? src : dragIndex, idx);
    setDragIndex(null);
  }
  return (
    <div style={{border:'1px solid var(--line)',borderRadius:12,overflow:'hidden',background:'rgba(255,255,255,0.03)'}}>

          <span style={{fontFamily:'var(--font-mono)',fontSize:12,fontWeight:900,color:'var(--amber)',border:'1px solid rgba(232,162,61,.35)',borderRadius:999,padding:'3px 8px'}}>{formation || '4-4-2'}</span>

        <span style={{fontFamily:'var(--font-mono)',fontSize:11,color:'var(--chalk-dim)'}}>{readOnly ? 'Opposition view only' : 'Drag players to swap / shape'}</span>

      <div style={{position:'relative',height:'clamp(360px, 42vw, 500px)',minHeight:360,background:'radial-gradient(circle at 50% 50%, rgba(255,255,255,0.055), transparent 26%), linear-gradient(180deg,#0E4A36,#0A3427)',overflow:'hidden'}}>

          <rect x="30" y="2" width="40" height="14" fill="none" stroke="rgba(242,240,232,0.22)" strokeWidth="0.4" />

        </svg>
        <div style={{position:'absolute',left:10,top:10,display:'flex',gap:6,flexWrap:'wrap',zIndex:1,opacity:.9}}>
          {['GK','CB','LB/RB','CDM','CM','CAM','LW/RW','ST'].map(r => <span key={r} style={{fontFamily:'var(--font-mono)',fontSize:9,fontWeight:900,color:roleColor(r.split('/')[0]),background:'rgba(0,0,0,.36)',border:'1px solid rgba(255,255,255,.12)',borderRadius:6,padding:'3px 5px'}}>{r}</span>)}
        </div>
        {(lineup || []).slice(0,11).map((p,i)=><MiniPlayerCard key={(p?.name||'p')+i} p={p} i={i} slotPos={pos[i] || {x:50,y:50}} slotRole={formationSlotRole(formation || '4-4-2', i)} isSelected={selectedIndex===i} onDragStart={onDragStart} onDropSlot={onDropSlot} readOnly={readOnly} onClick={()=>allowSelect && onSelectSlot && onSelectSlot(i)} />)}
      </div>
    </div>
  );
}
