function LiveMatchPitch({ match, onClose }) {
  const [halfPaused, setHalfPaused] = useState(false);
  const [halfDone, setHalfDone] = useState(false);
  const [manualPaused, setManualPaused] = useState(false);
  const [simSpeed, setSimSpeed] = useState(match.initialSpeed || _lastSimSpeed || 2);
  const [selectedSide, setSelectedSide] = useState('home');
  const [selectedSlot, setSelectedSlot] = useState(null);
  const [subWindows, setSubWindows] = useState(0);
  const [subsMade, setSubsMade] = useState(0);
  const [homeLiveLineup, setHomeLiveLineup] = useState(match.homeLineup || safeDefaultXI(match.homeTeam));
  const [awayLiveLineup, setAwayLiveLineup] = useState(match.awayLineup || safeDefaultXI(match.awayTeam));
  const playerSide = match.playerTeamId ? (match.homeTeam.id === match.playerTeamId ? 'home' : 'away') : 'home';
  const [subTeamSide, setSubTeamSide] = useState(playerSide);
  const [subOut, setSubOut] = useState('');
  const [subIn, setSubIn] = useState('');
  const events = match.events || [];
  const fullTimeMinute = match.wentToPens ? 120 : 90;
  // Cap the clock a touch beyond full time so the "Full time"/penalties commentary
  // lines (sorted at 90.5/91) actually become visible once the match concludes.
  const clockCap = fullTimeMinute + 1.5;
  const tickerRef = useRef(null);
  const paused = halfPaused || manualPaused;

  // ---- UNIFIED EVENT-DRIVEN MATCH ENGINE ----
  // One RAF loop owns everything: clock, event sequencing, and physics.
  // Events are processed one at a time in sequence order. When an event fires
  // the clock freezes and physics animates it for a fixed real-time window
  // matched to the event type, THEN the clock advances to the next event.
  // This guarantees that "Messi scores" commentary fires at the exact same
  // moment the physics shows Messi driving toward goal — no decoupling.
  const [currentMinute, setCurrentMinute] = useState(0);
  const currentMinuteRef = useRef(0);
  const rafRef = useRef(null);
  const physRafRef = rafRef; // same loop
  const physLastTsRef = useRef(null);

  // All per-tick state in refs so the RAF doesn't need React re-renders
  const sortedEvents = [...events].sort((a,b)=>(a._sortKey??a.minute)-(b._sortKey??b.minute));
  const eventsRef = useRef(sortedEvents);
  const eventIdxRef = useRef(0);       // index into eventsRef.current of next event to fire
  const eventPhaseRef = useRef('build'); // 'build' | 'goal' | 'chance' | 'card' | 'dead'
  const eventTimerRef = useRef(0);     // real seconds spent in current event phase
  const currentEventRef = useRef(null);// the event currently being animated
  const namedIdxRef = useRef(null);
  const namedSubPhaseRef = useRef(0);
  const namedSubPhaseTimerRef = useRef(0);
  const phaseActiveTimerRef = useRef(0);
  const clockCapRef = useRef(clockCap);

  // How long (real seconds at 1x) each event type gets to animate
  const EVENT_ANIM_SECS = { goal:2.8, chance:1.8, yellow:0.8, red:1.2, freekick:0.7, corner:0.5, default:0.5 };
  // Gap between events: how fast the clock runs during build-up (sim-min/real-sec at 1x)
  const GAP_RATE = 18.0; // game-minutes per real-second at 1x — 2x = 36 min/s, full match ~2.5s at 2x

  const pausedRef = useRef(paused);
  const simSpeedRef = useRef(simSpeed);
  useEffect(() => { pausedRef.current = paused; }, [paused]);
  useEffect(() => { simSpeedRef.current = simSpeed; }, [simSpeed]);

  // Keep lineup/formation refs fresh without re-creating the RAF
  const homeLineupRef = useRef(match.homeLineup || safeDefaultXI(match.homeTeam));
  const awayLineupRef = useRef(match.awayLineup || safeDefaultXI(match.awayTeam));
  const homeFormRef = useRef(match.formationHome || '4-4-2');
  const awayFormRef = useRef(match.formationAway || '4-4-2');
  const instrHomeRef = useRef(match.instructionsHome || {});
  const instrAwayRef = useRef(match.instructionsAway || {});

  // Tracks players sent off (red card) DURING this live match so they can be
  // visually and mechanically removed from the pitch for the rest of the game
  // — real football down-to-10-men consequences, not just a post-match stat.
  const [sentOffHome, setSentOffHome] = useState([]);
  const [sentOffAway, setSentOffAway] = useState([]);
  const sentOffHomeRef = useRef([]);
  const sentOffAwayRef = useRef([]);
  const processedRedCardsRef = useRef(new Set());

  useEffect(() => { homeLineupRef.current = homeLiveLineup; }, [homeLiveLineup]);
  useEffect(() => { awayLineupRef.current = awayLiveLineup; }, [awayLiveLineup]);

  const physRef = useRef(initPitchPhysics(
    formationPositions(homeFormRef.current),
    formationPositions(awayFormRef.current).map(p=>({x:100-p.x,y:mirrorY(p.y)})),
    match.depthHome??50, match.widthHome??50, match.depthAway??50, match.widthAway??50
  ));
  const [physTick, setPhysTick] = useState(0);

  // Keep a ref to halfDone so the RAF can check it without being in deps
  const halfDoneRef = useRef(false);
  useEffect(() => { halfDoneRef.current = halfDone; }, [halfDone]);

  useEffect(() => {
    function tick(ts) {
      try {
      if (physLastTsRef.current == null) physLastTsRef.current = ts;
      const dtSec = Math.min(0.1, (ts - physLastTsRef.current) / 1000);
      physLastTsRef.current = ts;

      if (!pausedRef.current) {
        const spd = simSpeedRef.current;
        const cur = currentMinuteRef.current;
        const evs = eventsRef.current;
        const nextEvIdx = eventIdxRef.current;
        const inPhase = eventPhaseRef.current !== 'build';

        if (inPhase) {
          // ── ANIMATING AN EVENT ──────────────────────────────────────────
          phaseActiveTimerRef.current += dtSec;
          const ev = currentEventRef.current;
          const animSecs = (EVENT_ANIM_SECS[ev?.type] ?? EVENT_ANIM_SECS.default) / spd;

          let namedIdx = null;
          if (ev && (ev.type === 'goal' || ev.type === 'chance')) {
            const sideLineup = ev.isHome ? homeLineupRef.current : awayLineupRef.current;
            const scorerName = ev.scorer || ev.player;
            const assistName = ev.assist;
            if (ev.type === 'goal' && assistName) {
              namedSubPhaseTimerRef.current += dtSec;
              if (namedSubPhaseRef.current === 0 && namedSubPhaseTimerRef.current > 0.5 / spd) namedSubPhaseRef.current = 1;
              const who = namedSubPhaseRef.current === 0 ? assistName : scorerName;
              namedIdx = resolveLineupIndex(sideLineup, who);
            } else {
              namedIdx = resolveLineupIndex(sideLineup, scorerName);
            }
          } else if (ev && (ev.type === 'yellow' || ev.type === 'red')) {
            const sideLineup = ev.isHome ? homeLineupRef.current : awayLineupRef.current;
            namedIdx = resolveLineupIndex(sideLineup, ev.cardPlayer || ev.player);
          }
          namedIdxRef.current = namedIdx;

          const shotOutcome = ev?.type === 'goal' ? 'goal' : (ev?.type === 'chance' ? (ev.shotOutcome || 'saved') : null);
          const hp = formationPositions(homeFormRef.current);
          const ap = formationPositions(awayFormRef.current).map(p => ({ x: 100 - p.x, y: mirrorY(p.y) }));
          physRef.current = stepPitchPhysics(physRef.current, homeLineupRef.current, awayLineupRef.current,
            dtSec, eventPhaseRef.current, match.depthHome ?? 50, match.widthHome ?? 50,
            match.depthAway ?? 50, match.widthAway ?? 50, hp, ap, namedIdx,
            instrHomeRef.current, instrAwayRef.current, shotOutcome);

          if (phaseActiveTimerRef.current >= animSecs || physRef.current.kickoffPhase) {
            // RED CARD ENFORCEMENT: the moment the card animation finishes,
            // the player is actually removed from the pitch for the rest of
            // this match — not just flagged in post-match stats. We mark
            // them in sentOff state (drives the lineup display + 10-men UI)
            // and exclude them from physics/possession from this point on.
            if (ev?.type === 'red') {
              const cardKey = `${ev.isHome ? 'H' : 'A'}-${ev.cardPlayer || ev.player}-${ev.minute}`;
              if (!processedRedCardsRef.current.has(cardKey)) {
                processedRedCardsRef.current.add(cardKey);
                const offName = ev.cardPlayer || ev.player;
                if (ev.isHome) {
                  sentOffHomeRef.current = [...sentOffHomeRef.current, offName];
                  setSentOffHome(sentOffHomeRef.current);
                } else {
                  sentOffAwayRef.current = [...sentOffAwayRef.current, offName];
                  setSentOffAway(sentOffAwayRef.current);
                }
              }
            }
            eventPhaseRef.current = 'build';
            namedIdxRef.current = null;
            namedSubPhaseRef.current = 0;
            namedSubPhaseTimerRef.current = 0;
            phaseActiveTimerRef.current = 0;
            if (ev?.type === 'goal') physRef.current.possessorSide = ev.isHome ? 'away' : 'home';
            else if (ev?.type === 'chance') physRef.current.possessorSide = ev.isHome ? 'away' : 'home';
          }
        } else {
          // ── BUILD-UP PLAY ───────────────────────────────────────────────
          const nextEv = nextEvIdx < evs.length ? evs[nextEvIdx] : null;
          const nextMin = nextEv ? (nextEv._sortKey ?? nextEv.minute) : clockCapRef.current;
          const gap = nextMin - cur;

          if (gap <= 0.08 && nextEv) {
            eventIdxRef.current = nextEvIdx + 1;
            currentEventRef.current = nextEv;
            phaseActiveTimerRef.current = 0;
            namedSubPhaseRef.current = 0;
            namedSubPhaseTimerRef.current = 0;

            if (nextEv.type === 'goal') { eventPhaseRef.current = 'goal'; physRef.current.possessorSide = nextEv.isHome ? 'home' : 'away'; }
            else if (nextEv.type === 'chance') { eventPhaseRef.current = 'chance'; physRef.current.possessorSide = nextEv.isHome ? 'home' : 'away'; }
            else if (nextEv.type === 'yellow' || nextEv.type === 'red') eventPhaseRef.current = 'card';
            else if (nextEv.type === 'freekick') { eventPhaseRef.current = 'freekick'; physRef.current.possessorSide = nextEv.isHome ? 'home' : 'away'; }
            else eventPhaseRef.current = 'dead';

            currentMinuteRef.current = Math.min(clockCap, nextMin);
            setCurrentMinute(currentMinuteRef.current);
          } else {
            // Approach the next event smoothly, but never let the clock get
            // permanently stuck just short of the firing threshold — clamp the
            // "hold back" margin to be strictly smaller than the firing gap.
            const slowFactor = gap < 1.5 ? Math.max(0.15, gap / 1.5) : 1;
            const advRate = Math.max(1.0, GAP_RATE * slowFactor) * spd;
            const holdBack = nextEv ? 0.02 : 0; // must be < the 0.05 firing threshold below
            const newMin = Math.min(nextMin - holdBack, cur + dtSec * advRate);
            currentMinuteRef.current = newMin;
            setCurrentMinute(newMin);

            namedIdxRef.current = null;
            const hp = formationPositions(homeFormRef.current);
            const ap = formationPositions(awayFormRef.current).map(p => ({ x: 100 - p.x, y: mirrorY(p.y) }));
            physRef.current = stepPitchPhysics(physRef.current, homeLineupRef.current, awayLineupRef.current,
              dtSec, 'build', match.depthHome ?? 50, match.widthHome ?? 50,
              match.depthAway ?? 50, match.widthAway ?? 50, hp, ap, null,
              instrHomeRef.current, instrAwayRef.current, null);
          }
        }

        // Halftime — read ref so this doesn't cause RAF to restart
        if (cur >= 45 && !halfDoneRef.current) {
          halfDoneRef.current = true;
          setHalfDone(true);
          setHalfPaused(true);
        }

        setPhysTick(t => t + 1);
      }
      } catch (err) {
        // Never let a single bad frame kill the RAF loop — log and keep the
        // clock moving by nudging it forward so the match doesn't visibly freeze.
        console.error('Match sim tick error (recovered):', err);
        currentMinuteRef.current = Math.min(clockCapRef.current, currentMinuteRef.current + 0.25);
        setCurrentMinute(currentMinuteRef.current);
      }
      rafRef.current = requestAnimationFrame(tick);
    }
    rafRef.current = requestAnimationFrame(tick);
    return () => { if (rafRef.current) { cancelAnimationFrame(rafRef.current); rafRef.current = null; } physLastTsRef.current = null; };
  }, []); // Empty deps — RAF never restarts; reads everything via refs

  const shown = events.filter(e => (e._sortKey ?? e.minute) <= currentMinute);

function PlayByPlayModal({ match, onClose }) {
  const [visibleCount, setVisibleCount] = useState(0);

    if (containerRef.current) {
      containerRef.current.scrollTop = containerRef.current.scrollHeight;

// Remembers the player's last-used formation/tactic across matchdays so they don't
// have to re-pick from scratch every time (still changeable via the setup modal).
let _lastPlayerFormation = "4-2-3-1";
let _lastPlayerTactic = "FLUID_COUNTER";
let _lastSimSpeed = 0.5;

function MatchdayControl({ group, playerTeamId, onPlayed, isWorldCup=false }) {
  const [pendingPlayerMatch, setPendingPlayerMatch] = useState(null);
  const [settingUp, setSettingUp] = useState(false);
  const [viewing, setViewing] = useState(null);

  if (isGroupComplete(group)) return null;

  const nextMatches = group.schedule[group.matchdayIndex];
  const playerMatch = nextMatches.find(([h, a]) => h.id === playerTeamId || a.id === playerTeamId);

  function handleSim() {
    const played = playNextMatchday(group, isWorldCup);
    onPlayed(played);
  }

  function handleOpenSetup() {
    setSettingUp(true);
  }

  function handleAdvanceToPlayerMatch() {
    const playedAll = [];
    while (!isGroupComplete(group)) {
      const nm = group.schedule[group.matchdayIndex];
      const hasPlayer = nm.some(([h,a]) => h.id === playerTeamId || a.id === playerTeamId);
      if (hasPlayer && playedAll.length > 0) break;
      const played = playNextMatchday(group, isWorldCup);
      playedAll.push(...played);
      if (hasPlayer) break;
      const upcoming = !isGroupComplete(group) ? group.schedule[group.matchdayIndex] : [];
      if (upcoming.some(([h,a]) => h.id === playerTeamId || a.id === playerTeamId)) break;
    }
    onPlayed(playedAll);
  }

  function handleConfirmSetup(formation, tactic, setup = null) {
    _lastPlayerFormation = formation;
    _lastPlayerTactic = tactic;
    setSettingUp(false);

    const matches = nextMatches.map(([home, away]) => {
      const formHome = group.standings[home.id].form;
      const formAway = group.standings[away.id].form;
      const isPlayerHome = home.id === playerTeamId;
      const isPlayerAway = away.id === playerTeamId;
      const opts = { isWorldCupFinals: isWorldCup };
      const formationHomePick = isPlayerHome ? formation : pickAiFormation(home);
      const formationAwayPick = isPlayerAway ? formation : pickAiFormation(away);
      opts.formationHome = formationHomePick; opts.formationAway = formationAwayPick;
      if (isPlayerHome) { opts.tacticHome = tactic; if (setup) { opts.homeLineup = setup.lineup; opts.homeRating = setup.rating; opts.instructionsHome = setup.instructions; opts.marksHome = setup.marks; opts.depthHome = setup.depth; opts.widthHome = setup.width; opts.teamInstructionsHome = setup.teamInstructions; opts.setPiecesHome = setup.setPieces; } }
      if (isPlayerAway) { opts.tacticAway = tactic; if (setup) { opts.awayLineup = setup.lineup; opts.awayRating = setup.rating; opts.instructionsAway = setup.instructions; opts.marksAway = setup.marks; opts.depthAway = setup.depth; opts.widthAway = setup.width; opts.teamInstructionsAway = setup.teamInstructions; opts.setPiecesAway = setup.setPieces; } }
      const result = simulateMatch(home, away, formHome, formAway, opts);
      applyResultToStandings(group.standings, home.id, away.id, result.goalsHome, result.goalsAway);
      const isPlayerMatch = isPlayerHome || isPlayerAway;
      const rich = {
        matchday: group.matchdayIndex + 1, ...result,
        formationHome: formationHomePick,
        formationAway: formationAwayPick,
        events: null,
      };
      // The player's own match is about to be shown live (with possible in-game
      // subs), so its fatigue is applied later once subs are known. Every other
      // match in this matchday is pure AI vs AI and never viewed live, so it's
      // safe (and necessary, since nothing else will trigger it) to apply now.
      rich.events = generateMatchEvents(rich, { deferFatigue: isPlayerMatch });
      group.results.push(rich);
      return rich;
    });
    group.matchdayIndex++;
    const myMatch = matches.find(m => m.homeTeam.id === playerTeamId || m.awayTeam.id === playerTeamId);
    if (myMatch) { myMatch.playerTeamId = playerTeamId; myMatch.initialSpeed = setup?.speed || _lastSimSpeed || 0.5; }
    setViewing(myMatch);
    setPendingPlayerMatch({ matches });
  }

  function handleCloseViewer() {
    setViewing(null);
    if (pendingPlayerMatch) {
      onPlayed(pendingPlayerMatch.matches);
      setPendingPlayerMatch(null);
    }
  }

  const opponent = playerMatch
    ? (playerMatch[0].id === playerTeamId ? playerMatch[1] : playerMatch[0])
    : null;
  const playerTeamObj = playerMatch
    ? (playerMatch[0].id === playerTeamId ? playerMatch[0] : playerMatch[1])
    : null;

  return (
    <div style={{
      display: "flex", alignItems: "center", justifyContent: "space-between",
      background: "var(--pitch)", border: "1px solid var(--line)", borderRadius: 8,
      padding: "14px 18px", marginBottom: 16, flexWrap: "wrap", gap: 12,
    }}>
      <div>
        <div style={{ fontFamily: "var(--font-mono)", fontSize: 11, color: "var(--chalk-dim)", letterSpacing: 0.5 }}>
          MATCHDAY {group.matchdayIndex + 1} / {group.schedule.length}
        </div>
        {playerMatch && (
          <div style={{ fontSize: 15, fontWeight: 600, marginTop: 3 }}>
            {playerMatch[0].flag} {playerMatch[0].name} <span style={{ color: "var(--chalk-dim)" }}>vs</span> {playerMatch[1].name} {playerMatch[1].flag}
          </div>
        )}
      </div>
      <div style={{ display: "flex", gap: 10 }}>
        <button onClick={handleSim} style={{
          background: "transparent", border: "1px solid var(--amber)", color: "var(--amber)",
          padding: "10px 16px", borderRadius: 6, fontWeight: 700, fontSize: 13,
        }}>⏩ Quick Sim</button>
        <button onClick={handleAdvanceToPlayerMatch} style={{
          background: "rgba(232,162,61,0.13)", border: "1px solid var(--line)", color: "var(--chalk)",
          padding: "10px 16px", borderRadius: 6, fontWeight: 800, fontSize: 13,
        }}>Advance ▸</button>
        {playerMatch && (
          <button onClick={handleOpenSetup} style={{
            background: "var(--amber)", border: "none", color: "var(--ink)",
            padding: "10px 16px", borderRadius: 6, fontWeight: 700, fontSize: 13,
          }}>▶ Watch Match</button>
        )}
      </div>
      {settingUp && playerTeamObj && (
        <MatchSetupModal
          playerTeam={playerTeamObj}
          opponent={opponent}
          defaultFormation={_lastPlayerFormation}
          defaultTactic={_lastPlayerTactic}
          onConfirm={handleConfirmSetup}
          onClose={() => setSettingUp(false)}
        />
      )}
      {viewing && <LiveMatchPitch match={viewing} onClose={handleCloseViewer} />}
    </div>
  );
}

function Round1Screen({ campaign, setCampaign, onAdvance }) {
  const myTie = getPlayerRound1Tie(campaign);

  const [settingUp, setSettingUp] = useState(false);

  function playOtherTies() {
    otherTies.forEach(t => {
      if (!t.tie) { t.tie = playTwoLegTie(t.teamA, t.teamB); applyMatchFatigue(t.tie.leg1); applyMatchFatigue(t.tie.leg2); }
    });

  function handleConfirmSetup(formation, tactic, setup = null) {

      lineupA: isTeamA && setup ? setup.lineup : undefined,
      lineupB: !isTeamA && setup ? setup.lineup : undefined,

  const playerIsTeamA = myTie.teamA.id === campaign.playerTeamId;
  const opponent = playerIsTeamA ? myTie.teamB : myTie.teamA;

  return (

        </div>
        <div style={{ fontSize: 13, color: "var(--chalk-dim)" }}>
          Two-legged play-off. The winner advances to Round 2 against the confederation's elite.
        </div>
      </div>

      <div style={{
        background: "rgba(232,162,61,0.08)", border: "1px solid var(--amber)",
        borderRadius: 8, padding: "20px 22px", marginBottom: 20,

      }}>

        <span style={{ color: "var(--chalk-dim)", fontSize: 13, fontWeight: 400 }}>vs</span>
        <span>{opponent.name} {opponent.flag}</span>
      </div>

      {!myTie.tie && <CampCalendarWidget campaign={campaign} setCampaign={setCampaign} subtitle="use training/rest before the playoff tie" />}

      {!myTie.tie ? (

        </div>

      {settingUp && (

const SESSION_COLORS = {
  RESISTANCE: "#2f6b52", ENDURANCE: "#2f6b52",
  TACTICAL: "#2952a3", ATTACKING: "#2952a3", DEFENDING: "#2952a3",
  BALL_DISTRIBUTION: "#3a6ea5", TRANSITION: "#5b4fa8", CHANCE_CREATION: "#5b4fa8",
  GOALKEEPING: "#1f2937", POSSESSION: "#1f2937", GROUND_DEFENCE: "#5b4fa8",
  MATCH_PRACTICE: "#1f74b8", MATCH_FOCUS: "#1f2937",
  RECOVERY: "#2f9e7a", REST: "#3a3f4a", MATCH: "#3a9bdc",
};
function CampCalendarWidget({ campaign, setCampaign, subtitle }) {
  if (!campaign.calendar) return null;
  const cal = campaign.calendar;
  const used = cal.trainingUsedThisWindow ?? 0;
  const limit = cal.trainingLimitPerWindow ?? 2;
  const remaining = Math.max(0, limit - used);
  const exhausted = remaining <= 0;
  const team = findTeam(campaign.playerTeamId);
  const roster = team && ROSTERS[team.id];
  const [editingCell, setEditingCell] = useState(null); // {dayIndex, unitRowIdx} | null
  function handleAdvanceDay() {
    const applied = applyTrainingDay(campaign);
    if (applied) setCampaign({ ...campaign });
  }
  function handlePickFormation(key) {
    setTrainingFormationFocus(campaign, key);
    setCampaign({ ...campaign });
  }
  function handlePickSession(dayIndex, unitRowIdx, sessionKey) {
    const ok = setTrainingSession(campaign, dayIndex, unitRowIdx, sessionKey);
    if (ok) setCampaign({ ...campaign });
    setEditingCell(null);
  }
  function handlePreset(presetKey) {
    const ok = applyTrainingPreset(campaign, presetKey);
    if (ok) setCampaign({ ...campaign });
  }
  if (!roster) return null;
  const players = [...(roster.startingXI||[]), ...(roster.bench||[])];
  const avg = (field) => players.reduce((a,p)=>a+(p[field]??0),0) / Math.max(1,players.length);
  const avgFitness = avg('fitness'); const avgFatigue = avg('fatigue');
  const condition = clamp(Math.round(avgFitness - avgFatigue*0.25), 0, 100);
  const sharpness = clamp(Math.round(avg('familiarity')), 0, 100);
  const morale = roster.morale ?? 60;
  const tacticalFocus = cal.selectedTacticalFormation || roster.formation;
  const today = cal.week[cal.weekDayIndex % 7];
  function Bar({ value, good }) {
    const pct = clamp(value, 0, 100);
    const color = good ? (pct>66?'#2f9e7a':pct>33?'var(--amber)':'var(--red)') : (pct>66?'var(--red)':pct>33?'var(--amber)':'#2f9e7a');
    const tone = good ? (pct>66?'good-high':pct>33?'good-mid':'good-low') : (pct>66?'bad-high':pct>33?'bad-mid':'bad-low');
    return <div className="training-status-bar" style={{height:7,borderRadius:4,background:'#222',overflow:'hidden'}}><div className={`training-status-fill ${tone}`} style={{height:'100%',minHeight:'100%',width:`${pct}%`,background:color,borderRadius:4}} /></div>;
  }
  // Session types grouped for a friendlier picker, rather than one long flat list.
  const SESSION_GROUPS = [
    { label: "Physical", keys: ["RESISTANCE","ENDURANCE"] },
    { label: "Tactical", keys: ["TACTICAL","ATTACKING","DEFENDING"] },
    { label: "Units", keys: ["BALL_DISTRIBUTION","TRANSITION","CHANCE_CREATION","GROUND_DEFENCE"] },
    { label: "Team", keys: ["GOALKEEPING","POSSESSION","MATCH_PRACTICE","MATCH_FOCUS"] },
    { label: "Recovery", keys: ["RECOVERY","REST"] },
  ];
  return (
    <div style={{ background:'rgba(255,255,255,0.03)', border:'1px solid var(--line)', borderRadius:10, padding:14, marginBottom:16 }}>
      <div style={{ display:'flex', justifyContent:'space-between', alignItems:'flex-start', gap:12, flexWrap:'wrap', marginBottom:10 }}>
        <div>
          <strong>Training Calendar</strong>
          <div style={{ color:'var(--chalk-dim)', fontSize:12 }}>Day {cal.day} · Week {(cal.weekIndex||0)+1} · {subtitle || 'training affects fitness, fatigue, tactical familiarity and morale'} · click a day to edit it</div>
        </div>
        <div className="training-status-strip" style={{ display:'grid', gridTemplateColumns:'repeat(4,minmax(70px,1fr))', gap:10, fontSize:11 }}>
          <div className="training-status-item"><div className="training-status-label" style={{color:'var(--chalk-dim)',marginBottom:3}}>CONDITION</div><Bar value={condition} good/><div className="training-status-value" style={{display:'none'}}>{Math.round(condition)}</div></div>
          <div className="training-status-item"><div className="training-status-label" style={{color:'var(--chalk-dim)',marginBottom:3}}>FATIGUE</div><Bar value={avgFatigue}/><div className="training-status-value" style={{display:'none'}}>{Math.round(avgFatigue)}</div></div>
          <div className="training-status-item"><div className="training-status-label" style={{color:'var(--chalk-dim)',marginBottom:3}}>SHARPNESS</div><Bar value={sharpness} good/><div className="training-status-value" style={{display:'none'}}>{Math.round(sharpness)}</div></div>

function ordinal(n) {
  const s = ["th", "st", "nd", "rd"];
  const v = n % 100;
  return n + (s[(v - 20) % 10] || s[v] || s[0]);
}

function UefaPlayoffScreen({ campaign, setCampaign, onAdvance }) {
  const playerId = campaign.playerTeamId;
  const myPath = campaign.uefaPlayoffs.paths.find(p =>
    [p.semi1.home, p.semi1.away, p.semi2.home, p.semi2.away].some(t => t.id === playerId)
  );
  const [settingUp, setSettingUp] = useState(null); // { home, away, slot }
  const [viewing, setViewing] = useState(null);

  function autoSimOtherPaths() {
    campaign.uefaPlayoffs.paths.forEach(path => {
      if (path === myPath) return;
      if (!path.semi1.result) { path.semi1.result = playSingleKnockout(path.semi1.home, path.semi1.away); applyMatchFatigue(path.semi1.result); }
      if (!path.semi2.result) { path.semi2.result = playSingleKnockout(path.semi2.home, path.semi2.away); applyMatchFatigue(path.semi2.result); }
      if (path.semi1.result && path.semi2.result && !path.final) {
        const w1 = path.semi1.result.winner, w2 = path.semi2.result.winner;
        const w1Home = Math.random() < 0.5;
        path.final = { home: w1Home ? w1 : w2, away: w1Home ? w2 : w1, result: null };
      }
      if (path.final && !path.final.result) { path.final.result = playSingleKnockout(path.final.home, path.final.away); applyMatchFatigue(path.final.result); }
    });
  }

  function myCurrentMatch() {
    if (myPath.semi1.home.id === playerId || myPath.semi1.away.id === playerId) {
      if (!myPath.semi1.result) return { slot: "semi1", home: myPath.semi1.home, away: myPath.semi1.away };
    }
    if (myPath.semi2.home.id === playerId || myPath.semi2.away.id === playerId) {
      if (!myPath.semi2.result) return { slot: "semi2", home: myPath.semi2.home, away: myPath.semi2.away };
    }
    if (myPath.final && (myPath.final.home.id === playerId || myPath.final.away.id === playerId) && !myPath.final.result) {
      return { slot: "final", home: myPath.final.home, away: myPath.final.away };
    }
    return null;
  }

  function handleOpenSetup() {
    autoSimOtherPaths();
    const m = myCurrentMatch();
    if (m) setSettingUp(m);
    setCampaign({ ...campaign });
  }

  function handleConfirmSetup(formation, tactic, setup = null) {
    _lastPlayerFormation = formation;
    _lastPlayerTactic = tactic;
    const { slot, home, away } = settingUp;
    const isPlayerHome = home.id === playerId;
    const m = playSingleKnockout(home, away, [], [], {
      tacticA: isPlayerHome ? tactic : undefined, tacticB: !isPlayerHome ? tactic : undefined,
      formationA: isPlayerHome ? formation : pickAiFormation(home),
      formationB: !isPlayerHome ? formation : pickAiFormation(away),
      lineupA: isPlayerHome && setup ? setup.lineup : undefined, lineupB: !isPlayerHome && setup ? setup.lineup : undefined,
      ratingA: isPlayerHome && setup ? setup.rating : undefined, ratingB: !isPlayerHome && setup ? setup.rating : undefined,
      instructionsA: isPlayerHome && setup ? setup.instructions : undefined, instructionsB: !isPlayerHome && setup ? setup.instructions : undefined,
      marksA: isPlayerHome && setup ? setup.marks : undefined, marksB: !isPlayerHome && setup ? setup.marks : undefined,
      depthA: isPlayerHome && setup ? setup.depth : undefined, depthB: !isPlayerHome && setup ? setup.depth : undefined,
      widthA: isPlayerHome && setup ? setup.width : undefined, widthB: !isPlayerHome && setup ? setup.width : undefined,
      teamInstructionsA: isPlayerHome && setup ? setup.teamInstructions : undefined, teamInstructionsB: !isPlayerHome && setup ? setup.teamInstructions : undefined, setPiecesA: isPlayerHome && setup ? setup.setPieces : undefined, setPiecesB: !isPlayerHome && setup ? setup.setPieces : undefined,
    });
    m.playerTeamId = playerId; m._slot = slot; m.initialSpeed = setup?.speed || _lastSimSpeed || 0.5;
    setSettingUp(null);
    setViewing(m);
  }

  function handleCloseViewer() {
    const slot = viewing._slot;
    myPath[slot].result = viewing;
    if (myPath.semi1.result && myPath.semi2.result && !myPath.final) {
      const w1 = myPath.semi1.result.winner, w2 = myPath.semi2.result.winner;
      const w1Home = Math.random() < 0.5;
      myPath.final = { home: w1Home ? w1 : w2, away: w1Home ? w2 : w1, result: null };
    }
    setViewing(null);
    setCampaign({ ...campaign });
    if (slot !== "final" && viewing.winner.id !== playerId) {
      campaign.eliminatedAt = `UEFA Play-off Path ${myPath.letter} ${slot === "semi1" ? "Semi-Final" : "Semi-Final"}`;
      campaign.stage = "ELIMINATED";
      setCampaign({ ...campaign });
    } else if (slot === "final") {
      resolveUefaPlayoffPath(campaign, myPath);
      setCampaign({ ...campaign });
      if (campaign.stage === "QUALIFIED" || campaign.stage === "ELIMINATED") setTimeout(() => onAdvance(), 300);
    }
  }

  const myMatch = myCurrentMatch();
  const waitingOnOtherSemi = !myMatch && !(myPath.semi1.result && myPath.semi2.result);

  return (
    <div style={{ maxWidth: 640, margin: "0 auto", padding: "24px 20px 80px", textAlign: "center" }}>

      </div>

      <div style={{ display: "flex", flexDirection: "column", gap: 10, marginBottom: 20 }}>
        {[["Semi-Final 1", myPath.semi1], ["Semi-Final 2", myPath.semi2], myPath.final ? ["Final", myPath.final] : null].filter(Boolean).map(([label, leg]) => (
          <div key={label} style={{
            background: "var(--pitch)", border: "1px solid var(--line)", borderRadius: 8, padding: "12px 16px",

            </span>
            {leg.result ? (

      {myMatch && !settingUp && !viewing && (
        <button onClick={handleOpenSetup} style={{
          background: "var(--amber)", border: "none", color: "var(--ink)",
          padding: "14px 28px", borderRadius: 6, fontWeight: 700, fontSize: 14,

        <MatchSetupModal
          playerTeam={findTeam(playerId)}

          defaultFormation={_lastPlayerFormation}
          defaultTactic={_lastPlayerTactic}

          onClose={() => setSettingUp(null)}
        />
      )}

      {viewing && <LiveMatchPitch match={viewing} onClose={handleCloseViewer} />}
    </div>
  );

      tacticA: tactic, formationA: formation, formationB: pickAiFormation(opponent),
      lineupA: setup ? setup.lineup : undefined,
      ratingA: setup ? setup.rating : undefined,
      instructionsA: setup ? setup.instructions : undefined,

const ROUND_LABELS = {
  R32: "Round of 32",
  R16: "Round of 16",
  QF: "Quarter-Finals",
  SF: "Semi-Finals",
  FINAL: "Final",
};

function KnockoutRoundScreen({ wc, setWc, playerTeamId, roundKey, onAdvance, onChampion }) {
  const round = wc[roundKey.toLowerCase()];
  const pairs = roundKey === "FINAL" ? [round.pair] : round.pairs;
  const results = round.results;
  const [settingUp, setSettingUp] = useState(null); // { idx, home, away, playerIsHome }
  const [viewing, setViewing] = useState(null);
  const [pendingIdx, setPendingIdx] = useState(null);

  const playerPairIdx = pairs.findIndex(p => p[0].id === playerTeamId || p[1].id === playerTeamId);
  const isPlayerStillIn = playerPairIdx !== -1 && !results[playerPairIdx];

  function playPair(idx) {
    const [a, b] = pairs[idx];
    const isPlayerMatch = a.id === playerTeamId || b.id === playerTeamId;
    const isHomeA = Math.random() < 0.5; // randomize "home" for neutral-venue knockouts
    const home = isHomeA ? a : b;
    const away = isHomeA ? b : a;

    if (isPlayerMatch) {
      setSettingUp({ idx, home, away, playerIsHome: home.id === playerTeamId });
      return;
    }
    const m = playSingleKnockout(home, away, [], [], { isWorldCupFinals: true });
    applyMatchFatigue(m);
    const newResults = [...results];
    newResults[idx] = m;
    round.results = newResults;
    setWc({ ...wc });
    checkRoundComplete(newResults);
  }

  function handleConfirmSetup(formation, tactic, setup = null) {
    _lastPlayerFormation = formation;
    _lastPlayerTactic = tactic;
    const { idx, home, away, playerIsHome } = settingUp;
    setSettingUp(null);
    const m = playSingleKnockout(home, away, [], [], {
      isWorldCupFinals: true,
      tacticA: playerIsHome ? tactic : undefined,
      tacticB: !playerIsHome ? tactic : undefined,
      formationA: playerIsHome ? formation : pickAiFormation(home),
      formationB: !playerIsHome ? formation : pickAiFormation(away),
      lineupA: playerIsHome && setup ? setup.lineup : undefined,
      lineupB: !playerIsHome && setup ? setup.lineup : undefined,
      ratingA: playerIsHome && setup ? setup.rating : undefined,
      ratingB: !playerIsHome && setup ? setup.rating : undefined,
      instructionsA: playerIsHome && setup ? setup.instructions : undefined,
      instructionsB: !playerIsHome && setup ? setup.instructions : undefined,
      marksA: playerIsHome && setup ? setup.marks : undefined,
      marksB: !playerIsHome && setup ? setup.marks : undefined,
      depthA: playerIsHome && setup ? setup.depth : undefined,
      depthB: !playerIsHome && setup ? setup.depth : undefined,
      widthA: playerIsHome && setup ? setup.width : undefined,
      widthB: !playerIsHome && setup ? setup.width : undefined,
      teamInstructionsA: playerIsHome && setup ? setup.teamInstructions : undefined, setPiecesA: playerIsHome && setup ? setup.setPieces : undefined,
      teamInstructionsB: !playerIsHome && setup ? setup.teamInstructions : undefined,
    });
    m.playerTeamId = playerTeamId; m.initialSpeed = setup?.speed || _lastSimSpeed || 0.5;
    setViewing(m);
    setPendingIdx(idx);
  }

  function handleCloseViewer() {
    const newResults = [...results];
    newResults[pendingIdx] = viewing;
    round.results = newResults;
    setViewing(null);
    setWc({ ...wc });
    checkRoundComplete(newResults);
  }

  function checkRoundComplete(currentResults) {
    if (currentResults.filter(Boolean).length === pairs.length) {
      const winners = pairs.map((p, i) => currentResults[i].winner);
      if (roundKey === "FINAL") {
        onChampion(winners[0]);
      } else {
        setTimeout(() => onAdvance(winners), 500);
      }
    }
  }

  function simAllNonPlayerMatches() {
    const newResults = [...results];
    let changed = false;
    pairs.forEach(([a, b], idx) => {
      if (newResults[idx]) return; // already played
      const isPlayerMatch = a.id === playerTeamId || b.id === playerTeamId;
      if (isPlayerMatch) return; // player plays their own match
      const home = Math.random() < 0.5 ? a : b;
      const away = home === a ? b : a;
      const m = playSingleKnockout(home, away, [], [], { isWorldCupFinals: true });
      applyMatchFatigue(m);
      newResults[idx] = m;
      changed = true;
    });
    if (changed) {
      round.results = newResults;
      setWc({ ...wc });
      checkRoundComplete(newResults);
    }
  }

  const nonPlayerPending = pairs.filter(([a,b], idx) =>
    !results[idx] && a.id !== playerTeamId && b.id !== playerTeamId
  ).length;
  const playerMatchPending = pairs.some(([a,b], idx) =>
    !results[idx] && (a.id === playerTeamId || b.id === playerTeamId)
  );

  const allDone = results.filter(Boolean).length === pairs.length;
  const settingUpPlayerTeam = settingUp ? (settingUp.playerIsHome ? settingUp.home : settingUp.away) : null;
  const settingUpOpponent = settingUp ? (settingUp.playerIsHome ? settingUp.away : settingUp.home) : null;

  return (
    <div style={{ maxWidth: 700, margin: "0 auto", padding: "24px 20px 80px" }}>
      <div style={{ marginBottom: 20 }}>
        <div style={{ fontFamily: "var(--font-display)", fontSize: 34, fontWeight: 600 }}>
          World Cup — {ROUND_LABELS[roundKey]}
        </div>
        <div style={{ fontSize: 13, color: "var(--chalk-dim)" }}>
          {roundKey === "FINAL" ? "Winner takes it all." : "Single elimination. Extra time and penalties if level."}
        </div>
      </div>

      {nonPlayerPending > 0 && !allDone && (
        <div style={{ display:"flex", justifyContent:"flex-end", marginBottom:10 }}>
          <button onClick={simAllNonPlayerMatches} style={{
            background:"rgba(255,255,255,0.06)", border:"1px solid var(--line)", color:"var(--chalk)",
            padding:"8px 14px", borderRadius:6, fontWeight:700, fontSize:12.5, cursor:"pointer"
          }}>⏩ Sim All ({nonPlayerPending} match{nonPlayerPending!==1?'es':''})</button>
        </div>
      )}

      <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
        {pairs.map((pair, idx) => {
          const res = results[idx];
          const isPlayerMatch = pair[0].id === playerTeamId || pair[1].id === playerTeamId;
          return (
            <div key={idx} style={{
              background: isPlayerMatch ? "rgba(232,162,61,0.08)" : "var(--pitch)",
              border: isPlayerMatch ? "1px solid var(--amber)" : "1px solid var(--line)",
              borderRadius: 8, padding: "14px 18px",
              display: "flex", alignItems: "center", justifyContent: "space-between", flexWrap: "wrap", gap: 10,
            }}>
              <div style={{ display: "flex", alignItems: "center", gap: 14, fontSize: 16, fontWeight: 600 }}>
                <span style={{ opacity: res && res.winner.id !== pair[0].id ? 0.45 : 1 }}>{pair[0].flag} {pair[0].name}</span>
                {res ? (
                  <span style={{ fontFamily: "var(--font-mono)", color: "var(--amber)" }}>
                    {res.goalsHome === undefined ? "" : `${res.homeTeam.id === pair[0].id ? res.goalsHome : res.goalsAway} - ${res.homeTeam.id === pair[0].id ? res.goalsAway : res.goalsHome}`}
                    {res.wentToPens && ` (pens)`}
                  </span>
                ) : <span style={{ color: "var(--chalk-dim)", fontSize: 13, fontWeight: 400 }}>vs</span>}
                <span style={{ opacity: res && res.winner.id !== pair[1].id ? 0.45 : 1 }}>{pair[1].name} {pair[1].flag}</span>
              </div>
              {!res && (
                <button onClick={() => playPair(idx)} style={{
                  background: "var(--amber)", border: "none", color: "var(--ink)",
                  padding: "8px 16px", borderRadius: 5, fontWeight: 700, fontSize: 12.5,
                }}>{isPlayerMatch ? "▶ Watch Match" : "⏩ Sim"}</button>
              )}
              {res && (

function exportSaveFile(appState) {
  ensureStatsRoot();
  const payload = { savedAt:new Date().toISOString(), appState, stats:window.__RTC_STATS||null, avail:window.__RTC_AVAIL||null, career:window.__RTC_CAREER||null, rosters:ROSTERS||null };
  const blob = new Blob([JSON.stringify(payload,null,2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const teamId = appState?.playerTeam?.id || 'save';
  a.href = url; a.download = `road-to-the-cup-${teamId}-${Date.now()}.json`; a.click();
  setTimeout(()=>URL.revokeObjectURL(url), 1000);
}
function importSavePayload(payload) {
  if (!payload || !payload.appState) return null;
  window.__RTC_STATS = payload.stats || null;
  ensureStatsRoot();
  window.__RTC_AVAIL = payload.avail || {suspensions:{},injuries:{},yellows:{}};
  window.__RTC_CAREER = payload.career || {playerForm:{},teamRankPts:{},history:[],year:2026};
  if (payload.rosters) {
    Object.keys(ROSTERS).forEach(key => { delete ROSTERS[key]; });
    Object.entries(payload.rosters).forEach(([key, val]) => { ROSTERS[key] = val; });
  }
  return payload.appState;
}

        <div style={{border:'1px solid var(--line)',borderRadius:10,padding:16}}><div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:14}}><select value={predHome} onChange={e=>setPredHome(e.target.value)} style={{background:'var(--pitch)',color:'var(--chalk)',padding:10,border:'1px solid var(--line)',borderRadius:7}}>{teams.map(t=><option key={t.id} value={t.id}>{t.flag} {t.name}</option>)}</select><select value={predAway} onChange={e=>setPredAway(e.target.value)} style={{background:'var(--pitch)',color:'var(--chalk)',padding:10,border:'1px solid var(--line)',borderRadius:7}}>{teams.map(t=><option key={t.id} value={t.id}>{t.flag} {t.name}</option>)}</select></div><div style={{fontFamily:'var(--font-display)',fontSize:38,color:'var(--amber)'}}>{home.flag} {home.name} vs {away.flag} {away.name}</div><div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10,marginTop:12}}>{[['Home Win',pred.home,pred.oddsHome],['Draw',pred.draw,pred.oddsDraw],['Away Win',pred.away,pred.oddsAway]].map(x=><div key={x[0]} style={{background:'rgba(232,162,61,0.10)',border:'1px solid rgba(232,162,61,0.25)',borderRadius:10,padding:14,textAlign:'center'}}><div style={{fontSize:12,color:'var(--chalk-dim)'}}>{x[0]}</div><div style={{fontSize:26,fontWeight:900}}>{Math.round(x[1]*100)}%</div><div style={{fontFamily:'var(--font-mono)',color:'var(--amber)'}}>odds {x[2]}</div></div>)}</div></div>
        <div style={{border:'1px solid var(--line)',borderRadius:10,padding:16}}><div style={{fontFamily:'var(--font-display)',fontSize:30,color:'var(--amber)'}}>Most likely scores</div>{pred.scorelines.map((s,i)=><div key={s} style={{padding:12,borderTop:'1px solid var(--line)',fontSize:20,fontWeight:900}}>#{i+1} · {s}</div>)}<div style={{color:'var(--chalk-dim)',marginTop:12}}>Odds use effective XI rating, current form and chemistry. They update as form/rankings change.</div></div>
      </div>}
      {tab==='rankings' && <RankingsTab ranks={ranks} playerTeam={playerTeam} />}

      {tab==='legacy' && <div>{(careerStore().history||[]).length ? <table style={{width:'100%',borderCollapse:'collapse'}}><thead><tr style={{color:'var(--amber)',textAlign:'left'}}><th>Year</th><th>Winner</th><th>Your Finish</th><th>Golden Ball</th><th>Golden Boot</th></tr></thead><tbody>{careerStore().history.map((h,i)=><tr key={i} style={{borderTop:'1px solid var(--line)'}}><td>{h.year}</td><td style={{fontWeight:900}}>{h.champion?.flag} {h.champion?.name}</td><td>{h.playerFinish || '-'}</td><td>{h.goldenBall?.player?.name || '-'} {h.goldenBall?.team?.flag || ''}</td><td>{h.goldenBoot?.player?.name || '-'} ({h.goldenBoot?.goals || 0}G)</td></tr>)}</tbody></table> : <div style={{padding:30,textAlign:'center',color:'var(--chalk-dim)'}}>Finish a World Cup to add it to tournament history.</div>}</div>}
      {tab==='saves' && <div>
        <div style={{display:'flex',gap:10,flexWrap:'wrap',marginBottom:14,padding:12,border:'1px solid var(--line)',borderRadius:10,background:'rgba(255,255,255,0.03)'}}>
          <button onClick={()=>exportSaveFile(appState)} style={{background:'var(--amber)',color:'var(--ink)',border:'none',borderRadius:7,padding:'10px 14px',fontWeight:900}}>Export Save File</button>
          <label style={{background:'transparent',color:'var(--chalk)',border:'1px solid var(--line)',borderRadius:7,padding:'10px 14px',fontWeight:900,cursor:'pointer'}}>Import Save File<input type="file" accept="application/json,.json" onChange={importFile} style={{display:'none'}} /></label>
          <div style={{color:'var(--chalk-dim)',fontSize:12,alignSelf:'center'}}>Slots use browser storage; export/import gives you a real backup file you can move between browsers.</div>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(240px,1fr))',gap:14}}>{[1,2,3].map(slot=>{const meta=saveMeta(slot);return <div key={slot} style={{border:'1px solid var(--line)',borderRadius:10,padding:16,background:'rgba(255,255,255,0.03)'}}><div style={{fontFamily:'var(--font-display)',fontSize:30,color:'var(--amber)'}}>Save Slot {slot}</div><div style={{minHeight:38,color:'var(--chalk-dim)',fontSize:12}}>{meta ? `Saved ${new Date(meta.savedAt).toLocaleString()}` : 'Empty slot'}</div><div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginTop:12}}><button onClick={()=>save(slot)} style={{background:'var(--amber)',color:'var(--ink)',border:'none',borderRadius:7,padding:10,fontWeight:900}}>Save</button><button onClick={()=>load(slot)} style={{background:'transparent',color:'var(--chalk)',border:'1px solid var(--line)',borderRadius:7,padding:10,fontWeight:900}}>Load</button></div></div>})}</div>
      </div>}
      {tab==='feedback' && <FeedbackPanel />}
    </div>
  </div>;
}
// Feedback tab: a simple textbox that emails the submission to the developer.
// This file has no backend of its own (it's a single static HTML file), so
// submissions go through Web3Forms — a free, no-signup, client-side-safe
// form relay built exactly for this use case (static sites with no server).
// Every submission is forwarded straight to roadtoworldcupnael@gmail.com.
function FeedbackPanel() {
  const [message, setMessage] = useState('');
  const [name, setName] = useState('');
  const [status, setStatus] = useState('idle'); // idle | sending | sent | error
  // IMPORTANT: Web3Forms ties each access key to one destination inbox at
  // signup — go to https://web3forms.com, create a key using
  // roadtoworldcupnael@gmail.com, and paste it here so submissions actually land
  // in that inbox.
  const FEEDBACK_ACCESS_KEY = 'REPLACE_WITH_YOUR_WEB3FORMS_ACCESS_KEY';

  async function handleSubmit() {
    if (!message.trim()) return;
    setStatus('sending');
    try {
      const res = await fetch('https://api.web3forms.com/submit', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', Accept: 'application/json' },
        body: JSON.stringify({
          access_key: FEEDBACK_ACCESS_KEY,
          subject: 'Road to the Cup — new feedback',
          from_name: name.trim() || 'Anonymous player',
          message: message.trim(),
        }),
      });
      const data = await res.json();
      if (data.success) { setStatus('sent'); setMessage(''); setName(''); }
      else setStatus('error');
    } catch (e) {
      setStatus('error');
    }
  }

  return (
    <div style={{maxWidth:640}}>
      <div style={{fontFamily:'var(--font-display)',fontSize:30,color:'var(--amber)',marginBottom:6}}>Feedback</div>
      <div style={{color:'var(--chalk-dim)',fontSize:13,marginBottom:16}}>
        Found a bug, have an idea, or just want to say something about the game? Send it straight through.
      </div>
      <input
        value={name}
        onChange={e => setName(e.target.value)}
        placeholder="Your name (optional)"
        style={{width:'100%',background:'var(--pitch)',border:'1px solid var(--line)',borderRadius:7,padding:'10px 12px',color:'var(--chalk)',fontSize:13,marginBottom:10,boxSizing:'border-box'}}
      />
      <textarea
        value={message}
        onChange={e => setMessage(e.target.value)}
        placeholder="Write your feedback here..."
        rows={7}
        style={{width:'100%',background:'var(--pitch)',border:'1px solid var(--line)',borderRadius:7,padding:'10px 12px',color:'var(--chalk)',fontSize:13,fontFamily:'var(--font-body)',resize:'vertical',boxSizing:'border-box'}}
      />
      <div style={{display:'flex',alignItems:'center',gap:12,marginTop:12,flexWrap:'wrap'}}>
        <button
          onClick={handleSubmit}
          disabled={!message.trim() || status==='sending'}
          style={{background:'var(--amber)',color:'var(--ink)',border:'none',borderRadius:7,padding:'10px 16px',fontWeight:900,opacity:(!message.trim()||status==='sending')?0.5:1,cursor:(!message.trim()||status==='sending')?'not-allowed':'pointer'}}
        >
          {status==='sending' ? 'Sending…' : 'Send Feedback'}
        </button>
        {status==='sent' && <span style={{color:'#4CAF6D',fontSize:13,fontWeight:700}}>✓ Sent — thank you!</span>}
        {status==='error' && (
          <span style={{color:'var(--red)',fontSize:13,fontWeight:700}}>
            ✗ Couldn't send — you can also email{' '}
            <a href={`mailto:roadtoworldcupnael@gmail.com?subject=Road to the Cup feedback&body=${encodeURIComponent(message)}`} style={{color:'var(--red)',textDecoration:'underline'}}>roadtoworldcupnael@gmail.com</a> directly.
          </span>
        )}
      </div>
    </div>
  );
}

class RuntimeErrorBoundary extends React.Component {
  constructor(props) {
    super(props);
    this.state = { error: null };
  }
  static getDerivedStateFromError(error) { return { error }; }
  componentDidCatch(error, info) { console.error("ROAD_TO_THE_CUP_RENDER_ERROR", error, info); }
  render() {
    if (this.state.error) {
      return (
        <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',padding:20,background:'var(--ink)',color:'var(--chalk)'}}>
          <div style={{maxWidth:760,width:'100%',border:'2px solid var(--amber)',borderRadius:14,padding:24,background:'rgba(255,255,255,0.04)'}}>
            <div style={{fontFamily:'var(--font-display)',fontSize:42,color:'var(--amber)',lineHeight:1}}>Load issue caught</div>
            <p style={{color:'var(--chalk-dim)',lineHeight:1.5}}>The game hit a render error instead of showing a black screen. Restart the page or clear this save if an old browser save is conflicting with the newest build.</p>
            <pre style={{whiteSpace:'pre-wrap',background:'rgba(0,0,0,0.35)',padding:12,borderRadius:10,color:'#ffb4a8',fontSize:12}}>{String(this.state.error?.message || this.state.error)}</pre>
            <button onClick={() => window.location.reload()} style={{background:'var(--amber)',color:'var(--ink)',border:0,borderRadius:8,padding:'10px 14px',fontWeight:900}}>Reload game</button>
          </div>
        </div>
      );
    }
    return this.props.children;
  }
}

function App() {
  const [playerTeam, setPlayerTeam] = useState(null);
  const [campaign, setCampaign] = useState(null);
  const [wc, setWc] = useState(null);
  const [champion, setChampion] = useState(null);
  const [showStats, setShowStats] = useState(false);
  const [showManager, setShowManager] = useState(false);
  const [showFeedback, setShowFeedback] = useState(false);
  const [mobileView, setMobileView] = useState(() => {
    try { return localStorage.getItem("rtc_mobile_view") === "1"; } catch (e) { return false; }
  });
  const [cycleReport, setCycleReport] = useState(null); // set right after aging, shown before the new campaign starts

  useEffect(() => {
    document.body.classList.toggle("force-mobile", !!mobileView);
    try { localStorage.setItem("rtc_mobile_view", mobileView ? "1" : "0"); } catch (e) {}
  }, [mobileView]);

  function handleSelectTeam(team) {
    v7EnsureRoster(team);
    // Build the campaign first, then switch away from the team-select screen.
    // This prevents a one-render gap where playerTeam exists but campaign is still null,
    // which caused a black screen on some browsers / local file launches.
    const newCampaign = initQualifyingCampaign(team.id);
    setCampaign(newCampaign);
    setPlayerTeam(team);
  }

  function handleRestart() {
    setPlayerTeam(null);
    setCampaign(null);
    setWc(null);
    setChampion(null);
    setCycleReport(null);
  }

  // Continues the SAME nation into the next World Cup cycle (~4 years later)
  // instead of ending the save outright. Every nation's roster ages up one
  // cycle — ratings drift, veterans decline, some retire and are replaced by
  // freshly generated young players — then a brand new qualifying campaign
  // begins for the player's chosen nation, keeping career history intact.
  function handleNewCycle() {
    const teamId = campaign?.playerTeamId || playerTeam?.id;
    const reports = ageAllRostersOneCycle();
    const career = careerStore();
    career.year = (career.year || 2026) + CYCLE_YEARS;
    window.__RTC_STATS = { qualifying: emptyStatsBucket(), worldcup: emptyStatsBucket() };
    const myReport = teamId ? reports[teamId] : null;
    setCycleReport(myReport ? { teamId, ...myReport, year: career.year } : null);
    const freshTeam = v7AllTeams().find(t => t.id === teamId);
    setPlayerTeam(freshTeam || null);
    setCampaign(freshTeam ? initQualifyingCampaign(freshTeam.id) : null);
    setWc(null);
    setChampion(null);
  }

  function handleStartWC() {
    resetSquadFitness(campaign.playerTeamId);
    const newWc = initWorldCup(campaign);
    setWc(newWc);
  }

  function handleR32Advance(winners) {
    wc.r16 = { pairs: nextRoundPairs(winners), results: [] };
    wc.stage = "R16";
    if (!winners.some(t => t.id === playerTeam.id) && !wc.playerEliminatedAt) wc.playerEliminatedAt = "Round of 32";
    else if (winners.some(t => t.id === playerTeam.id)) applyWorldCupRecoveryGap(playerTeam.id, 3.5);
    setWc({ ...wc });
  }

  function handleR16Advance(winners) {
    wc.qf = { pairs: nextRoundPairs(winners), results: [] };
    wc.stage = "QF";
    if (!winners.some(t => t.id === playerTeam.id) && !wc.playerEliminatedAt) {
      wc.playerEliminatedAt = "Round of 16";
    } else if (winners.some(t => t.id === playerTeam.id)) {
      applyWorldCupRecoveryGap(playerTeam.id, 3.5); // R16 -> QF gap, tournament tightening up
    }
    setWc({ ...wc });
  }
  function handleQFAdvance(winners) {
    wc.sf = { pairs: nextRoundPairs(winners), results: [] };
    wc.stage = "SF";
    if (!winners.some(t => t.id === playerTeam.id) && !wc.playerEliminatedAt) {
      wc.playerEliminatedAt = "Quarter-Finals";
    } else if (winners.some(t => t.id === playerTeam.id)) {
      applyWorldCupRecoveryGap(playerTeam.id, 3); // QF -> SF gap, less recovery time
    }
    setWc({ ...wc });
  }
  function handleSFAdvance(winners) {
    wc.final = { pair: winners, results: [null] };
    wc.stage = "FINAL";
    if (!winners.some(t => t.id === playerTeam.id) && !wc.playerEliminatedAt) {
      wc.playerEliminatedAt = "Semi-Finals";
    } else if (winners.some(t => t.id === playerTeam.id)) {
      applyWorldCupRecoveryGap(playerTeam.id, 3); // SF -> Final, tightest gap of the tournament
    }
    setWc({ ...wc });
  }
  function handleChampion(champ) {
    logCompletedCycle(champ, playerTeam?.id, champ?.id === playerTeam?.id ? 'World Champions' : (wc?.playerEliminatedAt || 'World Cup'));
    setChampion(champ);
  }

  function handleLoadSnapshot(st) {
    setPlayerTeam(st.playerTeam || null);
    setCampaign(st.campaign || null);
    setWc(st.wc || null);
    setChampion(st.champion || null);
    setShowManager(false);
    setShowStats(false);
  }

  // ---- Determine current screen ----
  let screen;
  let stageLabel = "";
  let record = null;

  if (cycleReport) {
    screen = <CycleReportScreen report={cycleReport} onContinue={() => setCycleReport(null)} />;
  } else if (!playerTeam) {
    screen = <TeamSelectScreen onSelect={handleSelectTeam} />;
  } else if (champion) {
    screen = <ChampionScreen champion={champion} playerTeamId={playerTeam.id} onRestart={handleRestart} onNewCycle={handleNewCycle} />;
    stageLabel = "FINAL RESULT";
  } else if (wc) {
    const pg = getPlayerWCGroup(wc, playerTeam.id);
    if (pg) {
      const s = pg.standings[playerTeam.id];
      record = s;
    }
    if (wc.stage === "GROUPS") {
      stageLabel = "World Cup · Groups";
      screen = <WorldCupGroupsScreen wc={wc} setWc={setWc} playerTeamId={playerTeam.id} onAdvance={() => setWc({ ...wc })} />;
    } else if (wc.stage === "R32") {
      stageLabel = "World Cup · Round of 32";
      screen = <>
        <WCEliminatedBanner wc={wc} playerTeamId={playerTeam.id} />
        <KnockoutRoundScreen wc={wc} setWc={setWc} playerTeamId={playerTeam.id} roundKey="R32" onAdvance={handleR32Advance} onChampion={handleChampion} />
      </>;
    } else if (wc.stage === "R16") {
      stageLabel = "World Cup · Round of 16";
      screen = <>
        <WCEliminatedBanner wc={wc} playerTeamId={playerTeam.id} />
        <KnockoutRoundScreen wc={wc} setWc={setWc} playerTeamId={playerTeam.id} roundKey="R16" onAdvance={handleR16Advance} onChampion={handleChampion} />
      </>;
    } else if (wc.stage === "QF") {
      stageLabel = "World Cup · Quarter-Finals";
      screen = <>
        <WCEliminatedBanner wc={wc} playerTeamId={playerTeam.id} />
        <KnockoutRoundScreen wc={wc} setWc={setWc} playerTeamId={playerTeam.id} roundKey="QF" onAdvance={handleQFAdvance} onChampion={handleChampion} />
      </>;
    } else if (wc.stage === "SF") {
      stageLabel = "World Cup · Semi-Finals";
      screen = <>
        <WCEliminatedBanner wc={wc} playerTeamId={playerTeam.id} />
        <KnockoutRoundScreen wc={wc} setWc={setWc} playerTeamId={playerTeam.id} roundKey="SF" onAdvance={handleSFAdvance} onChampion={handleChampion} />
      </>;
    } else if (wc.stage === "FINAL") {
      stageLabel = "World Cup · Final";
      screen = <>
        <WCEliminatedBanner wc={wc} playerTeamId={playerTeam.id} />
        <KnockoutRoundScreen wc={wc} setWc={setWc} playerTeamId={playerTeam.id} roundKey="FINAL" onAdvance={() => {}} onChampion={handleChampion} />
      </>;
    }
  } else if (!campaign) {
    stageLabel = "Loading campaign...";
    screen = <div style={{minHeight:'70vh',display:'flex',alignItems:'center',justifyContent:'center',padding:24,textAlign:'center'}}>
      <div style={{border:'1px solid var(--line)',borderRadius:14,padding:28,background:'rgba(255,255,255,0.03)',maxWidth:560}}>
        <div style={{fontFamily:'var(--font-display)',fontSize:46,color:'var(--amber)',lineHeight:1}}>Building campaign...</div>
        <div style={{color:'var(--chalk-dim)',marginTop:8}}>Setting up fixtures, squads and qualification path.</div>
      </div>
    </div>;
  } else if (campaign.stage === "ROUND1") {
    stageLabel = "AFC · Round 1";
    screen = <Round1Screen campaign={campaign} setCampaign={setCampaign} onAdvance={() => setCampaign({ ...campaign })} />;
  } else if (campaign.stage === "ROUND2") {
    stageLabel = "AFC · Round 2";
    const g = getPlayerGroup(campaign);
    record = g.standings[playerTeam.id];
    screen = <Round2Screen campaign={campaign} setCampaign={setCampaign} onAdvance={() => setCampaign({ ...campaign })} />;
  } else if (campaign.stage === "ROUND3") {
    stageLabel = `${campaign.confed || 'AFC'} · Qualifying Group`;
    const g = getPlayerGroup(campaign);
    record = g.standings[playerTeam.id];
    screen = <Round3Screen campaign={campaign} setCampaign={setCampaign} onAdvance={() => setCampaign({ ...campaign })} />;
  } else if (campaign.stage === "ROUND4") {
    stageLabel = "AFC · Round 4";
    const g = campaign.round4.groups.find(g => g.teams.some(t => t.id === playerTeam.id));
    record = g.standings[playerTeam.id];
    screen = <Round4Screen campaign={campaign} setCampaign={setCampaign} onAdvance={() => setCampaign({ ...campaign })} />;
  } else if (campaign.stage === "UEFA_PLAYOFFS") {
    stageLabel = "UEFA · Play-off";
    screen = <UefaPlayoffScreen campaign={campaign} setCampaign={setCampaign} onAdvance={() => setCampaign({ ...campaign })} />;
  } else if (campaign.stage === "ROUND5") {
    stageLabel = `${campaign.confed || 'AFC'} · Playoff`;
    screen = <Round5Screen campaign={campaign} setCampaign={setCampaign} onAdvance={() => setCampaign({ ...campaign })} />;
  } else if (campaign.stage === "INTERCONFED") {
    stageLabel = "Inter-Confederation Playoff";
    screen = <InterConfedScreen campaign={campaign} setCampaign={setCampaign} onAdvance={() => setCampaign({ ...campaign })} />;
  } else if (campaign.stage === "QUALIFIED") {
    stageLabel = "Qualified!";
    screen = <QualifiedTransitionScreen campaign={campaign} onContinue={handleStartWC} />;
  } else if (campaign.stage === "ELIMINATED") {
    stageLabel = "Eliminated";
    screen = <EliminatedScreen campaign={campaign} onRestart={handleRestart} onNewCycle={handleNewCycle} />;
  }

  return (
    <div>
      <ScoreboardHeader playerTeam={playerTeam} stageLabel={stageLabel} record={record} mobileView={mobileView} onToggleMobileView={() => setMobileView(v => !v)} onOpenStats={() => setShowStats(true)} onOpenManager={() => setShowManager(true)} onBack={() => { if (showStats) setShowStats(false); else if (showManager) setShowManager(false); else if (wc) { setWc(null); setChampion(null); } else if (campaign && campaign.stage !== "ROUND1") { alert("Back one full stage is limited in this prototype after matches are simulated. Use restart for a fresh run."); } else handleRestart(); }} />
      {screen}
      <div style={{textAlign:'center',padding:'18px 12px 28px',color:'var(--chalk-dim)',fontFamily:'var(--font-mono)',fontSize:12,letterSpacing:.5,borderTop:'1px solid rgba(242,240,232,0.08)'}}>
        Made by Nael · <span onClick={() => setShowFeedback(true)} style={{color:'var(--amber)',cursor:'pointer',textDecoration:'underline'}}>Feedback</span>
      </div>
      {showFeedback && (
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.82)',zIndex:1300,display:'flex',alignItems:'center',justifyContent:'center',padding:18}}>
          <div style={{background:'var(--ink)',border:'2px solid var(--amber)',borderRadius:14,maxWidth:640,width:'100%',maxHeight:'90vh',overflowY:'auto',padding:26,boxShadow:'0 20px 80px rgba(0,0,0,0.7)'}}>
            <div style={{display:'flex',justifyContent:'flex-end',marginBottom:8}}>
              <button onClick={() => setShowFeedback(false)} style={{background:'transparent',color:'var(--chalk)',border:'1px solid var(--line)',borderRadius:8,padding:'8px 12px',fontWeight:900}}>✕ Close</button>
            </div>
            <FeedbackPanel />
          </div>
        </div>
      )}
      {showStats && <StatsHubModal onClose={() => setShowStats(false)} />}
      {showManager && <ManagerHubModal playerTeam={playerTeam} campaign={campaign} wc={wc} champion={champion} appState={{playerTeam,campaign,wc,champion}} onLoad={handleLoadSnapshot} onClose={() => setShowManager(false)} />}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<RuntimeErrorBoundary><App /></RuntimeErrorBoundary>);
</script>
